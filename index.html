function PayrollAuto(props){
  var user=props.user||{role:"",name:"",id:0},P=props;
  var now=new Date();
  var [month,setMonth]=useState(now.getFullYear()+'-'+(now.getMonth()+1<10?'0':'')+(now.getMonth()+1));
  var [processing,setProcessing]=useState(false);
  var [results,setResults]=useState([]);
  var [showResults,setShowResults]=useState(false);

  function calcDays(userId){
    var att=P.att[userId]||{};
    var daysInMonth=new Date(+month.split('-')[0],+month.split('-')[1],0).getDate();
    var present=0,absent=0;
    for(var d=1;d<=daysInMonth;d++){
      var v=att[d];var s=v&&typeof v==='object'?v.status:v;
      if(s==='present')present++;else if(s==='absent')absent++;
    }
    return {present:present,absent:absent,total:daysInMonth};
  }

  function autoCalculate(){
    setProcessing(true);
    var employees=(P.users||[]).filter(function(u){return u.role==='foreman'&&u.salary;});
    var computed=employees.map(function(emp){
      var att=calcDays(emp.id);
      var perDay=Math.round((emp.salary||0)/26);
      var earned=perDay*att.present;
      var pf=Math.round(earned*0.12);
      var esi=earned<=21000?Math.round(earned*0.0075):0;
      var net=Math.max(0,earned-pf-esi);
      return {empId:emp.id,empName:emp.name,month:month,basic:earned,present:att.present,absent:att.absent,pf:pf,esi:esi,net:net,status:'pending',perDay:perDay};
    });
    setResults(computed);setShowResults(true);setProcessing(false);
  }

  function saveAll(){
    var saved=0;
    results.forEach(function(r){
      var exists=(P.salary||[]).some(function(s){return s.empId===r.empId&&s.month===r.month;});
      if(!exists){addItem(P.setSalary,Object.assign({id:Date.now()+Math.random()},r));saved++;}
    });
    alert('Payroll saved for '+saved+' employees!');
    setShowResults(false);
  }

  return <div className="fi">
    <div className="st mb12">Payroll Auto-Calculation</div>
    <div className="card mb12">
      <div className="flex g8 mb10" style={{alignItems:'center',flexWrap:'wrap'}}>
        <div className="fr" style={{margin:0}}><label style={{marginRight:8}}>Month</label><input type="month" value={month} onChange={function(e){setMonth(e.target.value);setShowResults(false);}}/></div>
        <button className="btn bp" onClick={autoCalculate} disabled={processing}>{processing?'Calculating...':'Calculate All'}</button>
      </div>
      <div style={{fontSize:11,color:'var(--tx3)'}}>Calculates from attendance: present days x daily rate, minus PF (12%) and ESI</div>
    </div>
    {showResults&&<div>
      <div className="flex ic jb mb10">
        <div style={{fontWeight:600}}>{results.length} employees</div>
        <button className="btn bgr bsm" onClick={saveAll}>Save All Payslips</button>
      </div>
      <div style={{overflowX:'auto'}}><table><thead><tr><th>Employee</th><th>Days</th><th>Earned</th><th>PF</th><th>ESI</th><th style={{color:'var(--gr)'}}>Net Pay</th></tr></thead>
      <tbody>{results.map(function(r){
        return <tr key={r.empId}>
          <td style={{fontWeight:600,fontSize:12}}>{r.empName}</td>
          <td className="mono tsm">{r.present}P {r.absent}A</td>
          <td className="mono">{INR(r.basic)}</td>
          <td className="mono tsm" style={{color:'var(--rd)'}}>{INR(r.pf)}</td>
          <td className="mono tsm" style={{color:'var(--am)'}}>{INR(r.esi)}</td>
          <td className="mono" style={{fontWeight:800,color:'var(--gr)'}}>{INR(r.net)}</td>
        </tr>;
      })}</tbody></table></div>
    </div>}
  </div>;
}

function TallyExport(props){
  var P=props;

    if(type==='bills'||type==='all'){
      (P.bills||[]).filter(function(b){return (b.date||'')>=dateFrom&&(b.date||'')<=dateTo;}).forEach(function(b){
        entries.push({date:(b.date||'').replace(/-/g,''),party:b.vendor||'',amount:b.base||0,total:b.total||0,narration:b.invoiceNo||''});
      });
    }
    var rows=['<?xml version="1.0" encoding="UTF-8"?>','<ENVELOPE>','<HEADER><TALLYREQUEST>Import Data</TALLYREQUEST></HEADER>','<BODY><IMPORTDATA><REQUESTDESC><REPORTNAME>Vouchers</REPORTNAME></REQUESTDESC><REQUESTDATA>'];
    entries.forEach(function(e){
      rows.push('<TALLYMESSAGE xmlns:UDF="TallyUDF"><VOUCHER VCHTYPE="Purchase" ACTION="Create">');
      rows.push('<DATE>'+e.date+'</DATE><NARRATION>'+e.narration+'</NARRATION>');
      rows.push('<ALLLEDGERENTRIES.LIST><LEDGERNAME>'+e.party+'</LEDGERNAME><ISDEEMEDPOSITIVE>No</ISDEEMEDPOSITIVE><AMOUNT>'+e.total+'</AMOUNT></ALLLEDGERENTRIES.LIST>');
      rows.push('<ALLLEDGERENTRIES.LIST><LEDGERNAME>Purchase Account</LEDGERNAME><ISDEEMEDPOSITIVE>Yes</ISDEEMEDPOSITIVE><AMOUNT>-'+e.amount+'</AMOUNT></ALLLEDGERENTRIES.LIST>');
      rows.push('</VOUCHER></TALLYMESSAGE>');
    });
    rows.push('</REQUESTDATA></IMPORTDATA></BODY>','</ENVELOPE>');
    var blob=new Blob([rows.join('\n')],{type:'application/xml'});
    var a=document.createElement('a');a.href=URL.createObjectURL(blob);
    a.download='RAJ_Tally_'+dateFrom+'_to_'+dateTo+'.xml';a.click();

  return <div className="fi">

        <div className="fr"><label>From</label><input type="date" value={dateFrom} onChange={function(e){setDateFrom(e.target.value);}}/></div>
        <div className="fr"><label>To</label><input type="date" value={dateTo} onChange={function(e){setDateTo(e.target.value);}}/></div>
      </div>
      <div style={{background:'var(--sur2)',borderRadius:6,padding:'8px 12px',fontSize:11,color:'var(--tx2)',margin:'8px 0'}}>In Tally: Gateway - Import - Data - Select this XML file</div>
      <button className="btn bp" style={{width:'100%'}} onClick={exportXML}>Download Tally XML</button>
    </div>
  </div>;
}

function CashFlowForecast(props){
  var P=props;
  var [horizon,setHorizon]=useState(90);
  var today2=new Date();
  var forecast=[];
  for(var i=0;i<horizon;i+=7){
    var weekStart=new Date(today2.getTime()+i*86400000);
    var weekEnd=new Date(today2.getTime()+(i+6)*86400000);
    var ws=weekStart.toISOString().slice(0,10);
    var we=weekEnd.toISOString().slice(0,10);
    var inflow=(P.rabills||[]).filter(function(r){return r.dueDate&&r.dueDate>=ws&&r.dueDate<=we&&r.status==='submitted';}).reduce(function(a,r){return a+(+r.billAmt||0);},0);
    var outflow=(P.bills||[]).filter(function(b){return b.dueDate&&b.dueDate>=ws&&b.dueDate<=we&&b.status==='pending';}).reduce(function(a,b){return a+(+b.total||0);},0);
    forecast.push({week:ws.slice(5),inflow:inflow,outflow:outflow,net:inflow-outflow});
  }
  var totIn=forecast.reduce(function(a,f){return a+f.inflow;},0);
  var totOut=forecast.reduce(function(a,f){return a+f.outflow;},0);
  var maxVal=Math.max.apply(null,forecast.map(function(f){return Math.max(f.inflow,f.outflow);}));
  if(maxVal===0)maxVal=1;
  return <div className="fi">
    <div className="flex ic jb mb12">
      <div className="st" style={{margin:0}}>Cash Flow Forecast</div>
      <select value={horizon} onChange={function(e){setHorizon(+e.target.value);}}>
        <option value={30}>30 Days</option><option value={60}>60 Days</option><option value={90}>90 Days</option>
      </select>
    </div>
    <div className="g3 mb12">
      {[[INR(totIn),'Expected Inflows','var(--gr)'],[INR(totOut),'Expected Outflows','var(--rd)'],[INR(totIn-totOut),(totIn-totOut>=0?'Surplus':'Deficit'),'var(--am)']].map(function(x){
        return <div key={x[1]} className="card" style={{textAlign:'center',borderLeft:'4px solid '+x[2]}}>
          <div style={{fontSize:16,fontWeight:800,color:x[2]}}>{x[0]}</div>
          <div style={{fontSize:10,color:'var(--tx3)'}}>{x[1]}</div>
        </div>;
      })}
    </div>
    <div className="card" style={{overflowX:'auto'}}>
      <div style={{display:'flex',gap:3,alignItems:'flex-end',height:100,minWidth:300,padding:'8px 4px'}}>
        {forecast.map(function(f,i){
          return <div key={i} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:1}}>
            <div style={{display:'flex',gap:1,alignItems:'flex-end',height:80,width:'100%',justifyContent:'center'}}>
              <div style={{flex:1,background:'var(--gr)',opacity:.7,borderRadius:'2px 2px 0 0',height:Math.max(2,f.inflow/maxVal*80)+'px'}}></div>
              <div style={{flex:1,background:'var(--rd)',opacity:.7,borderRadius:'2px 2px 0 0',height:Math.max(2,f.outflow/maxVal*80)+'px'}}></div>
            </div>
            <div style={{fontSize:7,color:'var(--tx3)',transform:'rotate(-45deg)',transformOrigin:'center',whiteSpace:'nowrap'}}>{f.week}</div>
          </div>;
        })}
      </div>
    </div>
  </div>;
}

</script>
<script type="text/babel" data-presets="react">

function VariationOrders(props){

  var [showM,setShowM]=useState(false);
  var [form,setForm]=useState({siteId:'',voNo:'',description:'',requestedBy:'client',cost:'',days:'',status:'pending',date:today()});

  var vos=P.variationOrders||[];
  var totalCost=vos.filter(function(v){return v.status==='approved';}).reduce(function(a,v){return a+(+v.cost||0);},0);
  function save(){
    if(!form.description){alert('Description required');return;}
    var num='VO-'+String((vos.length+1)).padStart(3,'0');

    setShowM(false);setForm({siteId:'',voNo:'',description:'',requestedBy:'client',cost:'',days:'',status:'pending',date:today()});

  function approve(id){

      {[[vos.filter(function(v){return v.status==='pending';}).length,'Pending','var(--am)'],

        [vos.filter(function(v){return v.status==='approved';}).reduce(function(a,v){return a+(+v.days||0);},0)+' days','Time Extension','var(--pu)']].map(function(x){

    {vos.sort(function(a,b){return b.date.localeCompare(a.date);}).map(function(vo){

      var statusColor=vo.status==='approved'?'var(--gr)':vo.status==='rejected'?'var(--rd)':'var(--am)';

function PunchList(props){
  var user=props.user||{role:"",name:"",id:0},P=props;
  var isAdmin=user.role==='admin'||user.role==='master_admin';
  var [showM,setShowM]=useState(false);
  var [form,setForm]=useState({siteId:user.siteId||'',title:'',items:''});
  function sf(k,v){setForm(function(p){return Object.assign({},p,{[k]:v});});}
  var lists=P.punchLists||[];
  function createList(){
    if(!form.title||!form.items.trim()){alert('Title and items required');return;}
    var itemArr=form.items.split('\n').filter(function(x){return x.trim();}).map(function(x,i){return {id:i+1,text:x.trim(),done:false,by:'',ts:''};});
    addItem(P.setPunchLists,{id:Date.now(),siteId:+form.siteId,title:form.title,items:itemArr,status:'open',createdBy:user.name,createdOn:today()});
    setShowM(false);setForm({siteId:user.siteId||'',title:'',items:''});
  }
  function toggleItem(listId,itemId){
    P.setPunchLists(function(prev){return prev.map(function(l){
      if(l.id!==listId)return l;
      var newItems=l.items.map(function(it){return it.id===itemId?Object.assign({},it,{done:!it.done,by:it.done?'':user.name,ts:it.done?'':today()}):it;});
      var allDone=newItems.every(function(it){return it.done;});
      return Object.assign({},l,{items:newItems,status:allDone?'complete':'open'});
    });});
  }
  function signOff(listId){
    var sig=prompt('Enter client name to sign off:');
    if(!sig)return;
    P.setPunchLists(function(prev){return prev.map(function(l){return l.id===listId?Object.assign({},l,{signedBy:sig,signedOn:today(),status:'signed'}):l;});});
  }

      var site=(P.sites||[]).filter(function(s){return s.id===list.siteId;})[0]||{};
      var done=list.items.filter(function(it){return it.done;}).length;
      var pct=list.items.length?Math.round(done/list.items.length*100):0;
      var statusColor=list.status==='signed'?'var(--gr)':list.status==='complete'?'var(--am)':'var(--bl)';
      return <div key={list.id} className="card mb10">
        <div className="flex ic jb mb8">
          <div><div style={{fontWeight:700,fontSize:14}}>{list.title}</div>
            <div style={{fontSize:11,color:'var(--tx3)'}}>{site.name} | {list.createdOn} | {done}/{list.items.length} done</div>
          </div>
          <span style={{fontSize:10,fontWeight:700,color:statusColor}}>{list.status.toUpperCase()}</span>
        </div>
        <div style={{height:6,background:'var(--bdr)',borderRadius:3,marginBottom:10}}>
          <div style={{height:'100%',width:pct+'%',background:pct===100?'var(--gr)':'var(--am)',borderRadius:3}}></div>
        </div>
        <div style={{display:'flex',flexDirection:'column',gap:4,marginBottom:10}}>
          {list.items.map(function(it){
            return <div key={it.id} style={{display:'flex',alignItems:'center',gap:10,padding:'5px 8px',background:it.done?'rgba(16,185,129,.05)':'var(--sur2)',borderRadius:6,cursor:'pointer'}} onClick={function(){toggleItem(list.id,it.id);}}>
              <span style={{fontSize:16,color:it.done?'var(--gr)':'var(--bdr)'}}>{it.done?'[x]':'[ ]'}</span>
              <span style={{flex:1,fontSize:12,textDecoration:it.done?'line-through':'none',color:it.done?'var(--tx3)':'var(--tx)'}}>{it.text}</span>
              {it.done&&<span style={{fontSize:10,color:'var(--tx3)'}}>{it.by}</span>}
            </div>;
          })}
        </div>
        <div className="flex g6">
          {isAdmin&&list.status!=='signed'&&pct===100&&<button className="btn bgr bsm" onClick={function(){signOff(list.id);}}>Client Sign-off</button>}
          {list.signedBy&&<span style={{fontSize:11,color:'var(--gr)',fontWeight:600}}>Signed by {list.signedBy} on {list.signedOn}</span>}
        </div>
      </div>;
    })}
    {showM&&<Modal title="Create Punch List" onClose={function(){setShowM(false);}}>
      <div className="fg">
        <div className="fr"><label>Site</label><select value={form.siteId} onChange={function(e){sf('siteId',e.target.value);}}>
          <option value="">Select...</option>{(P.sites||[]).map(function(s){return <option key={s.id} value={s.id}>{s.name}</option>;})}
        </select></div>
        <div className="fr"><label>Title</label><input value={form.title} placeholder="e.g. Final Inspection Block A" onChange={function(e){sf('title',e.target.value);}}/></div>
        <div className="fr"><label>Items (one per line)</label><textarea rows="8" placeholder='Fix crack in bathroom wall&#10;Install door handles&#10;Paint touch-up staircase' value={form.items} onChange={function(e){sf('items',e.target.value);}}/></div>
      </div>
      <div className="flex g6">
        <button className="btn bp" style={{flex:1}} onClick={createList}>Create</button>
        <button className="btn bs" onClick={function(){setShowM(false);}}>Cancel</button>
      </div>
    </Modal>}
  </div>;
}

</script>
<script type="text/babel" data-presets="react">

function AnnualReport(props){
  var P=props;
  var now=new Date();
  var [year,setYear]=useState(now.getMonth()>=3?now.getFullYear():now.getFullYear()-1);
  function generate(){
    var fyStart=year+'-04-01',fyEnd=(year+1)+'-03-31';
    var co=window.RAJ_COMPANY||{};
    var coName=co.name||'RAJ Construction ';
    var purs=(P.purchases||[]).filter(function(p){var d=p.date||p.ts||'';return d>=fyStart&&d<=fyEnd;});
    var bills=(P.bills||[]).filter(function(b){return (b.date||'')>=fyStart&&(b.date||'')<=fyEnd;});
    var labour=(P.labour||[]).filter(function(l){return (l.date||'')>=fyStart&&(l.date||'')<=fyEnd;});
    var salary=(P.salary||[]).filter(function(s){return s.month>=fyStart.slice(0,7)&&s.month<=fyEnd.slice(0,7);});
    var totPur=purs.reduce(function(a,p){return a+(+p.total||0);},0);
    var totBills=bills.reduce(function(a,b){return a+(+b.total||0);},0);
    var totLabour=labour.reduce(function(a,l){return a+(+l.cost||0);},0);
    var totSal=salary.reduce(function(a,s){return a+(+s.net||0);},0);
    var totExp=totPur+totBills+totLabour+totSal;
    var vSpend={};bills.forEach(function(b){vSpend[b.vendor]=(vSpend[b.vendor]||0)+(+b.total||0);});
    var topVendors=Object.entries(vSpend).sort(function(a,b){return b[1]-a[1];}).slice(0,5);
    var w=window.open('','_ar','width=900,height=700');
    if(!w){alert('Allow popups to generate report.');return;}
    w.document.write('<!DOCTYPE html><html><head><title>Annual Report FY '+year+'-'+(year+1)+'</title>');
    w.document.write('<style>body{font-family:Arial,sans-serif;padding:30px;font-size:12px;color:#1a1a2e}h2{color:#1a3c6e;border-bottom:2px solid #e5e7eb;padding-bottom:6px}table{width:100%;border-collapse:collapse;margin:8px 0}th{background:#1a3c6e;color:#fff;padding:6px 10px}td{padding:5px 10px;border-bottom:1px solid #e5e7eb}.tr{font-weight:800;background:#f8fafc}.r{text-align:right}.g{color:#059669}.rd{color:#dc2626}@media print{.np{display:none}}</style></head><body>');
    w.document.write('<h2>Annual Report FY '+year+'-'+(year+1)+'</h2><p>'+coName+'</p>');
    w.document.write('<h2>Financial Summary</h2><table><thead><tr><th>Category</th><th class="r">Amount</th><th class="r">Transactions</th></tr></thead><tbody>');
    [{l:'Material Purchases',v:totPur,n:purs.length},{l:'Vendor Bills',v:totBills,n:bills.length},{l:'Labour',v:totLabour,n:labour.length},{l:'Salaries',v:totSal,n:salary.length}].forEach(function(r){w.document.write('<tr><td>'+r.l+'</td><td class="r">'+INR(r.v)+'</td><td class="r">'+r.n+'</td></tr>');});
    w.document.write('<tr class="tr"><td>TOTAL</td><td class="r rd">'+INR(totExp)+'</td><td class="r">'+(purs.length+bills.length+labour.length+salary.length)+'</td></tr></tbody></table>');
    w.document.write('<h2>Project Summary</h2><table><thead><tr><th>Project</th><th>Status</th><th class="r">Budget</th><th class="r">Completion</th></tr></thead><tbody>');
    (P.sites||[]).forEach(function(s){w.document.write('<tr><td>'+s.name+'</td><td>'+s.status+'</td><td class="r">'+INR(s.budget||0)+'</td><td class="r">'+(s.completion||0)+'%</td></tr>');});
    w.document.write('</tbody></table>');
    if(topVendors.length>0){
      w.document.write('<h2>Top Vendors</h2><table><thead><tr><th>Vendor</th><th class="r">Spend</th></tr></thead><tbody>');
      topVendors.forEach(function(v){w.document.write('<tr><td>'+v[0]+'</td><td class="r">'+INR(v[1])+'</td></tr>');});
      w.document.write('</tbody></table>');
    }
    w.document.write('<div class="np" style="margin-top:20px;text-align:center"><button onclick="window.print()" style="padding:10px 28px;background:#1a3c6e;color:#fff;border:none;border-radius:6px;cursor:pointer">Print / Save PDF</button></div>');
    w.document.write('</body></html>');w.document.close();
  }
  return <div className="fi">
    <div className="st mb12">Annual Report Generator</div>
    <div className="card">
      <div className="fr mb12"><label>Financial Year</label>
        <select value={year} onChange={function(e){setYear(+e.target.value);}}>
          {[2022,2023,2024,2025].map(function(y){return <option key={y} value={y}>FY {y}-{y+1}</option>;})}
        </select>
      </div>
      <button className="btn bp" style={{width:'100%'}} onClick={generate}>Generate Annual Report PDF</button>
    </div>
  </div>;
}

</script>

<script type="text/babel" data-presets="react">

function EPFESIChallan(props){
  var P=props;
  var now=new Date();
  var [month,setMonth]=useState(now.getFullYear()+'-'+(now.getMonth()<10?'0':'')+now.getMonth());
  var salaries=(P.salary||[]).filter(function(s){return s.month===month;});
  var empDetails=salaries.map(function(s){
    var emp=(P.users||[]).filter(function(u){return u.id===s.empId;})[0]||{};
    var basic=+s.basic||0;
    var epfWages=Math.min(basic,15000);
    var esiWages=basic<=21000?basic:0;
    var empEPF=Math.round(epfWages*0.12);
    var erEPF=Math.round(epfWages*0.12);
    var empESI=esiWages>0?Math.round(esiWages*0.0075):0;
    var erESI=esiWages>0?Math.round(esiWages*0.0325):0;
    return {name:emp.name||'Emp '+s.empId,basic:basic,epfWages:epfWages,esiWages:esiWages,empEPF:empEPF,erEPF:erEPF,empESI:empESI,erESI:erESI,totalEPF:empEPF+erEPF,totalESI:empESI+erESI};
  });
  var totals={empEPF:0,erEPF:0,empESI:0,erESI:0};
  empDetails.forEach(function(e){totals.empEPF+=e.empEPF;totals.erEPF+=e.erEPF;totals.empESI+=e.empESI;totals.erESI+=e.erESI;});
  totals.totalEPF=totals.empEPF+totals.erEPF;totals.totalESI=totals.empESI+totals.erESI;
  function generateChallan(){
    var co=window.RAJ_COMPANY||{};
    var w=window.open('','_challan','width=800,height=700');
    if(!w){alert('Allow popups');return;}
    w.document.write('<!DOCTYPE html><html><head><title>EPF ESI Challan</title><style>body{font-family:Arial,sans-serif;padding:24px;font-size:11px}h3{color:#1a3c6e}table{width:100%;border-collapse:collapse}th{background:#1a3c6e;color:#fff;padding:5px 8px}td{padding:4px 8px;border-bottom:1px solid #e5e7eb}.tot{font-weight:800;background:#f8fafc}.r{text-align:right}@media print{.np{display:none}}</style></head><body>');
    w.document.write('<h2>EPF & ESI Monthly Challan — '+month+'</h2><p>'+co.name+'</p>');

function BillMatching(props){
  var P=props;
  var [siteF,setSiteF]=useState('all');
  var wos=(P.workorders||[]).filter(function(wo){return siteF==='all'||String(wo.siteId)===siteF;});
  var matched=wos.map(function(wo){
    var relBills=(P.bills||[]).filter(function(b){return b.vendor===wo.contractor;});
    var billed=relBills.reduce(function(a,b){return a+(+b.total||0);},0);
    var paid=relBills.filter(function(b){return b.status==='paid';}).reduce(function(a,b){return a+(+b.total||0);},0);
    var ordered=+wo.value||0;
    return {wo:wo,ordered:ordered,billed:billed,paid:paid,outstanding:billed-paid,overBilled:billed>ordered&&ordered>0};
  });
  return <div className="fi">
    <div className="flex ic jb mb12">
      <div className="st" style={{margin:0}}>Contractor Bill Matching</div>

function ProfitabilityReport(props){

        <div className="fr"><label>Site</label><select value={form.siteId} onChange={function(e){sf('siteId',e.target.value);}}><option value="">All sites</option>{(P.sites||[]).map(function(s){return <option key={s.id} value={s.id}>{s.name}</option>;})}</select></div>
        <div className="fr"><label>Date</label><input type="date" value={form.date} onChange={function(e){sf('date',e.target.value);}}/></div>
        <div className="fr"><label>Cause</label><select value={form.cause} onChange={function(e){sf('cause',e.target.value);}}>{causes.map(function(c){return <option key={c} value={c}>{c.charAt(0).toUpperCase()+c.slice(1)}</option>;})}</select></div>
        <div className="fr"><label>Days Lost</label><input type="number" step="0.5" min="0.5" value={form.days} onChange={function(e){sf('days',e.target.value);}}/></div>
        <div className="fr"><label>Description</label><textarea rows="2" value={form.desc} onChange={function(e){sf('desc',e.target.value);}}/></div>
      </div>
      <div className="flex g6"><button className="btn bp" style={{flex:1}} onClick={save}>Log</button><button className="btn bs" onClick={function(){setShowM(false);}}>Cancel</button></div>
    </Modal>}
  </div>;
}

</script>
<script type="text/babel" data-presets="react">

function SubcontractorScorecard(props){
  var P=props,user=props.user;
  var isAdmin=user.role==='admin'||user.role==='master_admin';
  var [showM,setShowM]=useState(false);
  var [selWo,setSelWo]=useState(null);
  var [form,setForm]=useState({quality:3,timeliness:3,cost:3,notes:''});
  function sf(k,v){setForm(function(p){return Object.assign({},p,{[k]:+v});});}
  var wos=P.workorders||[];
  var ratings=P.ratings||[];
  var contractorScores={};
  wos.forEach(function(wo){
    if(!wo.contractor)return;
    var woRatings=ratings.filter(function(r){return r.woId===wo.id;});
    if(!woRatings.length)return;
    if(!contractorScores[wo.contractor])contractorScores[wo.contractor]={name:wo.contractor,ratings:[]};
    contractorScores[wo.contractor].ratings.push.apply(contractorScores[wo.contractor].ratings,woRatings);
  });
  function avg(arr,key){var v=arr.map(function(r){return +r[key]||0;});return v.length?Math.round(v.reduce(function(a,b){return a+b;},0)/v.length*10)/10:0;}
  function stars(n){var s='';for(var i=1;i<=5;i++)s+=i<=Math.round(n)?'★':'☆';return s;}
  function saveRating(){
    if(!selWo)return;
    addItem(P.setRatings,Object.assign({},form,{id:Date.now(),woId:selWo.id,contractor:selWo.contractor,by:user.name,ts:today()}));
    setShowM(false);setSelWo(null);setForm({quality:3,timeliness:3,cost:3,notes:''});
  }
  return <div className="fi">
    <div className="st mb12">Subcontractor Scorecard</div>
    {Object.entries(contractorScores).sort(function(a,b){
      var aA=(avg(a[1].ratings,'quality')+avg(a[1].ratings,'timeliness')+avg(a[1].ratings,'cost'))/3;
      var bA=(avg(b[1].ratings,'quality')+avg(b[1].ratings,'timeliness')+avg(b[1].ratings,'cost'))/3;
      return bA-aA;
    }).map(function(e,i){
      var cs=e[1];var q=avg(cs.ratings,'quality'),t=avg(cs.ratings,'timeliness'),c=avg(cs.ratings,'cost');
      var overall=Math.round((q+t+c)/3*10)/10;
      return <div key={cs.name} className="card mb8">
        <div className="flex ic jb mb6">
          <div><div style={{fontWeight:700,fontSize:14}}>{i+1}. {cs.name}</div><div style={{fontSize:10,color:'var(--tx3)'}}>{cs.ratings.length} rating(s)</div></div>
          <div style={{textAlign:'center'}}><div style={{fontSize:22,fontWeight:900,color:overall>=4?'var(--gr)':overall>=3?'var(--am)':'var(--rd)'}}>{overall}</div><div style={{fontSize:10,color:'var(--am)'}}>{stars(overall)}</div></div>
        </div>
        <div className="g3">{[['Quality',q],['Timeliness',t],['Cost',c]].map(function(x){return <div key={x[0]} style={{textAlign:'center',background:'var(--sur2)',borderRadius:6,padding:'6px'}}>
          <div style={{fontWeight:800,fontSize:14,color:x[1]>=4?'var(--gr)':x[1]>=3?'var(--am)':'var(--rd)'}}>{x[1]}</div><div style={{fontSize:9,color:'var(--tx3)'}}>{x[0]}</div>
        </div>;})}
        </div>
      </div>;
    })}
    {isAdmin&&<div className="card mt12">
      <div style={{fontWeight:600,fontSize:12,marginBottom:8}}>Rate a Work Order</div>
      <select onChange={function(e){setSelWo(wos.filter(function(w){return String(w.id)===e.target.value;})[0]||null);}}>
        <option value="">Select completed work order...</option>
        {wos.filter(function(wo){return wo.contractor&&wo.status==='completed';}).map(function(wo){return <option key={wo.id} value={wo.id}>{wo.contractor} — {wo.title||wo.scope||'WO-'+wo.id}</option>;})}
      </select>
      {selWo&&<button className="btn bp bsm mt8" onClick={function(){setShowM(true);}}>Rate This Contractor</button>}
    </div>}
    {showM&&selWo&&<Modal title={'Rate: '+selWo.contractor} onClose={function(){setShowM(false);}}>
      <div className="fg">
        {[['quality','Quality of Work'],['timeliness','Timeliness'],['cost','Cost Accuracy']].map(function(x){return <div key={x[0]} className="fr">
          <label>{x[1]}</label>
          <div style={{display:'flex',gap:6,alignItems:'center'}}>
            {[1,2,3,4,5].map(function(n){return <button key={n} onClick={function(){sf(x[0],n);}} style={{fontSize:20,background:'none',border:'none',cursor:'pointer',color:form[x[0]]>=n?'#f59e0b':'var(--bdr)'}}>{'★'}</button>;})}
            <span style={{fontSize:12,color:'var(--tx3)'}}>{['','Poor','Fair','Good','Very Good','Excellent'][form[x[0]]]}</span>
          </div>
        </div>;})}
        <div className="fr"><label>Notes</label><textarea rows="2" value={form.notes} onChange={function(e){setForm(function(p){return Object.assign({},p,{notes:e.target.value});});}}/></div>
      </div>
      <div className="flex g6"><button className="btn bp" style={{flex:1}} onClick={saveRating}>Submit</button><button className="btn bs" onClick={function(){setShowM(false);}}>Cancel</button></div>
    </Modal>}
  </div>;
}


function RFITracker(props){
  var P=props,user=props.user;
  var isAdmin=user.role==='admin'||user.role==='master_admin';
  var [showM,setShowM]=useState(false);
  var [form,setForm]=useState({siteId:user.siteId||'',rfiNo:'',subject:'',description:'',to:'',dueDate:''});
  function sf(k,v){setForm(function(p){return Object.assign({},p,{[k]:v});});}
  var rfis=P.rfis||[];
  var overdue=rfis.filter(function(r){return r.status==='open'&&r.dueDate&&r.dueDate<today();});
  function save(){
    if(!form.subject){alert('Subject required');return;}
    var num='RFI-'+String((rfis.length+1)).padStart(3,'0');
    addItem(P.setRfis,Object.assign({},form,{id:Date.now(),rfiNo:form.rfiNo||num,status:'open',raisedBy:user.name,raisedOn:today()}));
    setShowM(false);setForm({siteId:user.siteId||'',rfiNo:'',subject:'',description:'',to:'',dueDate:''});
  }
  function answer(id){
    var resp=prompt('Enter response:');
    if(!resp)return;
    P.setRfis(function(prev){return prev.map(function(r){return r.id===id?Object.assign({},r,{status:'answered',response:resp,answeredOn:today(),answeredBy:user.name}):r;});});
  }
  return <div className="fi">
    <div className="flex ic jb mb12"><div className="st" style={{margin:0}}>RFI Tracker</div><button className="btn bp bsm" onClick={function(){setShowM(true);}}>+ Raise RFI</button></div>
    <div className="g3 mb12">
      {[['Open',rfis.filter(function(r){return r.status==='open';}).length,'var(--am)'],['Answered',rfis.filter(function(r){return r.status==='answered';}).length,'var(--gr)'],['Overdue',overdue.length,'var(--rd)']].map(function(x){return <div key={x[0]} className="card" style={{textAlign:'center',borderLeft:'4px solid '+x[2]}}><div style={{fontSize:20,fontWeight:800,color:x[2]}}>{x[1]}</div><div style={{fontSize:10,color:'var(--tx3)'}}>{x[0]}</div></div>;})}
    </div>
    {overdue.length>0&&<div style={{background:'rgba(239,68,68,.08)',border:'1px solid rgba(239,68,68,.2)',borderRadius:8,padding:'10px 14px',marginBottom:12}}><div style={{color:'var(--rd)',fontWeight:700,fontSize:12}}>{overdue.length} RFI(s) overdue — unanswered RFIs support Extension of Time claims</div></div>}
    {rfis.slice().sort(function(a,b){return b.raisedOn.localeCompare(a.raisedOn);}).map(function(r){
      var site=(P.sites||[]).filter(function(s){return s.id===+r.siteId;})[0]||{};
      var isOD=r.status==='open'&&r.dueDate&&r.dueDate<today();
      return <div key={r.id} className="card mb6" style={{borderLeft:'4px solid '+(r.status==='answered'?'var(--gr)':isOD?'var(--rd)':'var(--am)')}}>
        <div className="flex ic jb mb4">
          <div><span style={{fontFamily:'monospace',color:'var(--bl)',fontWeight:700,fontSize:11}}>{r.rfiNo}</span> {r.subject}</div>
          <div className="flex g4">
            <span style={{fontSize:9,fontWeight:700,padding:'2px 6px',borderRadius:3,color:r.status==='answered'?'var(--gr)':isOD?'var(--rd)':'var(--am)'}}>{isOD?'OVERDUE':r.status.toUpperCase()}</span>
            {isAdmin&&r.status==='open'&&<button className="btn bgr bxs" style={{fontSize:10}} onClick={function(){answer(r.id);}}>Answer</button>}
          </div>
        </div>
        <div style={{fontSize:10,color:'var(--tx3)'}}>{site.name} | {r.raisedOn} | To: {r.to||'Architect/Engineer'}{r.dueDate?' | Due: '+r.dueDate:''}</div>
        {r.response&&<div style={{fontSize:11,color:'var(--gr)',marginTop:4,background:'rgba(16,185,129,.06)',padding:'4px 8px',borderRadius:4}}>Answer: {r.response} ({r.answeredBy}, {r.answeredOn})</div>}
      </div>;
    })}
    {showM&&<Modal title="Raise RFI" onClose={function(){setShowM(false);}}>
      <div className="fg">
        <div className="fr"><label>Site</label><select value={form.siteId} onChange={function(e){sf('siteId',e.target.value);}}><option value="">Select...</option>{(P.sites||[]).map(function(s){return <option key={s.id} value={s.id}>{s.name}</option>;})}</select></div>
        <div className="fr"><label>RFI Number</label><input placeholder="Auto if blank" value={form.rfiNo} onChange={function(e){sf('rfiNo',e.target.value);}}/></div>
        <div className="fr"><label>Subject *</label><input value={form.subject} onChange={function(e){sf('subject',e.target.value);}}/></div>
        <div className="fr"><label>Description</label><textarea rows="3" value={form.description} onChange={function(e){sf('description',e.target.value);}}/></div>
        <div className="fr"><label>Addressed To</label><input placeholder="Architect / Engineer" value={form.to} onChange={function(e){sf('to',e.target.value);}}/></div>
        <div className="fr"><label>Response Due</label><input type="date" value={form.dueDate} onChange={function(e){sf('dueDate',e.target.value);}}/></div>
      </div>
      <div className="flex g6"><button className="btn bp" style={{flex:1}} onClick={save}>Submit RFI</button><button className="btn bs" onClick={function(){setShowM(false);}}>Cancel</button></div>
    </Modal>}
  </div>;
}


function AutoLogoutWrapper(props){
  useEffect(function(){
    if(!props.user)return;
    var timer;
    function reset(){clearTimeout(timer);timer=setTimeout(function(){props.onLogout&&props.onLogout();},30*60*1000);}
    ['click','keydown','touchstart','scroll'].forEach(function(e){document.addEventListener(e,reset,{passive:true});});
    reset();
    return function(){clearTimeout(timer);['click','keydown','touchstart','scroll'].forEach(function(e){document.removeEventListener(e,reset);});};
  },[props.user]);
  return null;
}

</script>
<script>
window.RAJ_ERRORS = [];
window.addEventListener('error', function(e){
  window.RAJ_ERRORS.push((e.message||'?')+(e.lineno?' L'+e.lineno:''));
}, true);
var _bar=document.getElementById('splash-bar');
var _pct=document.getElementById('splash-pct');
var _msg=document.getElementById('splash-msg');
var _prog=0;
function setProgress(p,label){
  _prog=Math.max(_prog,Math.min(p,99));
  if(_bar)_bar.style.width=_prog+'%';
  if(_pct)_pct.textContent=Math.round(_prog)+'%';
  if(label&&_msg)_msg.textContent=label;
}
function tickProgress(n){
  var p;
  if(n<4){p=n*8;}else if(n<12){p=32+(n-4)*5;}else if(n<30){p=72+(n-12)*1.2;}else{p=92+Math.min((n-30)*0.1,6);}
  var labels=['Loading libraries…','Compiling React…','Compiling components…','Almost ready…','Finishing up…'];
  setProgress(p,labels[n<4?0:n<12?1:n<24?2:n<40?3:4]);
}
(function poll(n){
  tickProgress(n);
  if(typeof App!=='undefined'&&typeof ErrorBoundary!=='undefined'){
    setProgress(100,'Launching…');
    document.querySelectorAll('#splash').forEach(function(el){el.remove();});
    try{
      ReactDOM.createRoot(document.getElementById('root')).render(
        React.createElement(ErrorBoundary,null,React.createElement(App,null))
      );
    }catch(e){
      document.body.style.cssText='margin:0;background:#0a0010;min-height:100vh';
      document.body.innerHTML='<pre style="color:#ff6b6b;padding:24px;font-size:12px;white-space:pre-wrap">RENDER ERROR:\n'+((e&&e.message)||String(e))+'\n\n'+((e&&e.stack)||'')+'</pre>';
    }
  } else if(n<140){
    setTimeout(function(){poll(n+1);},500);
  } else {
    document.body.innerHTML='<div style="padding:24px;background:#0a0010;color:#e5e7eb;font-family:monospace;min-height:100vh"><div style="color:#ef4444;font-size:18px;font-weight:bold;margin-bottom:8px">Timeout</div><pre style="color:#fca5a5;font-size:11px">'+window.RAJ_ERRORS.join('\n')+'</pre><button onclick="location.reload()" style="margin-top:12px;padding:8px 20px;background:#3b82f6;color:#fff;border:none;border-radius:6px;cursor:pointer">Reload</button></div>';
  }
})(0);
</script>
