<!-- RAJ v25 + lang fixes -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"/>
<meta http-equiv="Pragma" content="no-cache"/>
<meta http-equiv="Expires" content="0"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
<title>RAJ Construction v26</title>
<style>
:root{--bg:#0C0E14;--sur:#13161F;--sur2:#1A1E2A;--bdr:#252B3B;--bdr2:#313849;--am:#4a7ef5;--amd:#2d62e0;--aml:#7aa8ff;--bl:#3B82F6;--gr:#10B981;--rd:#EF4444;--pu:#8B5CF6;--tx:#E4E8F0;--tx2:#A8B3C8;--tx3:#5E6B82;--sw:220px;}
body.light{--bg:#EDF1F7;--sur:#fff;--sur2:#F0F4FA;--bdr:#D4DCE9;--bdr2:#94A3B8;--am:#1a56db;--amd:#1340c0;--aml:#4a7ef5;--tx:#0F172A;--tx2:#475569;--tx3:#94A3B8;}
body.light .card{box-shadow:0 1px 8px rgba(15,23,42,.07),0 0 0 1px rgba(15,23,42,.04);}
body.light #sb{box-shadow:2px 0 16px rgba(15,23,42,.08);}
body.light #tb{background:rgba(255,255,255,.96)!important;border-bottom-color:rgba(0,0,0,.08)!important;}
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--bdr2);border-radius:3px;}
::-webkit-scrollbar-thumb:hover{background:var(--tx3);}
html,body{margin:0;padding:0;width:100%;height:100%;overflow-x:hidden;}
*,*::before,*::after{box-sizing:border-box;}
body{background:var(--bg);color:var(--tx);font-family:'IBM Plex Sans',sans-serif;min-height:100vh;transition:background .3s,color .3s;}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--bdr2);border-radius:2px}
button{font-family:'IBM Plex Sans',sans-serif;cursor:pointer;border:none;outline:none;}
input,select,textarea{font-family:'IBM Plex Sans',sans-serif;color:var(--tx);background:var(--sur2);border:1px solid var(--bdr2);border-radius:9px;padding:9px 12px;font-size:13px;outline:none;width:100%;transition:border-color .18s,box-shadow .18s,background .18s;}
input:focus,select:focus,textarea:focus{border-color:var(--am);box-shadow:0 0 0 3px rgba(61,126,255,.15);background:var(--sur);}
select option{background:var(--sur2);}
label{font-size:12px;color:var(--tx2);font-weight:500;display:block;margin-bottom:4px;}
/* Badges */
.bam{display:inline-flex;align-items:center;padding:2px 9px;border-radius:20px;font-size:10px;font-weight:700;letter-spacing:.02em;background:rgba(26,86,219,.13);color:var(--am);border:1px solid rgba(26,86,219,.25);}
.bgr{display:inline-flex;align-items:center;padding:2px 9px;border-radius:20px;font-size:10px;font-weight:700;letter-spacing:.02em;background:rgba(16,185,129,.13);color:var(--gr);border:1px solid rgba(16,185,129,.25);}
.brd{display:inline-flex;align-items:center;padding:2px 9px;border-radius:20px;font-size:10px;font-weight:700;letter-spacing:.02em;background:rgba(239,68,68,.13);color:var(--rd);border:1px solid rgba(239,68,68,.25);}
.bbl{display:inline-flex;align-items:center;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600;background:rgba(59,130,246,.15);color:var(--bl);border:1px solid rgba(59,130,246,.3);}
.bpu{display:inline-flex;align-items:center;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600;background:rgba(139,92,246,.15);color:var(--pu);border:1px solid rgba(139,92,246,.3);}
/* Buttons */
.btn{display:inline-flex;align-items:center;gap:5px;padding:8px 14px;border-radius:6px;font-size:13px;font-weight:500;transition:all .18s;cursor:pointer;white-space:nowrap;}
.bp{background:linear-gradient(135deg,#3d7eff,#2960e0);color:#fff;box-shadow:0 3px 12px rgba(61,126,255,.35);border:1px solid transparent;}.bp:hover{background:linear-gradient(135deg,#6ba0ff,#3d7eff);box-shadow:0 5px 20px rgba(61,126,255,.45);transform:translateY(-1px);}
.bs{background:var(--sur2);color:var(--tx);border:1px solid var(--bdr2);}.bs:hover{border-color:var(--am);color:var(--am);background:rgba(61,126,255,.07);}
.bd{background:rgba(248,113,113,.1);color:var(--rd);border:1px solid rgba(248,113,113,.25);}.bd:hover{background:var(--rd);color:#fff;box-shadow:0 3px 12px rgba(248,113,113,.35);}
.bg2{background:rgba(16,185,129,.12);color:var(--gr);border:1px solid rgba(16,185,129,.25);}.bg2:hover{background:var(--gr);color:#fff;}
.bsm{padding:5px 10px;font-size:12px;}.bxs{padding:3px 8px;font-size:11px;}
/* Cards & Grids */
.card{background:var(--sur);border:1px solid var(--bdr);border-radius:12px;padding:16px;transition:box-shadow .15s,border-color .15s;}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;}
.g5{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:11px;}
.fg3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:11px;}
.fr{margin-bottom:12px;}
/* Tables */
table{width:100%;border-collapse:collapse;}
th{background:var(--sur2);color:var(--tx3);font-size:10px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;padding:10px 14px;text-align:left;border-bottom:2px solid var(--bdr2);}
td{padding:11px 14px;border-bottom:1px solid var(--bdr);font-size:13px;color:var(--tx);vertical-align:middle;}
tr:last-child td{border-bottom:none;}
tr:nth-child(even) td{background:rgba(0,0,0,.018);}
tr:hover td{background:rgba(61,126,255,.06)!important;}
/* Stat cards */
.sc{background:var(--sur);border:1px solid var(--bdr);border-radius:10px;padding:14px;position:relative;overflow:hidden;}
.sc::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;}
.sca::before{background:var(--am);}.scb::before{background:var(--bl);}
.scg::before{background:var(--gr);}.scr::before{background:var(--rd);}.scp::before{background:var(--pu);}
.sv{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:700;line-height:1.1;margin:4px 0 2px;}
.sl{font-size:10px;color:var(--tx3);text-transform:uppercase;letter-spacing:.07em;font-weight:600;}
/* Progress bar */
.pb{height:5px;background:var(--bdr);border-radius:3px;overflow:hidden;margin-top:7px;}
.pf{height:100%;border-radius:3px;transition:width .5s;}
/* Modals */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.78);z-index:2000;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(8px);padding:14px;overflow-y:auto;}
.mo{background:linear-gradient(160deg,var(--sur),var(--sur2));border:1px solid rgba(255,255,255,.07);border-radius:18px;padding:24px;max-width:600px;width:100%;max-height:92vh;overflow-y:auto;box-shadow:0 40px 80px rgba(0,0,0,.6),0 0 0 1px rgba(255,255,255,.04);}
.mt{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:700;margin-bottom:16px;display:flex;align-items:center;gap:8px;}
/* Full-screen site detail */
.fs-ov{position:fixed;inset:0;background:var(--bg);z-index:2000;display:flex;flex-direction:column;overflow:hidden;}
.fs-header{padding:12px 20px;border-bottom:1px solid var(--bdr);display:flex;align-items:center;gap:12px;background:var(--sur);flex-shrink:0;flex-wrap:wrap;}
.fs-body{flex:1;overflow-y:auto;padding:20px;}
/* Section heading */
.st{font-family:'Barlow Condensed',sans-serif;font-size:19px;font-weight:800;margin-bottom:14px;display:flex;align-items:center;gap:9px;letter-spacing:.01em;}
.st::before{content:'';display:inline-block;width:4px;height:22px;background:linear-gradient(180deg,#6ba0ff,#2055d0);border-radius:3px;flex-shrink:0;box-shadow:0 2px 10px rgba(61,126,255,.5);}
/* Utilities */
.flex{display:flex;}.ic{align-items:center;}.jb{justify-content:space-between;}
.g6{gap:6px;}.mb12{margin-bottom:12px;}.tm{color:var(--tx2);}.tsm{font-size:12px;}
.mono{font-family:'IBM Plex Mono',monospace;}
.dvd{border:none;border-top:1px solid var(--bdr);margin:12px 0;}
/* Alert banners */
.aba{padding:9px 14px;font-size:12px;font-weight:500;display:flex;align-items:center;gap:7px;border-radius:8px;margin-bottom:12px;}
.aba-r{background:rgba(239,68,68,.09);border:1px solid rgba(239,68,68,.25);color:var(--rd);}
.aba-a{background:rgba(26,86,219,.09);border:1px solid rgba(26,86,219,.25);color:var(--am);}
.aba-g{background:rgba(16,185,129,.09);border:1px solid rgba(16,185,129,.25);color:var(--gr);}
/* Site status pills */
.sac{background:rgba(16,185,129,.12);color:var(--gr);border:1px solid rgba(16,185,129,.25);border-radius:4px;font-size:10px;font-weight:700;padding:2px 7px;}
.spa{background:rgba(26,86,219,.12);color:var(--am);border:1px solid rgba(26,86,219,.25);border-radius:4px;font-size:10px;font-weight:700;padding:2px 7px;}
.sco{background:rgba(59,130,246,.12);color:var(--bl);border:1px solid rgba(59,130,246,.25);border-radius:4px;font-size:10px;font-weight:700;padding:2px 7px;}
.scl{background:rgba(100,100,100,.12);color:var(--tx3);border:1px solid rgba(100,100,100,.25);border-radius:4px;font-size:10px;font-weight:700;padding:2px 7px;}
.ls{background:rgba(239,68,68,.12);color:var(--rd);border:1px solid rgba(239,68,68,.25);border-radius:3px;font-size:10px;font-weight:700;padding:1px 5px;}
/* Tab bar */
.tbar{display:flex;gap:0;margin-bottom:16px;background:var(--sur);border-bottom:2px solid var(--bdr);padding-bottom:0;overflow-x:auto;flex-wrap:nowrap;}
.tbar button{padding:9px 16px;border-radius:8px 8px 0 0;font-size:12px;font-weight:600;background:transparent;color:var(--tx2);border:none;white-space:nowrap;border-bottom:3px solid transparent;margin-bottom:-2px;cursor:pointer;transition:all .14s;}
.tbar button:hover{color:var(--tx);background:rgba(61,126,255,.05);}
.tbar button.ac{background:transparent;color:var(--am);border-bottom-color:var(--am);font-weight:700;}
/* Notifications */
.np{position:absolute;right:0;top:44px;width:290px;background:var(--sur);border:1px solid var(--bdr2);border-radius:10px;box-shadow:0 8px 28px rgba(0,0,0,.3);z-index:400;max-height:380px;overflow-y:auto;}
.ni2{padding:10px 12px;border-bottom:1px solid var(--bdr);font-size:12px;cursor:pointer;}
.ni2:last-child{border-bottom:none;}.ni2.seen{opacity:.4;}.ni2:hover{background:var(--sur2);}
/* Pie chart legend */
.pie-leg{display:flex;flex-direction:column;gap:6px;}
.pie-li{display:flex;align-items:center;gap:7px;font-size:12px;}
.pie-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0;}
/* Attendance calendar */
.aday{aspect-ratio:1;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;cursor:pointer;border:1px solid transparent;min-height:32px;}
.apr{background:rgba(16,185,129,.18);color:var(--gr);border-color:rgba(16,185,129,.28);}
.aab{background:rgba(239,68,68,.1);color:var(--rd);border-color:rgba(239,68,68,.2);}
.alv{background:rgba(59,130,246,.1);color:var(--bl);border-color:rgba(59,130,206,.2);}
.aem{background:var(--sur2);color:var(--tx3);}.atd{border-color:var(--am)!important;}
/* AI dots */
.td{width:5px;height:5px;background:var(--tx3);border-radius:50%;animation:bn 1.2s infinite;display:inline-block;}
.td:nth-child(2){animation-delay:.2s;}.td:nth-child(3){animation-delay:.4s;}
@keyframes bn{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-5px)}}
.fi{animation:fi .2s ease;}@keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
/* Calculator */
.calc-wrap{position:absolute;top:54px;right:0;width:265px;background:var(--sur);border:1px solid var(--bdr2);border-radius:12px;box-shadow:0 12px 40px rgba(0,0,0,.4);z-index:500;padding:12px;}
.calc-disp{background:var(--bg);border:1px solid var(--bdr);border-radius:8px;padding:8px 12px;margin-bottom:8px;text-align:right;}
.calc-expr{font-size:10px;color:var(--tx3);min-height:14px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.calc-num{font-family:'IBM Plex Mono',monospace;font-size:22px;font-weight:700;color:var(--tx);}
.calc-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:4px;}
.cb{padding:10px 4px;border-radius:6px;font-size:14px;font-weight:600;background:var(--sur2);color:var(--tx);border:1px solid var(--bdr);cursor:pointer;text-align:center;}
.cb:hover{background:var(--bdr2);}.cb-op{background:rgba(26,86,219,.12);color:var(--am);border-color:rgba(26,86,219,.25);}
.cb-eq{background:var(--am);color:#0C0E14;}.cb-cl{background:rgba(239,68,68,.12);color:var(--rd);}
/* DateTime topbar */
.dtbar{display:flex;flex-direction:column;align-items:flex-end;font-size:10px;color:var(--tx3);line-height:1.3;min-width:70px;}
.dtbar .t{font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:600;color:var(--tx);}
/* Search */
#gsw{position:relative;}
#gsw input{width:140px;font-size:12px;padding:6px 10px;}
.gsr{position:absolute;top:36px;right:0;width:270px;background:var(--sur);border:1px solid var(--bdr2);border-radius:9px;box-shadow:0 8px 24px rgba(0,0,0,.35);z-index:500;max-height:280px;overflow-y:auto;}
.gsri{padding:9px 12px;border-bottom:1px solid var(--bdr);cursor:pointer;font-size:12px;}
.gsri:hover{background:var(--sur2);}.gsri:last-child{border-bottom:none;}
/* Site filter bar */
.sfbar{display:flex;align-items:center;gap:10px;margin-bottom:14px;padding:9px 13px;background:var(--sur2);border-radius:8px;border:1px solid var(--bdr);}
.sfbar label{font-size:12px;font-weight:600;color:var(--tx2);white-space:nowrap;margin:0;}
.sfbar select{max-width:200px;}
/* Toggle switch */
.tog{width:48px;height:28px;background:var(--bdr2);border-radius:14px;position:relative;cursor:pointer;transition:background .25s;flex-shrink:0;display:inline-block;}
.tog.on{background:var(--am);}
.tog::after{content:'';position:absolute;left:4px;top:4px;width:20px;height:20px;background:#fff;border-radius:10px;transition:transform .25s;box-shadow:0 1px 4px rgba(0,0,0,.3);}
.tog.on::after{transform:translateX(20px);}
/* Settings */
.set-sec{margin-bottom:16px;padding:18px;background:linear-gradient(145deg,var(--sur),var(--sur2));border:1px solid var(--bdr);border-radius:10px;}
.set-sec h3{font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:700;margin:0 0 12px;color:var(--am);}
.pf-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--bdr);font-size:13px;gap:8px;}
.pf-row:last-child{border-bottom:none;}
.pf-row .pl{color:var(--tx2);font-size:12px;}
.pf-row .pv{font-weight:600;}

/* ─── CHAT — mobile-first ─── */
.chat-root{display:flex;height:calc(100vh - 110px);border:1px solid var(--bdr);border-radius:10px;overflow:hidden;background:var(--sur);}
/* Sidebar */
.chat-sidebar{width:220px;border-right:1px solid var(--bdr);display:flex;flex-direction:column;flex-shrink:0;background:var(--sur);}
.chat-sidebar-head{padding:10px 12px;border-bottom:1px solid var(--bdr);font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;display:flex;align-items:center;justify-content:space-between;}
.chat-list{flex:1;overflow-y:auto;}
.chat-item{padding:10px 13px;border-bottom:1px solid var(--bdr);cursor:pointer;position:relative;}
.chat-item:hover,.chat-item.active{background:var(--sur2);}
.chat-item.active{border-left:3px solid var(--am);}
/* Chat main */
.chat-main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;}
.chat-main-head{padding:10px 14px;border-bottom:1px solid var(--bdr);display:flex;align-items:center;gap:10px;flex-shrink:0;}
.chat-msgs{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:8px;}
.chat-empty{flex:1;display:flex;align-items:center;justify-content:center;color:var(--tx3);flex-direction:column;gap:10px;}
.chat-input-row{padding:10px 12px;border-top:1px solid var(--bdr);display:flex;gap:8px;align-items:center;flex-shrink:0;}
/* Message bubbles */
.msg-row{display:flex;gap:6px;max-width:78%;align-items:flex-end;}
.msg-row.me{align-self:flex-end;flex-direction:row-reverse;}
.msg-row.them{align-self:flex-start;flex-direction:row;}
.msg-bubble{background:var(--sur2);border:1px solid var(--bdr);border-radius:4px 12px 12px 12px;padding:8px 11px;position:relative;}
.msg-bubble.me{background:rgba(26,86,219,.14);border-color:rgba(26,86,219,.28);border-radius:12px 4px 12px 12px;}
/* ID card */
@media print{.no-print{display:none!important;}.id-card-print{display:block!important;}}
.msg-quote{background:rgba(255,255,255,.07);border-left:2px solid var(--am);border-radius:3px;padding:4px 8px;margin-bottom:5px;font-size:10px;color:var(--tx2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:220px;}
body.light .msg-quote{background:rgba(0,0,0,.07);}
/* Message action button — always visible small ⋮ */
.msg-menu-btn{background:var(--sur2);border:1px solid var(--bdr);color:var(--tx3);font-size:11px;width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;align-self:flex-start;margin-top:2px;transition:opacity .15s;}
.msg-menu-btn:hover{background:var(--bdr2);color:var(--tx);}
/* Message context menu */
.msg-ctx{position:fixed;background:var(--sur);border:1px solid var(--bdr2);border-radius:8px;padding:4px;box-shadow:0 6px 20px rgba(0,0,0,.35);z-index:3000;min-width:130px;}
.msg-ctx button{display:block;width:100%;text-align:left;padding:7px 12px;border-radius:5px;font-size:13px;color:var(--tx);background:none;white-space:nowrap;}
.msg-ctx button:hover{background:var(--sur2);}
/* Image viewer */
.img-vwr{position:fixed;inset:0;background:rgba(0,0,0,.96);z-index:4000;display:flex;flex-direction:column;}
.img-vwr-top{padding:12px 16px;display:flex;gap:8px;align-items:center;flex-shrink:0;}
.img-vwr-body{flex:1;display:flex;align-items:center;justify-content:center;padding:12px;}
.img-vwr-body img{max-width:95vw;max-height:82vh;object-fit:contain;border-radius:8px;}
/* Reply bar */
.reply-bar{padding:7px 12px;border-top:1px solid var(--bdr);display:flex;align-items:center;gap:8px;background:var(--sur2);flex-shrink:0;}
.reply-bar-txt{flex:1;font-size:11px;color:var(--tx2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
/* Unread */
.unread-dot{width:9px;height:9px;background:#22C55E;border-radius:50%;flex-shrink:0;}
.unread-count{background:#22C55E;color:#fff;font-size:9px;font-weight:700;padding:1px 5px;border-radius:10px;min-width:18px;text-align:center;line-height:16px;}
/* Pinned announcement */
.pm{background:rgba(26,86,219,.06);border:1px solid rgba(26,86,219,.18);border-radius:7px;padding:8px 11px;margin-bottom:9px;font-size:12px;}
.pm .pl{font-size:9px;font-weight:700;letter-spacing:.08em;color:var(--am);margin-bottom:3px;}
/* Chat images */
.chat-img{max-width:200px;max-height:160px;border-radius:8px;display:block;cursor:pointer;}
.chat-vid{max-width:200px;border-radius:8px;display:block;}
/* Forward modal list items */
.fwd-item{padding:10px 13px;border-bottom:1px solid var(--bdr);cursor:pointer;display:flex;align-items:center;gap:9px;}
.fwd-item:hover{background:var(--sur2);}
/* ═══ PROFESSIONAL UI OVERHAUL ═══ */
/* Stat cards - elevated with icon watermark */
.sc,.sc2,.sc3,.sc4{background:var(--sur);border:1px solid var(--bdr);border-radius:14px;padding:16px 18px;position:relative;overflow:hidden;transition:transform .15s,box-shadow .15s;}
.sc:hover,.sc2:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(0,0,0,.25);}
.sc::after,.sc2::after,.sc3::after,.sc4::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.03),transparent);pointer-events:none;}
.sv{font-family:'Barlow Condensed',sans-serif;font-size:28px;font-weight:800;line-height:1;margin:6px 0 4px;letter-spacing:-.5px;}
.sl{font-size:10px;color:var(--tx3);text-transform:uppercase;letter-spacing:.1em;font-weight:700;}
/* Cards elevated */
.card{background:var(--sur);border:1px solid var(--bdr);border-radius:14px;padding:18px;transition:box-shadow .15s;}
.card:hover{box-shadow:0 4px 20px rgba(0,0,0,.18);}
/* Tables - pro styling */
table{width:100%;border-collapse:collapse;}
th{background:rgba(255,255,255,.03);color:var(--tx3);font-size:10px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;padding:12px 14px;text-align:left;border-bottom:2px solid var(--bdr);}
td{padding:12px 14px;font-size:13px;color:var(--tx);vertical-align:middle;border-bottom:1px solid rgba(255,255,255,.03);}
tr:last-child td{border-bottom:none;}
tr:hover td{background:rgba(74,126,245,.05);}
tbody tr:nth-child(even) td{background:rgba(255,255,255,.012);}
/* Section heading - more prominent */
.st{font-family:'Barlow Condensed',sans-serif;font-size:21px;font-weight:800;margin-bottom:18px;display:flex;align-items:center;gap:10px;letter-spacing:.02em;}
.st::before{content:'';display:inline-block;width:4px;height:22px;background:linear-gradient(180deg,#7aa8ff,#2960e0);border-radius:3px;flex-shrink:0;box-shadow:0 0 12px rgba(74,126,245,.5);}
/* Tab bar - cleaner */
.tbar{display:flex;gap:1px;margin-bottom:18px;background:var(--sur2);border-radius:10px;padding:4px;overflow-x:auto;border:1px solid var(--bdr);}
.tbar button{padding:7px 14px;border-radius:7px;font-size:12px;font-weight:600;background:none;color:var(--tx3);border:none;white-space:nowrap;cursor:pointer;transition:all .14s;flex-shrink:0;}
.tbar button.ac{background:var(--am);color:#fff;box-shadow:0 2px 10px rgba(74,126,245,.4);font-weight:700;}
.tbar button:not(.ac):hover{background:rgba(255,255,255,.06);color:var(--tx);}
/* Buttons */
.bp{background:linear-gradient(135deg,#4a7ef5,#2960e0);color:#fff;box-shadow:0 3px 14px rgba(41,96,224,.4);border:1px solid transparent;}
.bp:hover{background:linear-gradient(135deg,#6ba0ff,#4a7ef5);box-shadow:0 5px 22px rgba(74,126,245,.5);transform:translateY(-1px);}
/* Main content area */
#mn{margin-left:var(--sw);display:flex;flex-direction:column;min-height:100vh;}
.fi{padding:20px 24px;animation:fi .18s ease;}
/* Form row improvements */
.fr{margin-bottom:14px;}
label{font-size:11px;color:var(--tx3);font-weight:700;display:block;margin-bottom:5px;letter-spacing:.04em;text-transform:uppercase;}
input,select,textarea{font-family:'IBM Plex Sans',sans-serif;color:var(--tx);background:rgba(255,255,255,.04);border:1px solid var(--bdr2);border-radius:10px;padding:10px 13px;font-size:13px;outline:none;width:100%;transition:border-color .18s,box-shadow .18s,background .18s;}
input:focus,select:focus,textarea:focus{border-color:var(--am);box-shadow:0 0 0 3px rgba(74,126,245,.15);background:rgba(74,126,245,.04);}
/* Page header */
.ph{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:10px;}
/* Empty state */
.empty{text-align:center;padding:48px 20px;color:var(--tx3);}
.empty-icon{font-size:40px;margin-bottom:12px;opacity:.5;}
.empty-msg{font-size:14px;font-weight:600;color:var(--tx2);margin-bottom:6px;}
.empty-sub{font-size:12px;}
/* Topbar search */
#gsw input{background:rgba(255,255,255,.05);border-color:rgba(255,255,255,.08);}
#gsw input:focus{background:rgba(74,126,245,.08);}
/* Sidebar logo area */
#sb .logo{background:rgba(74,126,245,.07);border-bottom:1px solid rgba(255,255,255,.06);}
/* Nav group labels */
/* Active nav */
#sb .ni.ac{background:linear-gradient(90deg,rgba(74,126,245,.18),rgba(74,126,245,.05));color:#7aa8ff;font-weight:700;}
#sb .ni.ac::before{content:'';position:absolute;left:0;top:3px;bottom:3px;width:3px;background:linear-gradient(180deg,#7aa8ff,#2960e0);border-radius:0 3px 3px 0;box-shadow:0 0 8px rgba(74,126,245,.6);}
/* Grid */
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;}
.mb12{margin-bottom:14px;}
/* Layout */
#sb{width:var(--sw);background:var(--sur);border-right:1px solid var(--bdr);position:fixed;left:0;top:0;bottom:0;z-index:300;display:flex;flex-direction:column;transition:transform .28s;overflow:hidden;box-shadow:2px 0 16px rgba(0,0,0,.08);}
#sb .logo{padding:10px 13px;border-bottom:1px solid var(--bdr);display:flex;align-items:center;min-height:54px;}
#sb .logo img{height:30px;width:auto;object-fit:contain;}
#sb nav{padding:6px 6px;flex:1;overflow-y:auto;overflow-x:hidden;}
.ngrp{font-size:9px;font-weight:800;letter-spacing:.08em;color:var(--tx3);padding:10px 8px 3px;text-transform:uppercase;}
#sb .ni{display:flex;align-items:center;gap:9px;padding:7px 9px;border-radius:8px;cursor:pointer;color:var(--tx2);font-size:12px;font-weight:500;position:relative;margin-bottom:1px;min-height:34px;transition:all .12s;}
#sb .ni:hover{background:var(--sur2);color:var(--tx);}
#sb .ni.ac{background:linear-gradient(90deg,rgba(61,126,255,.18),rgba(61,126,255,.04));color:#6ba0ff;font-weight:700;}
#sb .ni.ac::before{content:'';position:absolute;left:0;top:4px;bottom:4px;width:3px;background:linear-gradient(180deg,#4a7ef5,#1a56db);border-radius:0 3px 3px 0;}
#sb .ni .ico{width:20px;height:16px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:transform .12s;color:var(--tx3);}#sb .ni .ico svg{width:15px;height:15px;}#sb .ni.ac .ico{color:var(--am);}#sb .ni:hover .ico{color:var(--tx);}
#sb .ni:hover .ico{transform:scale(1.12);}
#sb .nb{background:var(--rd);color:#fff;font-size:9px;font-weight:700;padding:1px 5px;border-radius:10px;margin-left:auto;}
#sb .ua{padding:10px 12px;border-top:1px solid var(--bdr);flex-shrink:0;background:var(--sur);position:relative;z-index:2;}
.ua-user{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.ua-info{flex:1;min-width:0;}
.ua-name{font-weight:700;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ua-role{font-size:10px;color:var(--tx3);}
.ua-acts{display:flex;gap:5px;}
.ua-btn{flex:1;padding:9px 4px;border:1px solid var(--bdr);background:var(--sur2);color:var(--tx2);border-radius:8px;cursor:pointer;font-size:11px;font-weight:700;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:4px;}
.ua-btn:hover{border-color:var(--am);color:var(--am);background:rgba(26,86,219,.08);}
.ua-btn-d{flex:1;padding:9px 4px;border:1px solid rgba(239,68,68,.3);background:rgba(239,68,68,.07);color:var(--rd);border-radius:8px;cursor:pointer;font-size:11px;font-weight:700;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:4px;}
.ua-btn-d:hover{background:var(--rd);color:#fff;border-color:var(--rd);}
#mn{margin-left:var(--sw);min-height:100vh;display:flex;flex-direction:column;}
#tb{background:var(--sur);border-bottom:1px solid var(--bdr);padding:0 14px;height:54px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;flex-shrink:0;}
#tb .pt{font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:700;}
#tb .tr{display:flex;align-items:center;gap:6px;}
#ct{padding:14px;flex:1;}
/* Login */
#lp{height:100vh;min-height:100vh;display:flex;align-items:center;justify-content:center;background:#060d1a;position:relative;overflow:hidden;}
.lp-bg{position:absolute;inset:0;width:100%;height:100%;display:block;}
.lp-scene{display:none;}
.lp-form{position:relative;z-index:10;width:100%;max-width:420px;padding:16px;}

/* ── DARK MODE CARD ── */
.lb{width:100%;background:rgba(255,255,255,.08);backdrop-filter:blur(28px);-webkit-backdrop-filter:blur(28px);border:1px solid rgba(255,255,255,.18);border-radius:22px;padding:36px 32px;box-shadow:0 8px 32px rgba(0,0,0,.4),inset 0 1px 0 rgba(255,255,255,.15);}
.lbr{text-align:center;margin-bottom:24px;}
.lbr img{height:54px;width:auto;margin:0 auto 10px;display:block;filter:drop-shadow(0 0 14px rgba(74,126,245,.6));}
.lbr h2{font-family:'Barlow Condensed',sans-serif;font-size:26px;font-weight:900;color:#fff;margin:0 0 3px;letter-spacing:.04em;}
.lbr p{color:rgba(255,255,255,.45);font-size:12px;margin:0;letter-spacing:.04em;}
.lb label{color:rgba(255,255,255,.65);font-size:12px;font-weight:500;}
.lb input{background:rgba(255,255,255,.09);border:1px solid rgba(255,255,255,.18);color:#fff;border-radius:10px;}
.lb input:focus{border-color:var(--am);background:rgba(74,126,245,.15);box-shadow:0 0 0 3px rgba(74,126,245,.25);}
.lb input::placeholder{color:rgba(255,255,255,.28);}
.lq{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:14px;}
.qb{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);border-radius:9px;padding:9px 8px;text-align:center;cursor:pointer;transition:all .15s;}
.qb:hover{border-color:rgba(74,126,245,.6);background:rgba(74,126,245,.14);transform:translateY(-1px);}
.qb .qr{font-size:9px;font-weight:800;letter-spacing:.07em;text-transform:uppercase;color:var(--aml);margin-bottom:2px;}
.qb .qn{font-size:11px;font-weight:600;color:rgba(255,255,255,.75);}

/* ── LIGHT MODE OVERRIDES ── */
body.light #lp{background:linear-gradient(135deg,#dbeafe 0%,#eff6ff 40%,#e0f2fe 100%);}
body.light .lp-bg{opacity:.07;}
body.light .lb{background:rgba(255,255,255,.72);backdrop-filter:blur(28px);-webkit-backdrop-filter:blur(28px);border:1px solid rgba(255,255,255,.9);box-shadow:0 8px 32px rgba(30,64,175,.12),inset 0 1px 0 rgba(255,255,255,.9);}
body.light .lbr h2{color:#0f172a;}
body.light .lbr p{color:#64748b;}
body.light .lb label{color:#475569;}body.light #keepme+label{color:#475569!important;}
body.light .lb input{background:rgba(255,255,255,.8);border:1px solid #cbd5e1;color:#0f172a;}
body.light .lb input::placeholder{color:#94a3b8;}
body.light .lb input:focus{border-color:#3b82f6;background:#fff;box-shadow:0 0 0 3px rgba(59,130,246,.15);}
body.light .qb{background:rgba(255,255,255,.6);border:1px solid rgba(203,213,225,.8);}
body.light .qb:hover{border-color:#3b82f6;background:rgba(59,130,246,.07);}
body.light .qb .qr{color:#1d4ed8;}
body.light .qb .qn{color:#334155;}
@media(max-width:600px){.lp-form{padding:12px;}.lb{padding:28px 20px;}}
/* Mobile hamburger and bottom nav */
#mmt{display:none;background:none;color:var(--tx);font-size:22px;padding:6px;border-radius:5px;min-width:36px;min-height:36px;align-items:center;justify-content:center;}
#bnav{display:none;position:fixed;bottom:0;left:0;right:0;height:60px;background:var(--sur);border-top:1px solid var(--bdr);z-index:200;justify-content:space-around;align-items:center;padding-bottom:env(safe-area-inset-bottom);box-shadow:0 -4px 20px rgba(0,0,0,.1);}
#bnav .bi{display:flex;flex-direction:column;align-items:center;gap:3px;padding:4px 2px;cursor:pointer;color:var(--tx3);font-size:9px;font-weight:700;position:relative;min-width:52px;min-height:48px;justify-content:center;transition:color .15s;}
#bnav .bi.ac{color:var(--am);} #bnav .bi.ac::before{content:"";position:absolute;top:3px;left:50%;transform:translateX(-50%);width:28px;height:3px;background:var(--am);border-radius:0 0 3px 3px;}#bnav .bi.ac .bn svg{stroke:var(--am);}#bnav .bi .bn{font-size:0;display:flex;align-items:center;justify-content:center;width:24px;height:24px;} #bnav .bi .bn svg{width:24px;height:24px;stroke:currentColor;fill:none;}#bnav .bi .bn svg{width:20px;height:20px;stroke:var(--tx3);transition:stroke .15s;}
#bnav .bi .bn{font-size:18px;}
#bnav .bb{position:absolute;top:2px;right:2px;background:var(--rd);color:#fff;font-size:9px;font-weight:700;padding:0 3px;border-radius:7px;}
/* ─── RESPONSIVE ─── */
@media(max-width:900px){
  #mmt{display:inline-flex;}
  #sb{transform:translateX(-100%);}

  #mn{margin-left:0!important;padding-bottom:60px;}
  #bnav{display:flex;}
  .g2,.g3,.g4,.g5,.fg,.fg3{grid-template-columns:1fr!important;}
  .g2.keep2{grid-template-columns:1fr 1fr!important;}
  .mo{max-width:100%;max-height:88vh;}
  #ct{padding:10px;}
  #tb{padding:0 10px;}
  #gsw input{width:100px;}
  .calc-wrap{width:260px;right:-10px;}
  .fs-body{padding:12px;}
  /* Chat mobile: sidebar OR chat, full width */
  .chat-root{flex-direction:column;height:calc(100vh - 130px);}
  .chat-sidebar{width:100%;border-right:none;border-bottom:1px solid var(--bdr);}
  .chat-sidebar.mobile-hide{display:none;}
  .chat-main.mobile-hide{display:none;}
  .dtbar{display:none;}
  #gsw{display:none;}
}
@media(max-width:480px){

  .chat-root{height:calc(100vh - 125px);}
}

  XLSX.writeFile(wb,(fname||'export')+'.xlsx');
}

function SvgBar(props){
  var data=props.data,col=props.col||'var(--am)';
  if(!data||!data.length)return null;
  var max=Math.max.apply(null,data.map(function(d){return d.v;}))||1;
  var n=data.length;
  var vw=Math.max(260,n*56);
  var vh=170,barW=Math.min(38,vw/n*0.52),gap=vw/n,plotB=30,plotT=15;
  return <div style={{width:'100%',overflowX:n>5?'auto':'visible',paddingBottom:4}}>
  <svg viewBox={'0 0 '+vw+' '+vh} style={{width:n>5?vw+'px':'100%',minWidth:'100%',height:vh}} preserveAspectRatio="xMidYMid meet">
  {[0,25,50,75,100].map(function(pct){
  var y=plotT+((100-pct)/100)*(vh-plotB-plotT);
  return <g key={pct}>
  <line x1={28} y1={y} x2={vw-4} y2={y} stroke="var(--bdr2)" strokeWidth="0.8" strokeDasharray="4,3"/>
  <text x={24} y={y+3.5} textAnchor="end" fontSize="9" fill="var(--tx3)">{Math.round(max*pct/100/1000)}K</text>
  </g>;
  })}
  {data.map(function(d,i){
  var bh=Math.max(4,(d.v/max)*(vh-plotB-plotT));
  var cx=gap*i+gap/2,by=vh-plotB-bh,barCol=d.col||col;
  return <g key={i}>
  <rect x={cx-barW/2} y={by} width={barW} height={bh} fill={barCol} rx="4" opacity="1"/>
  {d.v>0&&<text x={cx} y={by-6} textAnchor="middle" fontSize="10" fontWeight="700" fill={barCol}>{d.vl||''}</text>}
  <text x={cx} y={vh-12} textAnchor="middle" fontSize="10" fill="var(--tx2)" fontWeight="600">{d.l}</text>
  </g>;
  })}
  <line x1={28} y1={vh-plotB} x2={vw-4} y2={vh-plotB} stroke="var(--bdr)" strokeWidth="1.2"/>
  </svg>
  </div>;
}

function SvgLine(props){
  var data=props.data,col=props.col||'var(--am)',id2=props.id||'l';
  if(!data||data.length<2)return null;
  var max=Math.max.apply(null,data.map(function(d){return d.v;}))||1;
  var n=data.length,vw=320,vh=170,pad=34,padB=30,padT=18;
  var plotW=vw-pad-6,plotH=vh-padB-padT;
  var pts=data.map(function(d,i){return{x:pad+(i/(n-1))*plotW,y:padT+plotH-(d.v/max)*plotH,v:d.v,l:d.l};});
  var path='M'+pts.map(function(p){return p.x.toFixed(1)+','+p.y.toFixed(1);}).join(' L');
  var area='M'+pts[0].x+','+(padT+plotH)+' '+pts.map(function(p){return 'L'+p.x.toFixed(1)+','+p.y.toFixed(1);}).join(' ')+' L'+pts[pts.length-1].x+','+(padT+plotH)+' Z';
  return <svg viewBox={'0 0 '+vw+' '+vh} style={{width:'100%',height:vh}}>
  <defs>
  <linearGradient id={'lg_'+id2} x1="0" y1="0" x2="0" y2="1">
  <stop offset="0%" stopColor={col} stopOpacity="0.35"/>
  <stop offset="100%" stopColor={col} stopOpacity="0.03"/>
  </linearGradient>
  </defs>
  {[0,25,50,75,100].map(function(pct){
  var y=padT+plotH-(pct/100)*plotH;
  return <g key={pct}>
  <line x1={pad} y1={y} x2={pad+plotW} y2={y} stroke="var(--bdr2)" strokeWidth="0.8" strokeDasharray="4,3"/>
  <text x={pad-4} y={y+3.5} textAnchor="end" fontSize="9" fill="var(--tx3)">{Math.round(max*pct/100/1000)}K</text>
  </g>;
  })}
  <path d={area} fill={'url(#lg_'+id2+')'}/>
  <path d={path} fill="none" stroke={col} strokeWidth="2.5" strokeLinejoin="round"/>
  {pts.map(function(p,i){
  var isLast=i===pts.length-1;
  return <g key={i}>
  <circle cx={p.x} cy={p.y} r={isLast?5.5:4} fill={col} stroke="var(--sur)" strokeWidth="2"/>
  {(isLast||i===0)&&<text x={p.x} y={p.y-10} textAnchor="middle" fontSize="10" fontWeight="700" fill={col}>{Math.round(p.v/1000)}K</text>}
  <text x={p.x} y={padT+plotH+16} textAnchor="middle" fontSize="9.5" fill="var(--tx2)">{p.l}</text>
  </g>;
  })}
  <line x1={pad} y1={padT+plotH} x2={pad+plotW} y2={padT+plotH} stroke="var(--bdr)" strokeWidth="1.2"/>
  </svg>;
}

function Gauge(props){
  var pct=Math.min(100,Math.max(0,props.pct||0));
  var col=pct>80?'var(--rd)':pct>60?'var(--am)':'var(--gr)';
  var r=36,cx=52,cy=58;
  function arc(deg){var rad=(deg-90)*Math.PI/180;return{x:cx+r*Math.cos(rad),y:cy+r*Math.sin(rad)};}
  var s2=arc(-135),e2=arc(270*pct/100-135),big=pct>50?1:0;
  return <svg viewBox="0 0 104 76" style={{width:'100%',height:76}}>
  <path d={'M '+arc(-135).x+' '+arc(-135).y+' A '+r+' '+r+' 0 1 1 '+arc(135).x+' '+arc(135).y} fill="none" stroke="var(--bdr2)" strokeWidth="8" strokeLinecap="round"/>
  {pct>0&&<path d={'M '+s2.x+' '+s2.y+' A '+r+' '+r+' 0 '+big+' 1 '+e2.x+' '+e2.y} fill="none" stroke={col} strokeWidth="8" strokeLinecap="round"/>}
  <text x={cx} y={cy+2} textAnchor="middle" fontSize="16" fontWeight="800" fill={col}>{pct}%</text>
  <text x={cx} y={cx+23} textAnchor="middle" fontSize="8.5" fill="var(--tx2)">{(props.label||'').substring(0,14)}</text>
  </svg>;
}

function GanttChart(props){var lang=props.lang||'en';
  var lang=props.lang||'en';
  var P=props,sites=P.sites||[];
  if(!sites.length)return <div style={{color:'var(--tx3)',padding:20,textAlign:'center'}}>No sites configured.</div>;
  var now=new Date();
  var minD=sites.reduce(function(mn,s){return s.start&&new Date(s.start)<mn?new Date(s.start):mn;},new Date(now.getTime()-180*86400000));
  var maxD=sites.reduce(function(mx,s){return s.end&&new Date(s.end)>mx?new Date(s.end):mx;},new Date(now.getTime()+90*86400000));
  var span=maxD-minD||1;
  function px(d){return Math.max(0,Math.min(100,(new Date(d)-minD)/span*100));}
  function sSpend(sid){return[P.purchases,P.fuel,P.misc,P.labour].reduce(function(acc,arr){return acc+(arr||[]).filter(function(x){return x.siteId===sid;}).reduce(function(a,x){return a+(x.base||0)+(x.gstAmt||0)+(x.cost||0)+(x.amt||0)+(x.total||0);},0);},0);}
  var todayPx=px(now);
  var months=[];var cur=new Date(minD);cur.setDate(1);
  while(cur<=maxD){months.push(new Date(cur));cur.setMonth(cur.getMonth()+1);}
  return <div style={{overflowX:'auto'}}>
  <div style={{minWidth:500}}>
  <div style={{marginLeft:132,marginBottom:6,position:'relative',height:16}}>
  {months.map(function(m,i){var p=px(m);return p>=0&&p<=100?<div key={i} style={{position:'absolute',left:p+'%',fontSize:9,color:'var(--tx3)',whiteSpace:'nowrap'}}>{m.toLocaleDateString('en',{month:'short',year:'2-digit'})}</div>:null;})}
  </div>
  {sites.map(function(s){
  if(!s.start)return null;
  var sp=px(s.start),ep=s.end?px(s.end):Math.min(100,px(new Date(now.getTime()+30*86400000)));
  var spend=sSpend(s.id),pp=s.budget?Math.min(100,Math.round(spend/s.budget*100)):0;
  var col=s.status==='completed'?'#10b981':s.status==='paused'?'#6b7280':pp>80?'#ef4444':pp>50?'#f97316':'var(--am)';
  return <div key={s.id} style={{display:'flex',alignItems:'center',marginBottom:7}}>
  <div style={{width:130,fontSize:11,fontWeight:600,paddingRight:6,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',flexShrink:0}}>{s.name}</div>
  <div style={{flex:1,height:24,background:'var(--sur2)',borderRadius:4,position:'relative',border:'1px solid var(--bdr)'}}>
  <div style={{position:'absolute',left:todayPx+'%',top:0,bottom:0,width:2,background:'var(--am)',zIndex:3,borderRadius:1}}></div>
  <div style={{position:'absolute',left:sp+'%',width:Math.max(1,ep-sp)+'%',top:2,height:20,background:col,borderRadius:3,opacity:0.88,display:'flex',alignItems:'center',paddingLeft:6,overflow:'hidden'}}>
  <span style={{fontSize:10,color:'#fff',fontWeight:700,whiteSpace:'nowrap'}}>{pp}% budget</span>
  </div>
  </div>
  <div style={{width:46,fontSize:10,color:col,fontWeight:700,textAlign:'right',paddingLeft:6}}>{pp}%</div>
  </div>;
  })}
  <div style={{marginLeft:132,marginTop:8,display:'flex',gap:10,flexWrap:'wrap'}}>
  {[[lang==='hi'?'ट्रैक पर':'On Track','var(--am)'],['Watch','#f97316'],[lang==='hi'?'बजट से अधिक':'Over Budget','#ef4444'],['Done','#10b981'],['Paused','#6b7280']].map(function(x){return <span key={x[0]} style={{display:'inline-flex',alignItems:'center',gap:4,fontSize:10,color:'var(--tx2)'}}><span style={{width:10,height:10,borderRadius:2,background:x[1],display:'inline-block'}}></span>{x[0]}</span>;})}
  <span style={{fontSize:10,color:'var(--am)',fontWeight:700,marginLeft:4}}>\u2502 Today</span>
  </div>
  </div>
  </div>;
}
</script>

function IDCard(props){
  var emp=props.emp||{role:"",name:"",id:0},S=props.sites||[];
  var site=S.filter(function(s){return s.id===emp.siteId;})[0];
  var rc={'master_admin':'#1a3c6e','admin':'#2d1b69','foreman':'#0d5f3e'}[emp.role]||'#1a3c6e';
  var rl={'master_admin':'Master Admin','admin':'Senior Manager','foreman':'Site Foreman'}[emp.role]||emp.role;
  var eid='RAJ-'+String(emp.id).padStart(4,'0');
  function printCard(){
    var w=window.open('','_idc','width=400,height=620');
    if(!w){alert('Allow popups to print.');return;}
    var qd=document.createElement('div');
    try{new QRCode(qd,{text:eid+'|'+emp.name+'|'+emp.role,width:46,height:46});}catch(e){}
    setTimeout(function(){
      var qi=qd.querySelector('img'),qs=qi?qi.src:'';
      var ph=emp.photo?'<img src="'+emp.photo+'"/>':'<div style="width:100%;height:100%;background:'+rc+';display:flex;align-items:center;justify-content:center;font-size:36px;font-weight:800;color:#fff">'+emp.name.charAt(0)+'</div>';
      var rows='';
      rows+='<div class="field"><div class="f-lbl">ID No</div><div class="f-sep">:</div><div class="f-val">'+eid+'</div></div>';
      if(emp.phone)rows+='<div class="field"><div class="f-lbl">Phone</div><div class="f-sep">:</div><div class="f-val">'+emp.phone+'</div></div>';
      if(emp.email)rows+='<div class="field"><div class="f-lbl">Email</div><div class="f-sep">:</div><div class="f-val">'+emp.email+'</div></div>';
      if(site)rows+='<div class="field"><div class="f-lbl">Site</div><div class="f-sep">:</div><div class="f-val">'+site.name+'</div></div>';
      if(emp.bloodGroup)rows+='<div class="field"><div class="f-lbl">Blood Grp</div><div class="f-sep">:</div><div class="f-val"><span class="blood-b">'+emp.bloodGroup+'</span></div></div>';
      if(emp.emergencyContact)rows+='<div class="field"><div class="f-lbl">Emergency</div><div class="f-sep">:</div><div class="f-val">'+emp.emergencyContact+(emp.emergencyPhone?' · '+emp.emergencyPhone:'')+'</div></div>';
      if(emp.joinDate)rows+='<div class="field"><div class="f-lbl">Joined</div><div class="f-sep">:</div><div class="f-val">'+emp.joinDate+'</div></div>';
      var qrHtml=qs?'<img src="'+qs+'" style="width:52px;height:52px;display:block"/>':'<svg width="46" height="46" viewBox="0 0 46 46" fill="none"><rect x="2" y="2" width="16" height="16" rx="2" stroke="rgba(255,255,255,.7)" stroke-width="2.5" fill="none"/><rect x="28" y="2" width="16" height="16" rx="2" stroke="rgba(255,255,255,.7)" stroke-width="2.5" fill="none"/><rect x="2" y="28" width="16" height="16" rx="2" stroke="rgba(255,255,255,.7)" stroke-width="2.5" fill="none"/></svg>';
      var head=(window._IDTMPL_HEAD||'').replace('#1a3c6e',rc);
      w.document.write(head);
      w.document.write('<div class="card"><div class="top"><div class="wave"></div><div class="photo-ring">'+ph+'</div></div>');
      w.document.write('<div class="body"><div class="name">'+emp.name+'</div><div class="role-badge">'+rl+(emp.designation?' · '+emp.designation:'')+'</div><div class="eid-hdr">ID Number : '+eid+'</div><div class="fields">'+rows+'</div></div>');
      w.document.write('<div class="footer"><div class="co-wrap"><div class="co-icon" style="background:transparent;padding:2px">'+(typeof LOGO!=='undefined'?'<img src="'+LOGO+'" style="height:26px;object-fit:contain"/>':'🏗️')+'</div><div><div class="co-name">RAJ Construction</div><div class="co-sub"></div></div></div><div class="qr-frame">'+qrHtml+'</div></div></div>');
      var backCSS=(window._ID_BACK_CSS||'').replace(/ROLECOLOR/g,rc);
      var _logoSrc=typeof LOGO!=='undefined'?LOGO:'';
      var _logoTag=_logoSrc?'<img src="'+_logoSrc+'" style="height:28px;object-fit:contain"/>':"⚓";
      var backCard=(window._ID_BACK_CARD||'').replace(/ROLECOLOR/g,rc).replace('RAJLOGO_PLACEHOLDER',_logoTag);
      w.document.write('<style>'+backCSS+'</style>');
      w.document.write(backCard);
      w.document.write('<div class="actions no-print" style="margin-top:16px"><button class="pb" onclick="window.print()">🖨️ Print Both Sides</button><button class="cb" onclick="window.close()">Close</button></div>');
      w.document.write(window._IDTMPL_FOOT||'</body></html>');
      w.document.close();
    },280);
  }
  return <div style={{background:'var(--sur)',border:'2px solid var(--bdr)',borderRadius:12,overflow:'hidden',transition:'box-shadow .2s'}}
    onMouseEnter={function(e){e.currentTarget.style.boxShadow='0 6px 20px rgba(0,0,0,.15)';}}
    onMouseLeave={function(e){e.currentTarget.style.boxShadow='none';}}>
    <div style={{background:rc,padding:'14px 16px',display:'flex',alignItems:'center',gap:10}}>
      {emp.photo?<img src={emp.photo} style={{width:46,height:46,borderRadius:'50%',objectFit:'cover',border:'2px solid rgba(255,255,255,.4)',flexShrink:0}}/>:<div style={{width:46,height:46,borderRadius:'50%',background:'rgba(255,255,255,.2)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:19,color:'#fff',fontWeight:800,flexShrink:0}}>{emp.name.charAt(0)}</div>}
      <div style={{flex:1,minWidth:0}}>
        <div style={{color:'#fff',fontWeight:800,fontSize:14,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{emp.name}</div>

    </div>
    <div style={{padding:'10px 14px'}}>

      {site&&<div style={{fontSize:11,color:'var(--tx2)',marginBottom:3}}>📍 {site.name}</div>}
      {emp.phone&&<div style={{fontSize:11,color:'var(--tx2)',marginBottom:3}}>📱 {emp.phone}</div>}
      {emp.emergencyContact&&<div style={{fontSize:10,color:'var(--tx3)'}}>🆘 {emp.emergencyContact}{emp.emergencyPhone?' · '+emp.emergencyPhone:''}</div>}
    </div>
    <div style={{padding:'8px 14px',borderTop:'1px solid var(--bdr)',display:'flex',justifyContent:'flex-end'}}>
      <button className="btn bp bsm" style={{fontSize:11}} onClick={printCard}>🪪 Print ID Card</button>
    </div>
  </div>;
}

function Vendors(props){
  var user=props.user||{role:"",name:"",id:0},P=props,lang=props.lang||'en';
  var isAdmin=user.role==='admin'||user.role==='master_admin';
  var [showM,setShowM]=useState(false);
  var [editId,setEditId]=useState(null);
  var [selVendor,setSelVendor]=useState(null);
  var [srch,setSrch]=useState('');
  var [typeF,setTypeF]=useState('all');
  var TYPES=['Supplier','Contractor','Transporter','Labour Contractor','Fuel Vendor','Other'];
  var blank={name:'',phone:'',email:'',gstNo:'',address:'',type:'Supplier',notes:''};
  var [form,setForm]=useState(blank);
  function sf(k,v){setForm(function(p){var n=Object.assign({},p);n[k]=v;return n;});}
  function getVendorTx(vname){
  var nm=(vname||'').toLowerCase();
  var pur=(P.purchases||[]).filter(function(p){return (p.vendor||'').toLowerCase()===nm;});
  var bil=(P.bills||[]).filter(function(b){return (b.vendor||'').toLowerCase()===nm;});
  var mis=(P.misc||[]).filter(function(m){return (m.desc||'').toLowerCase().indexOf(nm)>=0;});
  var mch=(P.machinery||[]).filter(function(m){return (m.owner||'').toLowerCase()===nm;});
  var mchTx=[];
  mch.forEach(function(m){(m.usageLog||[]).forEach(function(e){mchTx.push({date:e.date,type:'Machinery',desc:m.name+(m.reg?' ['+m.reg+']':''),site:gSite(P.sites,e.siteId||m.currentSiteId).name,amt:e.cost||0,inv:m.reg||''});});});
  var all=pur.map(function(p){return{date:p.date,type:'Purchase',desc:gMat(P.mats,p.matId).name,site:gSite(P.sites,p.siteId).name,amt:p.base+(p.gstAmt||0),inv:p.inv||'',gst:p.gstAmt||0};})
  .concat(bil.map(function(b){return{date:b.date,type:'Bill',desc:b.invoiceNo?'Bill #'+b.invoiceNo:'Bill',site:b.siteId?gSite(P.sites,b.siteId).name:'N/A',amt:b.total||b.base||0,inv:b.invoiceNo||'',gst:b.gstAmt||0};}))
  .concat(mis.map(function(m){return{date:m.date,type:'Misc',desc:m.desc,site:gSite(P.sites,m.siteId).name,amt:m.amt||0,inv:'',gst:0};}))
  .concat(mchTx.map(function(t){return Object.assign({},t,{gst:0});}))
  .sort(function(a,b){return (b.date||'').localeCompare(a.date||'');});
  var tot=all.reduce(function(a,x){return a+x.amt;},0);
  var totGst=all.reduce(function(a,x){return a+(x.gst||0);},0);
  return{txns:all,total:tot,totGst:totGst,count:all.length,lastDate:all.length?all[0].date:'N/A'};
  }
  function save(){
  if(!form.name.trim()){alert('Vendor name required.');return;}
  var obj=Object.assign({},form,{id:editId||Date.now(),name:form.name.trim()});
  if(editId){upd(P.setVendors,editId,obj);}else{addItem(P.setVendors,obj);}
  addItem(P.setLog,{id:Date.now(),user:user.name,action:(editId?'Edited':'Added')+' vendor: '+form.name,time:sts(),type:'edit'});
  setShowM(false);setEditId(null);setForm(blank);
  }
  function startEdit(v){setForm({name:v.name||'',phone:v.phone||'',email:v.email||'',gstNo:v.gstNo||'',address:v.address||'',type:v.type||'Supplier',notes:v.notes||''});setEditId(v.id);setShowM(true);}
  var regNames={};
  (P.vendors||[]).forEach(function(v){regNames[v.name.toLowerCase()]=true;});
  var autoV=[];
  (P.purchases||[]).forEach(function(p){if(p.vendor&&!regNames[p.vendor.toLowerCase()]){regNames[p.vendor.toLowerCase()]=true;autoV.push({id:'a_'+p.vendor,name:p.vendor,type:'Supplier',auto:true});}});
  (P.bills||[]).forEach(function(b){if(b.vendor&&!regNames[b.vendor.toLowerCase()]){regNames[b.vendor.toLowerCase()]=true;autoV.push({id:'a_'+b.vendor,name:b.vendor,type:'Supplier',auto:true});}});
  (P.machinery||[]).forEach(function(m){if(m.owner&&!regNames[m.owner.toLowerCase()]){regNames[m.owner.toLowerCase()]=true;autoV.push({id:'a_m_'+m.id,name:m.owner,type:'Supplier',auto:true,source:'Machinery'});}});
  var combined=[].concat(P.vendors||[]).concat(autoV);
  var visible=combined.filter(function(v){
  if(typeF!=='all'&&(v.type||'Supplier')!==typeF)return false;
  if(srch){var s=srch.toLowerCase();return (v.name||'').toLowerCase().indexOf(s)>=0||(v.phone||'').indexOf(s)>=0||(v.gstNo||'').toLowerCase().indexOf(s)>=0;}
  return true;
  });
  function printAllVendors(){
  var rows=visible.map(function(v){var t=getVendorTx(v.name);return '<tr><td>'+v.name+'</td><td>'+(v.type||'Supplier')+'</td><td>'+(v.phone||'')+'</td><td>'+(v.gstNo||'')+'</td><td>'+t.count+'</td><td>'+INR(t.total)+'</td><td>'+t.lastDate+'</td></tr>';}).join('');
  pdfWin('<h2>Vendor Register \u2014 RAJ Construction</h2><div class="info"><div class="iv"><div class="l">Total Vendors</div><div class="v">'+visible.length+'</div></div></div><table><thead><tr><th>Name</th><th>Type</th><th>Phone</th><th>GST No.</th><th>Transactions</th><th>Total Business</th><th>Last Txn</th></tr></thead><tbody>'+rows+'</tbody></table>');
  }
  var selV=selVendor?combined.filter(function(v){return v.id===selVendor;})[0]:null;
  var selT=selV?getVendorTx(selV.name):null;
  return <div className="fi">
  {selV&&<div className="ov" onClick={function(){setSelVendor(null);}}>
  <div className="mo" style={{maxWidth:740}} onClick={function(e){e.stopPropagation();}}>
  <div className="mt">🏪 {selV.name}
  <div style={{marginLeft:'auto',display:'flex',gap:8}}>
  <button className="btn bs bsm" onClick={function(){
  var rows=selT.txns.map(function(tx){return '<tr><td>'+tx.date+'</td><td>'+tx.type+'</td><td>'+tx.desc+'</td><td>'+tx.site+'</td><td>'+(tx.inv||'N/A')+'</td><td>'+(tx.gst>0?INR(tx.gst):'\u2014')+'</td><td>'+INR(tx.amt)+'</td></tr>';}).join('');
  pdfWin('<h2>Vendor History \u2014 '+selV.name+'</h2><div class="info"><div class="iv"><div class="l">Total Business</div><div class="v">'+INR(selT.total)+'</div></div><div class="iv"><div class="l">Transactions</div><div class="v">'+selT.count+'</div></div><div class="iv"><div class="l">Last Txn</div><div class="v">'+selT.lastDate+'</div></div><div class="iv"><div class="l">Type</div><div class="v">'+(selV.type||'N/A')+'</div></div>'+(selV.phone?'<div class="iv"><div class="l">Phone</div><div class="v">'+selV.phone+'</div></div>':'')+(selV.gstNo?'<div class="iv"><div class="l">GST No.</div><div class="v">'+selV.gstNo+'</div></div>':'')+'</div>'+(rows?'<table><thead><tr><th>Date</th><th>Type</th><th>Description</th><th>Site</th><th>Invoice/Ref</th><th>GST</th><th>Amount</th></tr></thead><tbody>'+rows+'</tbody></table>':'<p>No transactions.</p>'));
  }}>Print History</button>
  {isAdmin&&!selV.auto&&<button className="btn bs bsm" onClick={function(){startEdit(selV);setSelVendor(null);}}>Edit</button>}
  <button onClick={function(){setSelVendor(null);}} style={{background:'none',color:'var(--tx2)',fontSize:18,lineHeight:1,cursor:'pointer'}}>&#x2715;</button>
  </div>

function PhotoLog(props){
  var user=props.user||{role:"",name:"",id:0},P=props;
  var isA=user.role!=='foreman';
  var us=usites(user,P.sites);
  var [siteF,setSiteF]=useState(String(user.siteId||'all'));
  var [selPhoto,setSelPhoto]=useState(null);
  var [note,setNote]=useState('');
  function upload(){
    var fi=document.createElement('input');fi.type='file';fi.accept='image/*';fi.multiple=true;
    fi.onchange=function(e){
      Array.from(e.target.files).forEach(function(f){
        if(f.size>3*1024*1024){alert(f.name+': Max 3MB');return;}
        var r=new FileReader();
        r.onload=function(ev){
          P.setPhotos(function(p){return p.concat([{id:Date.now()+Math.random(),siteId:+siteF||user.siteId,file:ev.target.result,name:f.name,note:note,by:user.name,ts:new Date().toLocaleDateString('en-IN'),date:today()}]);});
        };r.readAsDataURL(f);
      });
    };fi.click();
  }
  var vis=(P.photos||[]).filter(function(p){return siteF==='all'||String(p.siteId)===String(siteF);});
  // Group by site then date
  var grouped={};
  vis.forEach(function(p){
    var site=P.sites.filter(function(s){return s.id===p.siteId;})[0];
    var sKey=(site?site.name:'Unknown Site')+'__'+p.siteId;
    var dKey=p.date||p.ts||'Unknown Date';
    if(!grouped[sKey])grouped[sKey]={siteName:site?site.name:'Unknown',siteId:p.siteId,dates:{}};
    if(!grouped[sKey].dates[dKey])grouped[sKey].dates[dKey]=[];
    grouped[sKey].dates[dKey].push(p);
  });
  return <div>
  <div className="flex ic jb mb12" style={{flexWrap:'wrap',gap:8}}>
    <div className="st" style={{margin:0}}>📸 Site Photo Gallery</div>
    <div style={{display:'flex',gap:6,alignItems:'center'}}>
      <select value={siteF} onChange={function(e){setSiteF(e.target.value);}} style={{fontSize:12}}>
        {isA&&<option value="all">All Sites</option>}
        {us.map(function(s){return <option key={s.id} value={String(s.id)}>{s.name}</option>;})}
      </select>
      <button className="btn bp bsm" onClick={upload}>📷 Upload Photos</button>
    </div>
  </div>
  {vis.length===0&&<div style={{textAlign:'center',color:'var(--tx3)',padding:40}}>No photos yet.<br/>Select a site and click Upload Photos.</div>}
  {Object.keys(grouped).map(function(sKey){
    var sg=grouped[sKey];
    return <div key={sKey} style={{marginBottom:20}}>
      <div style={{fontWeight:700,fontSize:14,color:'var(--am)',marginBottom:10,borderBottom:'2px solid var(--am)',paddingBottom:4}}>📍 {sg.siteName}</div>
      {Object.keys(sg.dates).sort().reverse().map(function(date){
        var photos=sg.dates[date];
        return <div key={date} style={{marginBottom:14}}>
          <div style={{fontSize:11,color:'var(--tx3)',fontWeight:600,marginBottom:6,textTransform:'uppercase',letterSpacing:.5}}>{date} · {photos.length} photo{photos.length>1?'s':''}</div>
          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(110px,1fr))',gap:6}}>
          {photos.map(function(p){return <div key={p.id} style={{position:'relative',cursor:'pointer'}} onClick={function(){setSelPhoto(p);}}>
            <img src={p.file} alt={p.note||''} style={{width:'100%',aspectRatio:'1',objectFit:'cover',borderRadius:6,border:'2px solid var(--bdr)',transition:'border .15s'}}
              onMouseEnter={function(e){e.target.style.borderColor='var(--am)';}}
              onMouseLeave={function(e){e.target.style.borderColor='var(--bdr)';}}/>
            {p.note&&<div style={{position:'absolute',bottom:0,left:0,right:0,background:'rgba(0,0,0,.6)',color:'#fff',fontSize:9,padding:'2px 4px',borderRadius:'0 0 4px 4px',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{p.note}</div>}
          </div>;})}
          </div>
        </div>;
      })}
    </div>;
  })}
  {selPhoto&&<Modal title="Photo" icon="📸" onClose={function(){setSelPhoto(null);}}>
    <img src={selPhoto.file} style={{width:'100%',borderRadius:8,marginBottom:10}}/>
    <div style={{fontSize:12,color:'var(--tx2)',marginBottom:4}}>📅 {selPhoto.date||selPhoto.ts} · 👤 {selPhoto.by}</div>
    {selPhoto.note&&<div style={{fontSize:12,color:'var(--tx2)',marginBottom:10}}>📝 {selPhoto.note}</div>}
    {isA&&<button className="btn bd bsm" style={{marginTop:6}} onClick={function(){P.setPhotos(function(p){return p.filter(function(x){return x.id!==selPhoto.id;});});setSelPhoto(null);}}>🗑️ Delete Photo</button>}
  </Modal>}
  </div>;

  if(f.size>5*1024*1024){alert('Max 5MB per photo');return;}
  var r=new FileReader();
  r.onload=function(ev){sf('photos',(form.photos||[]).concat([{data:ev.target.result,name:f.name}]));};
  r.readAsDataURL(f);

<script type="text/babel" data-presets="react">

function Requisitions(props){

  <div className="card" style={{padding:0,overflowX:'auto'}}><table><thead><tr><th>{L('date')}</th><th>{L('reqMaterial')}</th><th>{L('reqQty')}</th><th>{L('estValue')}</th><th>{L('requestedBy')}</th><th>{L('notes')}</th><th>{L('status')}</th><th>Action</th></tr></thead>

  </div>:<span style={{fontSize:10,color:'var(--tx3)'}}>—</span>}</td>
  </tr>;} )}</tbody></table></div>
  {showM&&<Modal title={L('reqMaterial')} icon="📋" onClose={function(){setShowM(false);}}>
  <div className="fr"><label>{L('reqMaterial')}</label><select value={form.matId} onChange={function(e){sf('matId',e.target.value);}}><option value="">Select...</option>{P.mats.map(function(m){return <option key={m.id} value={m.id}>{m.name}</option>;})}</select></div>

  {estVal>0&&<div style={{background:'var(--sur2)',border:'1px solid var(--bdr)',borderRadius:6,padding:'7px 11px',marginBottom:10,fontSize:12}}>{L('estValue')}: <b style={{color:estVal>=HIGH_VAL?'var(--rd)':'var(--am)'}}>{INR(estVal)}</b>{estVal>=HIGH_VAL&&<div style={{color:'var(--rd)',fontSize:11,marginTop:3}}>⚠ Admin required</div>}</div>}
  <div className="fr"><label>{L('notes')}</label><textarea rows="2" value={form.note} onChange={function(e){sf('note',e.target.value);}}></textarea></div>
  <div className="flex g6"><button className="btn bp" style={{flex:1}} onClick={submit}>{L('submit')}</button><button className="btn bs" onClick={function(){setShowM(false);}}>{L('cancel')}</button></div>
  </Modal>}

}

function Indents(props){
  var user=props.user||{role:"",name:"",id:0},P=props,lang=props.lang||'en';
  var isAdmin=user.role==='admin'||user.role==='master_admin';
  var isStore=isAdmin||user.role==='site_manager';
  var [tab,setTab]=useState('pending');
  var [showM,setShowM]=useState(false);
  var [issueId,setIssueId]=useState(null);
  var [issuedQty,setIssuedQty]=useState('');
  var [issuedNote,setIssuedNote]=useState('');
  var [srch,setSrch]=useState('');
  var blank={siteId:user.siteId||'',matId:'',qty:'',unit:'',urgency:'normal',purpose:'',date:today(),attFile:'',attName:''};
  var [form,setForm]=useState(blank);
  function sf(k,v){setForm(function(p){var n=Object.assign({},p);n[k]=v;return n;});}
  var allIndents=P.indents||[];
  var myIndents=isAdmin?allIndents:allIndents.filter(function(x){return x.reqBy===user.name||x.siteId===user.siteId;});
  var tabFiltered=tab==='all'?myIndents:myIndents.filter(function(x){return x.status===tab;});
  var vis=tabFiltered.filter(function(x){
  if(!srch)return true;
  var m=gMat(P.mats,x.matId),s=srch.toLowerCase();
  return (m.name||'').toLowerCase().indexOf(s)>=0||(x.purpose||'').toLowerCase().indexOf(s)>=0;
  }).slice().sort(function(a,b){return (b.date||'').localeCompare(a.date||'');});
  function submit(){
  if(!form.matId||!form.qty||!form.siteId){alert('Site, Material and Quantity are required.');return;}
  var obj={id:Date.now(),siteId:+form.siteId,matId:+form.matId,qty:+form.qty,unit:form.unit,
  urgency:form.urgency,purpose:form.purpose.trim(),date:form.date,
  reqBy:user.name,status:'pending',issuedQty:0,issuedNote:'',ts:sts()};
  addItem(P.setIndents,obj);
  addItem(P.setLog,{id:Date.now(),user:user.name,action:'Indent raised: '+gMat(P.mats,+form.matId).name+' x'+form.qty,time:sts(),type:'indent'});
  setShowM(false);setForm(blank);
  }
  function issueNow(){
  if(!issuedQty){alert('Enter issued quantity.');return;}
  P.setIndents(function(prev){return prev.map(function(x){
  if(x.id!==issueId)return x;
  return Object.assign({},x,{status:'issued',issuedQty:+issuedQty,issuedNote:issuedNote,issuedBy:user.name,issuedOn:today()});
  });});
  addItem(P.setLog,{id:Date.now(),user:user.name,action:'Indent issued '+issuedQty+' units',time:sts(),type:'indent'});
  setIssueId(null);setIssuedQty('');setIssuedNote('');
  }
  function rejectIndent(id){
  if(!window.confirm('Reject this indent?'))return;
  P.setIndents(function(prev){return prev.map(function(x){return x.id===id?Object.assign({},x,{status:'rejected',issuedBy:user.name}):x;});});
  }
  var urgColors={normal:'var(--bl)',high:'var(--am)',critical:'var(--rd)'};
  var stColors={pending:'var(--am)',issued:'var(--gr)',rejected:'var(--rd)'};
  var pending=allIndents.filter(function(x){return x.status==='pending';}).length;
  return <div className="fi">
  <div className="flex ic jb mb12">
  <div className="st" style={{margin:0}}>&#128196; Material Indents</div>
  <button className="btn bp bsm" onClick={function(){setShowM(true);setForm(blank);}}>+ Raise Indent</button>
  </div>
  <div className="tbar">
  {[['pending','Pending',pending],['issued','Issued',0],['rejected','Rejected',0],['all','All',0]].map(function(t){
  return <button key={t[0]} className={tab===t[0]?'ac':''} onClick={function(){setTab(t[0]);}}>
  {t[1]}{t[2]>0&&<span style={{background:'var(--rd)',color:'#fff',fontSize:9,padding:'1px 5px',borderRadius:8,marginLeft:4}}>{t[2]}</span>}
  </button>;
  })}
  </div>
  <div style={{display:'flex',gap:8,marginBottom:12,alignItems:'center'}}>
  <input value={srch} onChange={function(e){setSrch(e.target.value);}} placeholder="Search material / purpose..." style={{flex:1}}/>
  {srch&&<button className="btn bs bsm" onClick={function(){setSrch('');}}>Clear</button>}
  </div>
  {vis.length===0&&<div className="aba aba-a">No indents found.</div>}
  <div style={{display:'flex',flexDirection:'column',gap:10}}>
  {vis.map(function(x){
  var mat=gMat(P.mats,x.matId),site=gSite(P.sites,x.siteId);
  return <div key={x.id} className="card" style={{borderLeft:'4px solid '+stColors[x.status]}}>
  <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',flexWrap:'wrap',gap:8}}>
  <div>
  <div style={{fontWeight:700,fontSize:14}}>{mat.name}</div>
  <div style={{display:'flex',gap:6,marginTop:3,flexWrap:'wrap'}}>
  <span className="bbl" style={{fontSize:10}}>{site.name}</span>
  <span style={{fontSize:10,fontWeight:600,color:urgColors[x.urgency]}}>&#9650; {x.urgency.toUpperCase()}</span>
  <span style={{fontSize:10,color:stColors[x.status],fontWeight:700}}>{x.status.toUpperCase()}</span>
  </div>
  </div>
  <div style={{textAlign:'right'}}>
  <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:18,fontWeight:700}}>Qty: {x.qty} {x.unit}</div>
  {x.status==='issued'&&<div style={{fontSize:11,color:'var(--gr)'}}>Issued: {x.issuedQty} {x.unit}</div>}
  </div>
  </div>
  {x.purpose&&<div style={{fontSize:12,color:'var(--tx2)',marginTop:6}}>Purpose: {x.purpose}</div>}
  <div style={{fontSize:10,color:'var(--tx3)',marginTop:4}}>By {x.reqBy} &middot; {x.date}</div>
  {x.status==='issued'&&x.issuedNote&&<div style={{fontSize:11,color:'var(--tx2)',marginTop:4}}>Note: {x.issuedNote}</div>}
  {isStore&&x.status==='pending'&&<div style={{display:'flex',gap:6,marginTop:10}}>
  <button className="btn bp bsm" onClick={function(){setIssueId(x.id);setIssuedQty(String(x.qty));setIssuedNote('');}}>Issue Material</button>
  <button className="btn bd bsm" onClick={function(){rejectIndent(x.id);}}>Reject</button>
  </div>}
  {issueId===x.id&&<div style={{marginTop:10,padding:'10px 12px',background:'var(--sur2)',borderRadius:8,border:'1px solid var(--bdr)'}}>
  <div className="fg" style={{marginBottom:8}}>
  <div className="fr"><label>Issued Qty</label><input type="number" value={issuedQty} onChange={function(e){setIssuedQty(e.target.value);}}/></div>
  <div className="fr"><label>Note</label><input value={issuedNote} onChange={function(e){setIssuedNote(e.target.value);}} placeholder="Optional note..."/></div>
  </div>
  <div style={{display:'flex',gap:6}}>
  <button className="btn bp bsm" onClick={issueNow}>&#10003; Confirm Issue</button>
  <button className="btn bs bsm" onClick={function(){setIssueId(null);}}>Cancel</button>
  </div>
  </div>}
  </div>;
  })}
  </div>
  {showM&&<Modal title="Raise Material Indent" icon="&#128196;" onClose={function(){setShowM(false);}}>
  <div className="fg">
  <div className="fr"><label>Site *</label><select value={form.siteId} onChange={function(e){sf('siteId',e.target.value);}}><option value="">Select...</option>{usites(user,P.sites).map(function(s){return <option key={s.id} value={s.id}>{s.name}</option>;})}</select></div>
  <div className="fr"><label>Date</label><input type="date" value={form.date} onChange={function(e){sf('date',e.target.value);}}/></div>
  </div>
  <div className="fg">
  <div className="fr"><label>Material *</label><select value={form.matId} onChange={function(e){sf('matId',e.target.value);sf('unit',gMat(P.mats,+e.target.value).unit||'');}}><option value="">Select...</option>{(P.mats||[]).map(function(m){return <option key={m.id} value={m.id}>{m.name}</option>;})}</select></div>
  <div className="fr"><label>Quantity *</label><input type="number" value={form.qty} onChange={function(e){sf('qty',e.target.value);}}/></div>
  </div>
  <div className="fg">
  <div className="fr"><label>Unit</label><input value={form.unit} onChange={function(e){sf('unit',e.target.value);}} placeholder="bags / MT / nos..."/></div>
  <div className="fr"><label>Urgency</label><select value={form.urgency} onChange={function(e){sf('urgency',e.target.value);}}><option value="normal">Normal</option><option value="high">High</option><option value="critical">Critical</option></select></div>
  </div>
  <div className="fr"><label>Purpose / Reason</label><textarea rows="2" value={form.purpose} onChange={function(e){sf('purpose',e.target.value);}} placeholder="What is this material needed for?"/></div>
  <div className="fr"><label>Attachment (optional, max 3MB)</label><FileBtn file={form.attFile} name={form.attName} onPick={function(){pickFile(function(d,n){sf('attFile',d);sf('attName',n);});}} onClear={function(){sf('attFile','');sf('attName','');}}/></div>
  <div className="flex g6"><button className="btn bp" style={{flex:1}} onClick={submit}>Submit Indent</button><button className="btn bs" onClick={function(){setShowM(false);}}>Cancel</button></div>
  </Modal>}
  </div>;
}

function Tenders(props){
  var user=props.user||{role:"",name:"",id:0},P=props,lang=props.lang||'en';
  var L=function(k){return tl(lang,k);};
  var isAdmin=user.role==='admin'||user.role==='master_admin';
  var [showForm,setShowForm]=useState(false);
  var [editId,setEditId]=useState(null);
  var [viewFileObj,setViewFileObj]=useState(null);
  var [filterStatus,setFilterStatus]=useState('all');
  var [tenderSearch,setTenderSearch]=useState('');
  var [tFromDate,setTFromDate]=useState('');
  var [tToDate,setTToDate]=useState('');
  var blank={
  date:today(),orgName:'',location:'',nameOfWork:'',bidDocStart:'',nitViewDate:'',
  scopeOfWork:'',tenderNo:'',bidDocEnd:'',bidSubEnd:'',bidValidity:'',branch:'',
  department:'',value:'',completionPeriod:'',preBidMeeting:'',ddBg:'',feeAmount:'',
  bidFeePayableTo:'',bidFeePayableAt:'',emdAmount:'',emdPayableTo:'',emdPayableAt:'',
  subProcessingFee:'',subPaidFee:'',status:'open',remark:'',entryBy:user.name,
  files:[]
  };
  var [form,setForm]=useState(blank);
  function sf(k,v){setForm(function(p){var n=Object.assign({},p);n[k]=v;return n;});}
  var tenders=P.tenders||[];
  var filtered=tenders.filter(function(t){
  if(filterStatus!=='all'&&t.status!==filterStatus)return false;
  if(tenderSearch){var q=tenderSearch.toLowerCase();if((t.orgName||'').toLowerCase().indexOf(q)<0&&(t.nameOfWork||'').toLowerCase().indexOf(q)<0&&(t.tenderNo||'').toLowerCase().indexOf(q)<0)return false;}
  if(tFromDate&&(t.date||'')< tFromDate)return false;
  if(tToDate&&(t.date||'')>tToDate)return false;
  return true;
  });
  var sorted=filtered.slice().sort(function(a,b){return (b.date||'').localeCompare(a.date||'');});
  function pickFiles(){
  var fi=document.createElement('input');fi.type='file';fi.multiple=true;fi.accept='application/pdf,image/*';
  fi.onchange=function(e){
  var existing=form.files||[];
  var toAdd=Array.from(e.target.files);
  if(existing.length>=5){alert('Max 5 files per tender.');return;}
  if(existing.length+toAdd.length>5)toAdd=toAdd.slice(0,5-existing.length);
  var newFiles=existing.slice();
  var readNext=function(i){
  if(i>=toAdd.length){sf('files',newFiles);return;}
  var f=toAdd[i];
  if(f.size>100*1024*1024){alert(f.name+': Max 100MB.');readNext(i+1);return;}
  var r=new FileReader();
  r.onload=function(ev){newFiles=newFiles.concat([{data:ev.target.result,name:f.name,type:f.type}]);readNext(i+1);};
  r.readAsDataURL(f);
  };
  readNext(0);
  };fi.click();
  }
  function saveTender(){
  if(!form.orgName.trim()||!form.nameOfWork.trim()){alert('Organisation and Name of Work are required.');return;}
  var id=editId||Date.now();
  var obj=Object.assign({},form,{id:id,tenderNo:form.tenderNo||('TND-'+String(id).slice(-5)),entryBy:user.name,files:form.files||[]});
  if(editId){P.setTenders(function(prev){return prev.map(function(t){return t.id===editId?obj:t;});});setEditId(null);}
  else{addItem(P.setTenders,obj);}
  setShowForm(false);setForm(blank);
  }
  function startEdit(t){
  setForm({date:t.date||today(),orgName:t.orgName||'',location:t.location||'',nameOfWork:t.nameOfWork||'',
  bidDocStart:t.bidDocStart||'',nitViewDate:t.nitViewDate||'',scopeOfWork:t.scopeOfWork||'',
  tenderNo:t.tenderNo||'',bidDocEnd:t.bidDocEnd||'',bidSubEnd:t.bidSubEnd||'',bidValidity:t.bidValidity||'',
  branch:t.branch||'',department:t.department||'',value:t.value||'',completionPeriod:t.completionPeriod||'',
  preBidMeeting:t.preBidMeeting||'',ddBg:t.ddBg||'',feeAmount:t.feeAmount||'',

  value:+form.value||0,advancePct:+form.advancePct||0,retention:form.retention,

}function Reports(props){

  var catPie=Object.entries(catMap).map(function(e,i){return{label:e[0],val:e[1],color:catColors[i%catColors.length]};});

  {label:'Materials',val:matBase,color:'var(--am)'},
  {label:L('labour'),val:totLabour,color:'#ef4444'},
  {label:'Fuel',val:totFuel,color:'#f97316'},

  function siteTotal(sid){
  return [P.purchases,P.fuel,P.misc,P.labour].reduce(function(acc,arr){
  return acc+(arr||[]).filter(function(x){return x.siteId===sid;})
  .reduce(function(a,x){return a+(x.base||0)+(x.gstAmt||0)+(x.cost||0)+(x.amt||0)+(x.total||0);},0);
  },0);

  var siteBar=us.map(function(s){

  return{l:s.name.split(' ')[0].substring(0,6),v:sp,vl:Math.round(sp/1000)+'K',col:pp>80?'var(--rd)':'var(--gr)'};
  });

  var spArr=[620000,840000,1050000,1180000,1320000,totSpent];
  var monthLine=months.map(function(m,i){return{l:m,v:spArr[i]};});
  var tabs=[['financial',lang==='hi'?'वित्तीय':'Financial'],['sites',lang==='hi'?'साइट-वार':'Site-wise'],['gst','GST'],['labour',lang==='hi'?'श्रम':'Labour'],['attendance',lang==='hi'?'उपस्थिति':'Attendance'],['analytics',lang==='hi'?'विश्लेषण':'Analytics']];

function WeatherWidget(){
  var [w,setW]=useState(null);
  useEffect(function(){
  var base='https://api.open-meteo.com/v1/forecast?current=temperature_2m,weathercode,precipitation,windspeed_10m&daily=precipitation_sum,weathercode&forecast_days=1&timezone=auto&';
  function load(lat,lon){fetch(base+'latitude='+lat+'&longitude='+lon).then(function(r){return r.json();}).then(function(d){if(d&&d.current)setW(d);}).catch(function(){});}
  if(navigator.geolocation){navigator.geolocation.getCurrentPosition(function(p){load(p.coords.latitude,p.coords.longitude);},function(){load(28.6139,77.209);},{timeout:4000});}
  else{load(28.6139,77.209);}
  },[]);
  if(!w||!w.current)return <span style={{fontSize:11,color:'var(--tx3)',padding:'4px 8px',background:'var(--sur2)',borderRadius:6}}>🌤️ ...</span>;
  var c=w.current,code=c.weathercode;
  var ic=code===0?'☀️':code<=3?'⛅':code<=48?'☁️':code<=67?'🌧️':code<=77?'❄️':'⛈️';
  var isRain=code>=51&&code<=82,isStorm=code>=95,isHeat=c.temperature_2m>=40;
  var alert=isStorm?'⛈️ Storm warning — suspend work!':isRain?'🌧️ Rain — protect materials':isHeat?'🥵 Heat alert >40°C — extra breaks':null;
  return <div style={{display:'flex',alignItems:'center',gap:6}}>
    <span style={{fontSize:12,display:'flex',alignItems:'center',gap:4,padding:'4px 8px',background:'var(--sur2)',borderRadius:6,border:'1px solid var(--bdr)',color:'var(--tx2)',cursor:'help'}} title={c.precipitation>0?'Rain: '+c.precipitation+'mm | Wind: '+c.windspeed_10m+'km/h':''}>
      {ic} <b style={{color:isHeat?'#ef4444':isRain?'#3b82f6':'var(--tx)'}}>{c.temperature_2m}°C</b>
    </span>
    {alert&&<span style={{fontSize:10,fontWeight:700,color:'#fff',background:isStorm?'#7c3aed':isHeat?'#ef4444':'#2563eb',padding:'3px 7px',borderRadius:5,animation:'pulse 1.5s infinite'}}>{alert}</span>}
  </div>;
}

<script type="text/babel" data-presets="react">

async function sha256(str){
  if(typeof crypto!=='undefined'&&crypto.subtle){
    var buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(str));
    return Array.from(new Uint8Array(buf)).map(function(b){return b.toString(16).padStart(2,'0');}).join('');
  }
  var hash=0;for(var i=0;i<str.length;i++){hash=((hash<<5)-hash)+str.charCodeAt(i);hash|=0;}
  return Math.abs(hash).toString(16).padStart(8,'0');
}
function genToken(){var arr=new Uint8Array(24);crypto.getRandomValues(arr);return Array.from(arr).map(function(b){return b.toString(16).padStart(2,'0');}).join('');}
function getFailedAttempts(email){try{return JSON.parse(localStorage.getItem('raj_fa_'+btoa(email))||'{"count":0,"ts":0}');}catch(e){return {count:0,ts:0};}}
function recordFailedAttempt(email){var fa=getFailedAttempts(email);fa.count++;fa.ts=Date.now();localStorage.setItem('raj_fa_'+btoa(email),JSON.stringify(fa));return fa.count;}
function clearFailedAttempts(email){localStorage.removeItem('raj_fa_'+btoa(email));}
function isLockedOut(email){var fa=getFailedAttempts(email);if(fa.count>=5&&Date.now()-fa.ts<15*60*1000){return Math.ceil((15*60*1000-(Date.now()-fa.ts))/60000);}return 0;}
function saveSession(user){var token=genToken();localStorage.setItem('raj_session',JSON.stringify({userId:user.id,token:token,ts:Date.now(),expires:Date.now()+8*60*60*1000}));return token;}
function getSession(){try{var s=JSON.parse(localStorage.getItem('raj_session')||'null');if(!s)return null;if(Date.now()>s.expires){localStorage.removeItem('raj_session');return null;}return s;}catch(e){return null;}}
function clearSession(){localStorage.removeItem('raj_session');}
async function checkPassword(inputPwd,user){var hashed=await sha256(inputPwd+'_raj_salt_'+user.id);return user.password===inputPwd||user.password===hashed;}
async function migratePassword(user,plainPwd,setUsers){if(user.password&&user.password.length<20){var hashed=await sha256(plainPwd+'_raj_salt_'+user.id);setUsers(function(prev){return prev.map(function(u){if(u.id===user.id)return Object.assign({},u,{password:hashed});return u;});});}}
function logUserActivity(setLog,action,user,detail){var entry={id:Date.now()+Math.random(),msg:action+(detail?' - '+detail:''),who:user?user.name:'System',role:user?user.role:'',ts:new Date().toLocaleString('en-IN'),device:navigator.userAgent.includes('Mobile')?'Mobile':'Desktop',type:'user_activity'};if(setLog)setLog(function(p){return [entry].concat(p).slice(0,500);});}

</script>

function LeaveManagement(props){

  var isAdmin=user.role==='admin'||user.role==='master_admin';

  var [showM,setShowM]=useState(false);
  var [form,setForm]=useState({type:'casual',from:today(),to:today(),reason:''});
  function sf(k,v){setForm(function(p){return Object.assign({},p,{[k]:v});});}
  var leaves=P.leaves||[];
  var myLeaves=leaves.filter(function(l){return l.userId===user.id;});
  var pendingLeaves=leaves.filter(function(l){return l.status==='pending';});
  var leaveBalance={casual:12,earned:15,sick:7};
  var leaveTypes=['casual','earned','sick','unpaid'];
  function daysBetween(a,b){return Math.max(1,Math.round((new Date(b)-new Date(a))/86400000)+1);}
  function usedLeaves(type){return myLeaves.filter(function(l){return l.type===type&&l.status==='approved';}).reduce(function(a,l){return a+daysBetween(l.from,l.to);},0);}
  function applyLeave(){
    if(!form.from||!form.to||!form.reason){alert('All fields required');return;}
    var days=daysBetween(form.from,form.to);
    addItem(P.setLeaves,Object.assign({},form,{id:Date.now(),userId:user.id,userName:user.name,days:days,status:'pending',ts:today()}));
    setShowM(false);setForm({type:'casual',from:today(),to:today(),reason:''});
  }
  function updateStatus(id,status){
    P.setLeaves(function(prev){return prev.map(function(l){return l.id===id?Object.assign({},l,{status:status,approvedBy:user.name}):l;});});
  }
  var visList=tab==='mine'?myLeaves:tab==='pending'?pendingLeaves:leaves;
  return <div className="fi">
    <div className="flex ic jb mb12" style={{flexWrap:'wrap',gap:8}}>
      <div className="st" style={{margin:0}}>Leave Management</div>
      <button className="btn bp bsm" onClick={function(){setShowM(true);}}>+ Apply Leave</button>
    </div>
    <div className="g3 mb12">
      {leaveTypes.slice(0,3).map(function(t){
        var used=usedLeaves(t),bal=(leaveBalance[t]||0)-used;
        return <div key={t} className="card" style={{textAlign:'center',borderLeft:'4px solid '+(bal>0?'var(--gr)':'var(--rd)')}}>
          <div style={{fontSize:20,fontWeight:800,color:bal>0?'var(--gr)':'var(--rd)'}}>{bal}</div>
          <div style={{fontSize:10,color:'var(--tx3)',textTransform:'capitalize'}}>{t} Balance</div>
        </div>;
      })}
    </div>
