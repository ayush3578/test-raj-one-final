/* =========================================================
   AI CHATBOT  – voice (Web Speech API) + Hindi support
   ========================================================= */
function AIChatbot(props){
  var user=props.user,P=props,lang=props.lang||'en';
  var L=function(k){return tl(lang,k);};
  var apiKey=props.apiKey||'';
  /* Detect key type: AIza = Google Gemini, sk-ant = Claude */
  var isGoogle=apiKey.indexOf('AIza')===0;
  var isClaude=apiKey.indexOf('sk-ant')===0;
  var aiName=isGoogle?'Gemini':isClaude?'Claude':'AI';
  var aiIcon=isGoogle?'🔵':isClaude?'🟠':'🤖';
  var initMsg=tl(lang,'aiHello').replace('{name}',user.name);
  var [msgs,setMsgs]=useState([{role:'assistant',text:initMsg}]);
  var [inp,setInp]=useState('');
  var [loading,setLoading]=useState(false);
  var [listening,setListening]=useState(false);
  var endRef=useRef(null);
  var recRef=useRef(null);

  useEffect(function(){
    if(endRef.current)endRef.current.scrollIntoView({behavior:'smooth'});
  },[msgs.length]);

  function startVoice(){
    var SR=window.SpeechRecognition||window.webkitSpeechRecognition;
    if(!SR){alert('Voice input not supported. Please use Chrome.');return;}
    var rec=new SR();
    rec.lang=lang==='hi'?'hi-IN':'en-IN';
    rec.continuous=false;rec.interimResults=true;
    rec.onstart=function(){setListening(true);};
    rec.onresult=function(e){
      var t='';
      for(var i=e.resultIndex;i<e.results.length;i++){t+=e.results[i][0].transcript;}
      setInp(t);
    };
    rec.onerror=function(){setListening(false);};
    rec.onend=function(){setListening(false);};
    recRef.current=rec;rec.start();
  }
  function stopVoice(){if(recRef.current)recRef.current.stop();setListening(false);}

  function buildCtx(){
    var lines=['RAJ Construction AI Assistant.','User: '+user.name+' ('+RL[user.role]+')'];
    usites(user,P.sites).forEach(function(s){
      var tot=[P.purchases,P.fuel,P.misc,P.labour].reduce(function(acc,arr){
        return acc+(arr||[]).filter(function(x){return x.siteId===s.id;})
          .reduce(function(a,x){return a+(x.base||0)+(x.gstAmt||0)+(x.cost||0)+(x.amt||0)+(x.total||0);},0);
      },0);
      lines.push('Site:'+s.name+'('+s.status+') Budget:'+s.budget+' Spent:'+tot);
    });
    var low=(P.mats||[]).filter(function(m){return m.stock<m.minStock;}).map(function(m){return m.name;});
    lines.push('Pending reqs:'+(P.reqs||[]).filter(function(r){return r.status==='pending';}).length);
    if(low.length)lines.push('LowStock:'+low.join(','));
    return lines.join('\n');
  }

  function sendClaude(q,history){
    fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','anthropic-version':'2023-06-01','x-api-key':apiKey,'anthropic-dangerous-direct-browser-calls':'true'},
      body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:800,
        system:'You are an AI assistant for RAJ Construction, Lucknow.\n'+buildCtx()+'\nBe concise, use Indian number format. If user writes Hindi, reply in Hindi.',
        messages:history})
    })
    .then(function(r){return r.json();})
    .then(function(d){
      var t=d.error?('Claude Error: '+d.error.message):((d.content&&d.content[0]&&d.content[0].text)||'No response.');
      setMsgs(function(p){return p.concat([{role:'assistant',text:t}]);});
      setLoading(false);
    })
    .catch(function(e){
      setMsgs(function(p){return p.concat([{role:'assistant',text:'Network error: '+e.message}]);});
      setLoading(false);
    });
  }

  function sendGemini(q,history){
    /* Build Gemini conversation format */
    var geminiHistory=history.slice(0,-1).map(function(m){
      return{role:m.role==='assistant'?'model':'user',parts:[{text:m.content}]};
    });
    var systemPrompt='You are an AI assistant for RAJ Construction, Lucknow.\n'+buildCtx()+'\nBe concise, use Indian numbers. If user writes Hindi, reply in Hindi.\n\n';
    geminiHistory.unshift({role:'user',parts:[{text:systemPrompt}]});
    geminiHistory.push({role:'model',parts:[{text:'Understood. I am ready to help with RAJ Construction queries.'}]});
    geminiHistory.push({role:'user',parts:[{text:q}]});
    fetch('https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key='+apiKey,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({contents:geminiHistory,generationConfig:{maxOutputTokens:800,temperature:0.7}})
    })
    .then(function(r){return r.json();})
    .then(function(d){
      var t='No response.';
      if(d.error){t='Gemini Error: '+d.error.message;}
      else if(d.candidates&&d.candidates[0]&&d.candidates[0].content&&d.candidates[0].content.parts){
        t=d.candidates[0].content.parts.map(function(p){return p.text||'';}).join('');
      }
      setMsgs(function(p){return p.concat([{role:'assistant',text:t}]);});
      setLoading(false);
    })
    .catch(function(e){
      setMsgs(function(p){return p.concat([{role:'assistant',text:'Network error: '+e.message}]);});
      setLoading(false);
    });
  }

  function send(){
    var q=inp.trim();if(!q||loading)return;
    if(!apiKey||(!isGoogle&&!isClaude)){
      setMsgs(function(p){return p.concat([{role:'assistant',text:'No valid API key. Add a Google (AIza...) or Anthropic (sk-ant...) key in Settings.'}]);});
      setInp('');return;
    }
    setMsgs(function(p){return p.concat([{role:'user',text:q}]);});
    setInp('');setLoading(true);
    var history=msgs.slice(-10).map(function(m){return{role:m.role==='assistant'?'assistant':'user',content:m.text};});
    history.push({role:'user',content:q});
    if(isGoogle){sendGemini(q,history);}
    else{sendClaude(q,history);}
  }

  var sugg=lang==='hi'
    ?['सभी साइटों का बजट?','कौन सी सामग्री कम है?','लंबित अनुरोध?','कुल खर्च?']
    :['Budget of all sites?','Which materials are low?','Pending requests?','Total spending?'];

  return <div style={{display:'flex',flexDirection:'column',height:'calc(100vh - 120px)'}} className="fi">
    {/* AI provider badge */}
    <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:10,padding:'7px 12px',background:'var(--sur2)',border:'1px solid var(--bdr)',borderRadius:8}}>
      <span style={{fontSize:16}}>{aiIcon}</span>
      <div style={{flex:1}}>
        <div style={{fontSize:12,fontWeight:700,color:'var(--tx)'}}>{aiName} AI Assistant</div>
        <div style={{fontSize:10,color:'var(--tx3)'}}>{isGoogle?'Powered by Google Gemini 2.0':isClaude?'Powered by Anthropic Claude':"No key — go to Settings to add one"}</div>
      </div>
      {(isGoogle||isClaude)&&<span style={{fontSize:9,background:isGoogle?'rgba(59,130,246,.12)':'rgba(245,158,11,.12)',color:isGoogle?'var(--bl)':'var(--am)',borderRadius:4,padding:'2px 7px',fontWeight:700}}>ACTIVE</span>}
    </div>
    {!apiKey&&<div className="aba aba-a" style={{marginBottom:10}}>⚠ Add a Google or Anthropic API key in Settings to use AI chat.</div>}
    {apiKey&&!isGoogle&&!isClaude&&<div className="aba aba-a" style={{marginBottom:10}}>⚠ Key not recognized. Use an AIza... (Google) or sk-ant... (Anthropic) key.</div>}
    <div style={{flex:1,overflowY:'auto',padding:'0 2px'}}>
      {msgs.map(function(m,i){
        var isA=m.role==='assistant';
        var bgColor=isGoogle?'rgba(59,130,246,.08)':'rgba(245,158,11,.08)';
        var borderColor=isGoogle?'rgba(59,130,246,.2)':'rgba(245,158,11,.2)';
        return <div key={i} style={{display:'flex',gap:10,marginBottom:14,flexDirection:isA?'row':'row-reverse',alignItems:'flex-start'}}>
          <div style={{width:32,height:32,borderRadius:8,background:isA?(isGoogle?'rgba(59,130,246,.12)':'rgba(245,158,11,.12)'):'transparent',border:isA?'1px solid var(--bdr)':'none',display:'flex',alignItems:'center',justifyContent:'center',fontSize:16,flexShrink:0}}>
            {isA?aiIcon:<Avt user={user} size={32}/>}
          </div>
          <div style={{maxWidth:'82%',background:isA?'var(--sur)':'rgba(245,158,11,.1)',border:isA?'1px solid var(--bdr)':'1px solid rgba(245,158,11,.25)',borderRadius:isA?'4px 12px 12px 12px':'12px 4px 12px 12px',padding:'9px 13px',fontSize:13,lineHeight:1.6,whiteSpace:'pre-wrap'}}>{m.text}</div>
        </div>;
      })}
      {loading&&<div style={{display:'flex',gap:10,marginBottom:14}}>
        <div style={{width:32,height:32,borderRadius:8,background:isGoogle?'rgba(59,130,246,.12)':'rgba(245,158,11,.12)',border:'1px solid var(--bdr)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:16,flexShrink:0}}>{aiIcon}</div>
        <div style={{background:'var(--sur)',border:'1px solid var(--bdr)',borderRadius:'4px 12px 12px 12px',padding:'12px 16px',display:'flex',gap:5,alignItems:'center'}}>
          <span className="td"></span><span className="td"></span><span className="td"></span>
        </div>
      </div>}
      <div ref={endRef}/>
    </div>
    {msgs.length<=1&&<div style={{display:'flex',gap:6,flexWrap:'wrap',marginBottom:10}}>
      {sugg.map(function(s,i){return <button key={i} className="btn bs bsm" style={{fontSize:11}} onClick={function(){setInp(s);}}>{s}</button>;})}
    </div>}
    {listening&&<div style={{textAlign:'center',fontSize:12,color:'var(--rd)',marginBottom:6}}>
      🎤 {lang==='hi'?'सुन रहे हैं...':'Listening...'} <button className="btn bd bxs" onClick={stopVoice}>Stop</button>
    </div>}
    <div style={{display:'flex',gap:8,paddingTop:10,borderTop:'1px solid var(--bdr)',flexShrink:0}}>
      <button className={'btn bsm '+(listening?'bd':'bs')} style={{flexShrink:0,fontSize:16,padding:'7px 10px'}} onClick={listening?stopVoice:startVoice} title="Voice input">
        {listening?'■':'🎤'}
      </button>
      <input value={inp} onChange={function(e){setInp(e.target.value);}} onKeyDown={function(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();}}} placeholder={lang==='hi'?'हिंदी या English में पूछें...':(aiName+' को पूछें... / Ask '+aiName+'...')} style={{flex:1}}/>
      <button className="btn bp" onClick={send} disabled={loading||!inp.trim()} style={{opacity:loading||!inp.trim()?0.5:1,flexShrink:0}}>{L('send')} ►</button>
    </div>
  </div>;
}

function GroupChat(props){
  var user=props.user,P=props,lang=props.lang||'en';
  var L=function(k){return tl(lang,k);};
  var [activeChatId,setActiveChatId]=useState(null);
  var [inp,setInp]=useState('');
  var [replyTo,setReplyTo]=useState(null);
  var [imgView,setImgView]=useState(null);
  var [fwdMsg,setFwdMsg]=useState(null);
  var [ctxMsg,setCtxMsg]=useState(null);
  var [ctxPos,setCtxPos]=useState({x:0,y:0});
  var [search,setSearch]=useState('');
  var [showNewGroup,setShowNewGroup]=useState(false);
  var [newGroupName,setNewGroupName]=useState('');
  var [newGroupMembers,setNewGroupMembers]=useState([]);
  var [showBroadcast,setShowBroadcast]=useState(false);
  var [broadcastText,setBroadcastText]=useState('');
  var [inCall,setInCall]=useState(false);
  var [callRoom,setCallRoom]=useState('');
  var endRef=useRef(null);

  var groups=P.groups||[];
  var chatMsgsArr=P.chatMsgs||[];
  var allChats=[];
  groups.forEach(function(g){
    var gMsgs=chatMsgsArr.filter(function(m){return m.gid===g.id;});
    var last=gMsgs.length?gMsgs[gMsgs.length-1]:null;
    allChats.push({type:'group',id:'g-'+g.id,rawId:g.id,name:g.name,msgs:gMsgs,last:last,lastTs:last?last.ts:''});
  });
  (P.users||[]).filter(function(u){return u.id!==user.id;}).forEach(function(u){
    var key=dmKey(user.id,u.id);
    var dmsArr=(P.dms&&P.dms[key])||[];
    var last=dmsArr.length?dmsArr[dmsArr.length-1]:null;
    allChats.push({type:'dm',id:'dm-'+u.id,rawId:u.id,name:u.name,userObj:u,msgs:dmsArr,last:last,lastTs:last?last.ts:''});
  });
  allChats.sort(function(a,b){return (b.lastTs||'').localeCompare(a.lastTs||'');});
  var filteredChats=search.trim()?allChats.filter(function(c){return c.name.toLowerCase().indexOf(search.toLowerCase())>=0;}):allChats;

  var ac=null;
  for(var ci=0;ci<allChats.length;ci++){if(allChats[ci].id===activeChatId){ac=allChats[ci];break;}}
  var curMsgs=ac?ac.msgs:[];
  var pinned=ac&&ac.type==='group'?curMsgs.filter(function(m){return m.pinned;}):[];
  var canPin=ac&&ac.type==='group'&&(user.role==='master_admin'||user.role==='admin');

  useEffect(function(){if(endRef.current)endRef.current.scrollIntoView({behavior:'smooth'});},[curMsgs.length]);
  useEffect(function(){
    if(!ctxMsg)return;
    function close(){setCtxMsg(null);}
    document.addEventListener('click',close,{once:true});
    return function(){document.removeEventListener('click',close);};
  },[ctxMsg]);

  function sendMsg(text,mediaType,mediaSrc){
    if(!ac)return;
    var tx=(text||'').trim();if(!tx&&!mediaSrc)return;
    var obj={id:Date.now(),uid:user.id,name:user.name,text:tx,ts:sts(),mediaType:mediaType||null,mediaSrc:mediaSrc||null,replyTo:replyTo?{id:replyTo.id,text:replyTo.text||'[media]',name:replyTo.name}:null};
    if(ac.type==='group'){addItem(P.setChatMsgs,Object.assign({},obj,{gid:ac.rawId}));}
    else{var key=dmKey(user.id,ac.rawId);P.setDms(function(prev){var n=Object.assign({},prev);n[key]=(n[key]||[]).concat(Object.assign({},obj,{dmKey:key}));return n;});}
    setInp('');setReplyTo(null);
  }

  function pickFile(){
    var fi=document.createElement('input');fi.type='file';fi.accept='image/*,video/*';
    fi.onchange=function(e){var f=e.target.files[0];if(!f)return;var r=new FileReader();r.onload=function(ev){sendMsg('',f.type.startsWith('video')?'video':'image',ev.target.result);};r.readAsDataURL(f);};fi.click();
  }
  function doForward(msg,target){
    if(!target)return;
    var obj={id:Date.now(),uid:user.id,name:user.name,text:'[Fwd] '+(msg.text||''),ts:sts(),mediaType:msg.mediaType||null,mediaSrc:msg.mediaSrc||null,replyTo:null};
    if(target.type==='group')addItem(P.setChatMsgs,Object.assign({},obj,{gid:target.rawId}));
    else{var key=dmKey(user.id,target.rawId);P.setDms(function(prev){var n=Object.assign({},prev);n[key]=(n[key]||[]).concat(Object.assign({},obj,{dmKey:key}));return n;});}
    setFwdMsg(null);
  }
  function togglePin(m){
    var idx=chatMsgsArr.findIndex(function(x){return x.id===m.id;});if(idx<0)return;
    P.setChatMsgs(function(prev){var n=prev.slice();n[idx]=Object.assign({},n[idx],{pinned:!n[idx].pinned});return n;});
  }
  function openCtx(e,m){e.stopPropagation();e.preventDefault();var r=e.currentTarget.getBoundingClientRect();setCtxMsg(m);setCtxPos({x:Math.min(r.left,window.innerWidth-148),y:Math.min(r.bottom+4,window.innerHeight-175)});}
  function createGroup(){
    if(!newGroupName.trim()){alert('Enter group name.');return;}
    if(!newGroupMembers.length){alert('Select at least one member.');return;}
    var g={id:Date.now(),name:newGroupName.trim(),members:newGroupMembers.concat([user.id]),siteId:null,isGroup:true};
    addItem(P.setGroups,g);setShowNewGroup(false);setNewGroupName('');setNewGroupMembers([]);setActiveChatId('g-'+g.id);
  }
  function toggleMember(uid){setNewGroupMembers(function(prev){return prev.indexOf(uid)>=0?prev.filter(function(x){return x!==uid;}):[].concat(prev,[uid]);});}

  function sendBroadcast(){
    var txt=broadcastText.trim();if(!txt){alert('Enter message.');return;}
    var isAdmin=user.role==='master_admin'||user.role==='admin';
    if(!isAdmin){alert('Only admins can broadcast.');return;}
    /* Send as DM to every other user */
    (P.users||[]).filter(function(u){return u.id!==user.id;}).forEach(function(u){
      var key=dmKey(user.id,u.id);
      var obj={id:Date.now()+Math.random(),uid:user.id,name:user.name,text:'📢 [Broadcast] '+txt,ts:sts(),dmKey:key};
      P.setDms(function(prev){var n=Object.assign({},prev);n[key]=(n[key]||[]).concat([obj]);return n;});
    });
    /* Also post to all groups */
    (P.groups||[]).forEach(function(g){
      addItem(P.setChatMsgs,{id:Date.now()+Math.random(),gid:g.id,uid:user.id,name:user.name,text:'📢 [Broadcast] '+txt,ts:sts()});
    });
    setBroadcastText('');setShowBroadcast(false);
    alert('Broadcast sent to all users and groups!');
  }

  function startCall(isVideo){
    var roomBase=ac?('RAJ-'+ac.rawId+'-'+ac.type):'RAJ-general';
    var roomName=roomBase.replace(/[^a-zA-Z0-9-]/g,'-');
    var url='https://meet.jit.si/'+roomName;
    var data={type:isVideo?'video':'voice',url:url,room:roomName,by:user.name,ts:sts()};
    sendMsg('__CALL__'+JSON.stringify(data));
    window.open(url,'_jitsi');
  }

  function renderCallCard(m){
    var isMe=m.uid===user.id;
    try{
      var data=JSON.parse(m.text.replace('__CALL__',''));
      var isVid=data.type==='video';
      var col=isVid?'#3B82F6':'#10B981';
      return <div key={m.id} style={{display:'flex',justifyContent:isMe?'flex-end':'flex-start',marginBottom:12}}>
        <div style={{background:'linear-gradient(135deg,#1B2B5E,#0d1a3a)',borderRadius:12,padding:'14px 18px',maxWidth:260,boxShadow:'0 4px 16px rgba(0,0,0,.3)'}}>
          <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:10}}>
            <div style={{width:40,height:40,borderRadius:'50%',background:col+'33',border:'2px solid '+col,display:'flex',alignItems:'center',justifyContent:'center',fontSize:20,flexShrink:0}}>
              {isVid?'📹':'📞'}
            </div>
            <div>
              <div style={{fontWeight:700,fontSize:13,color:'#fff'}}>{isVid?'Video Call':'Voice Call'}</div>
              <div style={{fontSize:10,color:'rgba(255,255,255,.55)'}}>Started by {data.by}</div>
            </div>
          </div>
          <div style={{fontSize:10,color:'rgba(255,255,255,.4)',marginBottom:10,fontFamily:"'IBM Plex Mono',monospace",overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{data.room}</div>
          <a href={data.url} target="_jitsi" rel="noreferrer" style={{display:'flex',alignItems:'center',justifyContent:'center',gap:6,background:col,color:'#fff',borderRadius:8,padding:'9px 16px',textDecoration:'none',fontWeight:700,fontSize:13,width:'100%',boxSizing:'border-box'}}>
            🔗 Join {isVid?'Video':'Voice'} Call
          </a>
          <div style={{fontSize:9,color:'rgba(255,255,255,.3)',marginTop:7,textAlign:'center'}}>One click to join · Jitsi Meet</div>
        </div>
      </div>;
    }catch(e){return renderMsg(m,0);}
  }

  function deleteMsg(m){
    if(m.uid!==user.id&&user.role!=='master_admin'&&user.role!=='admin'){alert('Cannot delete.');return;}
    if(!window.confirm('Delete this message?'))return;
    if(ac.type==='group'){
      P.setChatMsgs(function(prev){return prev.filter(function(x){return x.id!==m.id;});});
    } else {
      var key=dmKey(user.id,ac.rawId);
      P.setDms(function(prev){var n=Object.assign({},prev);n[key]=(n[key]||[]).filter(function(x){return x.id!==m.id;});return n;});
    }
    setCtxMsg(null);
  }

  function renderMsg(m,i){
    if(m.text&&m.text.indexOf('__CALL__')===0)return renderCallCard(m);
    var isMe=m.uid===user.id;
    var other=gUser(P.users||[],m.uid);
    return <div key={m.id||i} style={{display:'flex',alignItems:'flex-end',gap:6,marginBottom:10,flexDirection:isMe?'row-reverse':'row'}}>
      {!isMe&&<Avt user={other} size={24}/>}
      <div style={{maxWidth:'74%',minWidth:0}}>
        {!isMe&&<div style={{fontSize:9,color:'var(--tx3)',marginBottom:2,marginLeft:4}}>{m.name}</div>}
        <div className={isMe?'msg-bubble me':'msg-bubble'}>
          {m.replyTo&&<div style={{background:'rgba(0,0,0,.07)',borderLeft:'2px solid var(--am)',borderRadius:3,padding:'3px 7px',marginBottom:5,fontSize:10,color:'var(--tx2)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>↩ {m.replyTo.name}: {m.replyTo.text}</div>}
          {m.text&&<div style={{fontSize:13,lineHeight:1.45,wordBreak:'break-word'}}>{m.text}</div>}
          {m.mediaType==='image'&&<img src={m.mediaSrc} style={{maxWidth:180,maxHeight:150,borderRadius:7,display:'block',cursor:'pointer',marginTop:m.text?5:0}} onClick={function(){setImgView(m.mediaSrc);}} alt="img"/>}
          {m.mediaType==='video'&&<video src={m.mediaSrc} style={{maxWidth:180,borderRadius:7,display:'block',marginTop:m.text?5:0}} controls/>}
          {m.pinned&&<div style={{fontSize:9,color:'var(--am)',marginTop:2}}>📌</div>}
          <div style={{fontSize:9,color:'var(--tx3)',marginTop:3,textAlign:'right'}}>{m.ts?m.ts.split(',').pop().trim():''}</div>
        </div>
      </div>
      <button style={{background:'var(--sur2)',border:'1px solid var(--bdr)',color:'var(--tx3)',fontSize:11,width:22,height:22,borderRadius:'50%',display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',flexShrink:0,alignSelf:'flex-start',marginTop:18}} onClick={function(e){openCtx(e,m);}}>⋮</button>
    </div>;
  }

  var isMobile=window.innerWidth<=900;
  var showList=!isMobile||!activeChatId;
  var showMain=!isMobile||!!activeChatId;

  return <div style={{display:'flex',height:'calc(100vh - 110px)',border:'1px solid var(--bdr)',borderRadius:10,overflow:'hidden',background:'var(--sur)'}} className="fi">
    {imgView&&<div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.95)',zIndex:4000,display:'flex',flexDirection:'column'}}>
      <div style={{padding:'12px 16px',display:'flex',gap:8,flexShrink:0}}>
        <button className="btn bs bsm" onClick={function(){setImgView(null);}}>✕ Close</button>
        <button className="btn bp bsm" onClick={function(){var a=document.createElement('a');a.href=imgView;a.download='photo.jpg';a.click();}}>⬇ Save</button>
      </div>
      <div style={{flex:1,display:'flex',alignItems:'center',justifyContent:'center',padding:12}}>
        <img src={imgView} style={{maxWidth:'95vw',maxHeight:'84vh',objectFit:'contain',borderRadius:8}} alt="preview"/>
      </div>
    </div>}
    {fwdMsg&&<div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.6)',zIndex:3000,display:'flex',alignItems:'center',justifyContent:'center',padding:16}} onClick={function(){setFwdMsg(null);}}>
      <div style={{background:'var(--sur)',border:'1px solid var(--bdr2)',borderRadius:12,padding:20,width:320,maxHeight:'80vh',display:'flex',flexDirection:'column'}} onClick={function(e){e.stopPropagation();}}>
        <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:18,fontWeight:700,marginBottom:12}}>➤ Forward</div>
        <div style={{background:'var(--sur2)',borderRadius:6,padding:'7px 10px',fontSize:12,color:'var(--tx2)',marginBottom:10}}>{fwdMsg.text||'[Media]'}</div>
        <div style={{overflowY:'auto',flex:1}}>
          {allChats.filter(function(c){return c.id!==activeChatId;}).map(function(c){
            return <div key={c.id} style={{padding:'9px 12px',borderBottom:'1px solid var(--bdr)',cursor:'pointer',display:'flex',alignItems:'center',gap:9}} onClick={function(){doForward(fwdMsg,c);}}>
              {c.type==='group'?<span style={{fontSize:18}}>👷</span>:<Avt user={c.userObj} size={26}/>}
              <span style={{fontWeight:500,fontSize:13}}>{c.name}</span>
            </div>;
          })}
        </div>
        <button className="btn bs" style={{marginTop:10,width:'100%'}} onClick={function(){setFwdMsg(null);}}>Cancel</button>
      </div>
    </div>}
    {showBroadcast&&<div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.65)',zIndex:3000,display:'flex',alignItems:'center',justifyContent:'center',padding:16}} onClick={function(){setShowBroadcast(false);}}>
      <div style={{background:'var(--sur)',border:'1px solid var(--bdr2)',borderRadius:12,padding:22,width:380,maxWidth:'95vw'}} onClick={function(e){e.stopPropagation();}}>
        <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:20,fontWeight:700,marginBottom:4}}>📢 Broadcast Message</div>
        <div style={{fontSize:12,color:'var(--tx2)',marginBottom:12}}>Sends to all users individually + all groups. Appears as a normal message.</div>
        <textarea rows="4" value={broadcastText} onChange={function(e){setBroadcastText(e.target.value);}} placeholder="Type your broadcast message..." style={{width:'100%',marginBottom:10}}></textarea>
        <div style={{display:'flex',gap:8}}>
          <button className="btn bp" style={{flex:1}} onClick={sendBroadcast}>📢 Send to All</button>
          <button className="btn bs" onClick={function(){setShowBroadcast(false);}}>Cancel</button>
        </div>
      </div>
    </div>}
    {showNewGroup&&<div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.65)',zIndex:3000,display:'flex',alignItems:'center',justifyContent:'center',padding:16}} onClick={function(){setShowNewGroup(false);}}>
      <div style={{background:'var(--sur)',border:'1px solid var(--bdr2)',borderRadius:12,padding:22,width:380,maxHeight:'85vh',display:'flex',flexDirection:'column'}} onClick={function(e){e.stopPropagation();}}>
        <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:20,fontWeight:700,marginBottom:14}}>👷 Create Group</div>
        <div className="fr"><label>Group Name *</label><input value={newGroupName} onChange={function(e){setNewGroupName(e.target.value);}} placeholder="e.g. Site 1 Team"/></div>
        <div style={{fontWeight:600,fontSize:12,marginBottom:8,color:'var(--tx2)'}}>Select Members:</div>
        <div style={{flex:1,overflowY:'auto',maxHeight:280,border:'1px solid var(--bdr)',borderRadius:8}}>
          {(P.users||[]).filter(function(u){return u.id!==user.id;}).map(function(u){
            var sel=newGroupMembers.indexOf(u.id)>=0;
            return <div key={u.id} style={{display:'flex',alignItems:'center',gap:10,padding:'9px 12px',borderBottom:'1px solid var(--bdr)',cursor:'pointer',background:sel?'var(--sur2)':'transparent'}} onClick={function(){toggleMember(u.id);}}>
              <div style={{width:18,height:18,borderRadius:4,border:sel?'2px solid var(--am)':'2px solid var(--bdr2)',background:sel?'var(--am)':'transparent',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
                {sel&&<span style={{fontSize:10,color:'#000',fontWeight:700}}>✓</span>}
              </div>
              <Avt user={u} size={28}/>
              <div><div style={{fontWeight:600,fontSize:13}}>{u.name}</div><div style={{fontSize:11,color:'var(--tx3)'}}>{RL[u.role]}</div></div>
            </div>;
          })}
        </div>
        <div style={{marginTop:10,fontSize:11,color:'var(--tx3)'}}>{newGroupMembers.length} selected</div>
        <div style={{display:'flex',gap:8,marginTop:12}}>
          <button className="btn bp" style={{flex:1}} onClick={createGroup}>✓ Create</button>
          <button className="btn bs" onClick={function(){setShowNewGroup(false);}}>✕ Cancel</button>
        </div>
      </div>
    </div>}
    {ctxMsg&&<div style={{position:'fixed',top:ctxPos.y,left:ctxPos.x,background:'var(--sur)',border:'1px solid var(--bdr2)',borderRadius:8,padding:4,boxShadow:'0 6px 20px rgba(0,0,0,.35)',zIndex:3500,minWidth:140}} onClick={function(e){e.stopPropagation();}}>
      <button style={{display:'block',width:'100%',textAlign:'left',padding:'7px 12px',borderRadius:5,fontSize:13,color:'var(--tx)',background:'none',cursor:'pointer'}} onClick={function(){setReplyTo(ctxMsg);setCtxMsg(null);}}>↩ Reply</button>
      <button style={{display:'block',width:'100%',textAlign:'left',padding:'7px 12px',borderRadius:5,fontSize:13,color:'var(--tx)',background:'none',cursor:'pointer'}} onClick={function(){setFwdMsg(ctxMsg);setCtxMsg(null);}}>➤ Forward</button>
      {ctxMsg.mediaType==='image'&&<button style={{display:'block',width:'100%',textAlign:'left',padding:'7px 12px',borderRadius:5,fontSize:13,color:'var(--tx)',background:'none',cursor:'pointer'}} onClick={function(){var a=document.createElement('a');a.href=ctxMsg.mediaSrc;a.download='photo.jpg';a.click();setCtxMsg(null);}}>⬇ Save Image</button>}
      {canPin&&<button style={{display:'block',width:'100%',textAlign:'left',padding:'7px 12px',borderRadius:5,fontSize:13,color:'var(--tx)',background:'none',cursor:'pointer'}} onClick={function(){togglePin(ctxMsg);setCtxMsg(null);}}>📌 {ctxMsg.pinned?'Unpin':'Pin'}</button>}
      {(ctxMsg&&(ctxMsg.uid===user.id||user.role==='master_admin'||user.role==='admin'))&&<button style={{display:'block',width:'100%',textAlign:'left',padding:'7px 12px',borderRadius:5,fontSize:13,color:'var(--rd)',background:'none',cursor:'pointer'}} onClick={function(){deleteMsg(ctxMsg);}}>🗑 Delete</button>}
    </div>}
    {showList&&<div style={{width:isMobile?'100%':240,borderRight:isMobile?'none':'1px solid var(--bdr)',display:'flex',flexDirection:'column',flexShrink:0}}>
      <div style={{padding:'10px 10px 8px',borderBottom:'1px solid var(--bdr)',flexShrink:0}}>
        <div style={{display:'flex',gap:6,alignItems:'center',marginBottom:8}}>
          <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:14,fontWeight:700,flex:1}}>💬 {L('messages')}</div>
          {(user.role==='master_admin'||user.role==='admin')&&<button className="btn bd bxs" onClick={function(){setShowBroadcast(true);}} style={{fontSize:11}} title="Broadcast to all">📢</button>}
          <button className="btn bp bxs" onClick={function(){setShowNewGroup(true);}} style={{fontSize:11}}>+ Group</button>
        </div>
        <div style={{position:'relative'}}>
          <input value={search} onChange={function(e){setSearch(e.target.value);}} placeholder="Search people or group..." style={{width:'100%',fontSize:12,padding:'6px 10px 6px 28px'}}/>
          <span style={{position:'absolute',left:8,top:'50%',transform:'translateY(-50%)',fontSize:12,color:'var(--tx3)',pointerEvents:'none'}}>🔍</span>
          {search&&<button style={{position:'absolute',right:6,top:'50%',transform:'translateY(-50%)',background:'none',color:'var(--tx3)',fontSize:13,cursor:'pointer',border:'none'}} onClick={function(){setSearch('');}}>✕</button>}
        </div>
      </div>
      <div style={{flex:1,overflowY:'auto'}}>
        {filteredChats.length===0&&<div style={{padding:16,textAlign:'center',color:'var(--tx3)',fontSize:12}}>No chats found</div>}
        {filteredChats.map(function(chat){
          var lastTxt=chat.last?(chat.last.text||(chat.last.mediaType==='image'?'📷 Photo':'🎥 Video')):'No messages yet';
          var isActive=chat.id===activeChatId;
          return <div key={chat.id} style={{padding:'10px 12px',borderBottom:'1px solid var(--bdr)',cursor:'pointer',background:isActive?'var(--sur2)':'transparent',borderLeft:isActive?'3px solid var(--am)':'3px solid transparent'}} onClick={function(){setActiveChatId(chat.id);setSearch('');setInp('');setReplyTo(null);}}>

              <div style={{flex:1,minWidth:0}}>
                <div style={{fontWeight:600,fontSize:13,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{chat.name}</div>

          <div style={{flex:1}}><div style={{fontWeight:700,fontSize:14}}>{ac.name}</div><div style={{fontSize:10,color:'var(--tx3)'}}>{ac.type==='group'?L('group'):L('directMsg')}</div></div>
          <button className="btn bs bxs" title="Voice Call" onClick={function(){startCall(false);}}>📞</button>
          <button className="btn bs bxs" title="Video Call" onClick={function(){startCall(true);}}>📹</button>
        </div>
        {pinned.length>0&&<div style={{padding:'6px 12px',background:'rgba(245,158,11,.06)',borderBottom:'1px solid var(--bdr)',flexShrink:0}}>
          {pinned.map(function(m){return <div key={m.id} style={{background:'rgba(245,158,11,.09)',border:'1px solid rgba(245,158,11,.18)',borderRadius:6,padding:'5px 9px',marginBottom:4,fontSize:11}}><div style={{fontSize:9,fontWeight:700,color:'var(--am)'}}>📌 PINNED</div><div>{m.text}</div></div>;})}
        </div>}
        <div style={{flex:1,overflowY:'auto',padding:'12px 14px',display:'flex',flexDirection:'column'}}>
          {curMsgs.length===0&&<div style={{color:'var(--tx3)',fontSize:13,textAlign:'center',marginTop:30}}>{L('noMsgs')}</div>}
          {curMsgs.map(renderMsg)}
          <div ref={endRef}/>
        </div>
        {replyTo&&<div style={{padding:'7px 12px',borderTop:'1px solid var(--bdr)',display:'flex',alignItems:'center',gap:8,background:'var(--sur2)',flexShrink:0}}>
          <div style={{flex:1,minWidth:0}}><div style={{fontSize:10,color:'var(--am)',fontWeight:700}}>↩ Replying to {replyTo.name}</div><div style={{fontSize:11,color:'var(--tx2)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{replyTo.text||'[media]'}</div></div>
          <button onClick={function(){setReplyTo(null);}} style={{background:'none',color:'var(--tx3)',fontSize:16,lineHeight:1,padding:4,cursor:'pointer',flexShrink:0}}>✕</button>
        </div>}
        <div style={{padding:'10px 12px',borderTop:'1px solid var(--bdr)',display:'flex',gap:8,alignItems:'center',flexShrink:0}}>
          <button className="btn bs bsm" style={{flexShrink:0}} onClick={pickFile}>📎</button>
          <input value={inp} onChange={function(e){setInp(e.target.value);}} onKeyDown={function(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMsg(inp);}}} placeholder={ac.name+'...'} style={{flex:1,minWidth:0}}/>
          <button className="btn bp bsm" style={{flexShrink:0}} onClick={function(){sendMsg(inp);}}>{L('send')}</button>
        </div>
      </div>:<div style={{flex:1,display:'flex',alignItems:'center',justifyContent:'center',flexDirection:'column',gap:10,color:'var(--tx3)'}}>

  </div>;
}

function Vendors(props){
  var user=props.user,P=props,lang=props.lang||'en';
  var isAdmin=user.role==='admin'||user.role==='master_admin';
  var [showM,setShowM]=useState(false);
  var [editId,setEditId]=useState(null);
  var [selVendor,setSelVendor]=useState(null);
  var [srch,setSrch]=useState('');
  var [typeF,setTypeF]=useState('all');
  var TYPES=['Supplier','Contractor','Transporter','Labour Contractor','Fuel Vendor','Other'];
  var blank={name:'',phone:'',email:'',gstNo:'',address:'',type:'Supplier',notes:''};
  var [form,setForm]=useState(blank);
  function sf(k,v){setForm(function(p){var n=Object.assign({},p);n[k]=v;return n;});}

  function getVendorTx(vname){
    var nm=(vname||'').toLowerCase();
    var pur=(P.purchases||[]).filter(function(p){return (p.vendor||'').toLowerCase()===nm;});
    var bil=(P.bills||[]).filter(function(b){return (b.vendor||'').toLowerCase()===nm;});
    var mis=(P.misc||[]).filter(function(m){return (m.desc||'').toLowerCase().indexOf(nm)>=0;});
    var mch=(P.machinery||[]).filter(function(m){return (m.owner||'').toLowerCase()===nm;});
    var mchTx=[];
    mch.forEach(function(m){(m.usageLog||[]).forEach(function(e){mchTx.push({date:e.date,type:'Machinery',desc:m.name+(m.reg?' ['+m.reg+']':''),site:gSite(P.sites,e.siteId||m.currentSiteId).name,amt:e.cost||0,inv:m.reg||''});});});
    var all=pur.map(function(p){return{date:p.date,type:'Purchase',desc:gMat(P.mats,p.matId).name,site:gSite(P.sites,p.siteId).name,amt:p.base+(p.gstAmt||0),inv:p.inv||'',gst:p.gstAmt||0};})
      .concat(bil.map(function(b){return{date:b.date,type:'Bill',desc:b.invoiceNo?'Bill #'+b.invoiceNo:'Bill',site:b.siteId?gSite(P.sites,b.siteId).name:'N/A',amt:b.total||b.base||0,inv:b.invoiceNo||'',gst:b.gstAmt||0};}))
      .concat(mis.map(function(m){return{date:m.date,type:'Misc',desc:m.desc,site:gSite(P.sites,m.siteId).name,amt:m.amt||0,inv:'',gst:0};}))
      .concat(mchTx.map(function(t){return Object.assign({},t,{gst:0});}))
      .sort(function(a,b){return (b.date||'').localeCompare(a.date||'');});
    var tot=all.reduce(function(a,x){return a+x.amt;},0);
    var totGst=all.reduce(function(a,x){return a+(x.gst||0);},0);
    return{txns:all,total:tot,totGst:totGst,count:all.length,lastDate:all.length?all[0].date:'N/A'};
  }

  function save(){
    if(!form.name.trim()){alert('Vendor name required.');return;}
    var obj=Object.assign({},form,{id:editId||Date.now(),name:form.name.trim()});
    if(editId){upd(P.setVendors,editId,obj);}else{addItem(P.setVendors,obj);}
    addItem(P.setLog,{id:Date.now(),user:user.name,action:(editId?'Edited':'Added')+' vendor: '+form.name,time:sts(),type:'edit'});
    setShowM(false);setEditId(null);setForm(blank);
  }
  function startEdit(v){setForm({name:v.name||'',phone:v.phone||'',email:v.email||'',gstNo:v.gstNo||'',address:v.address||'',type:v.type||'Supplier',notes:v.notes||''});setEditId(v.id);setShowM(true);}

  /* Build combined vendor list: manual + auto-detected from transactions */
  var regNames={};
  (P.vendors||[]).forEach(function(v){regNames[v.name.toLowerCase()]=true;});
  var autoV=[];
  (P.purchases||[]).forEach(function(p){if(p.vendor&&!regNames[p.vendor.toLowerCase()]){regNames[p.vendor.toLowerCase()]=true;autoV.push({id:'a_'+p.vendor,name:p.vendor,type:'Supplier',auto:true});}});
  (P.bills||[]).forEach(function(b){if(b.vendor&&!regNames[b.vendor.toLowerCase()]){regNames[b.vendor.toLowerCase()]=true;autoV.push({id:'a_'+b.vendor,name:b.vendor,type:'Supplier',auto:true});}});
  (P.machinery||[]).forEach(function(m){if(m.owner&&!regNames[m.owner.toLowerCase()]){regNames[m.owner.toLowerCase()]=true;autoV.push({id:'a_m_'+m.id,name:m.owner,type:'Supplier',auto:true,source:'Machinery'});}});
  var combined=[].concat(P.vendors||[]).concat(autoV);

  var visible=combined.filter(function(v){
    if(typeF!=='all'&&(v.type||'Supplier')!==typeF)return false;
    if(srch){var s=srch.toLowerCase();return (v.name||'').toLowerCase().indexOf(s)>=0||(v.phone||'').indexOf(s)>=0||(v.gstNo||'').toLowerCase().indexOf(s)>=0;}
    return true;
  });

  function printAllVendors(){
    var rows=visible.map(function(v){var t=getVendorTx(v.name);return '<tr><td>'+v.name+'</td><td>'+(v.type||'Supplier')+'</td><td>'+(v.phone||'')+'</td><td>'+(v.gstNo||'')+'</td><td>'+t.count+'</td><td>'+INR(t.total)+'</td><td>'+t.lastDate+'</td></tr>';}).join('');
    pdfWin('<h2>Vendor Register \u2014 RAJ Construction</h2><div class="info"><div class="iv"><div class="l">Total Vendors</div><div class="v">'+visible.length+'</div></div></div><table><thead><tr><th>Name</th><th>Type</th><th>Phone</th><th>GST No.</th><th>Transactions</th><th>Total Business</th><th>Last Txn</th></tr></thead><tbody>'+rows+'</tbody></table>');
  }

  var selV=selVendor?combined.filter(function(v){return v.id===selVendor;})[0]:null;
  var selT=selV?getVendorTx(selV.name):null;

  return <div className="fi">
    {selV&&<div className="ov" onClick={function(){setSelVendor(null);}}>
      <div className="mo" style={{maxWidth:740}} onClick={function(e){e.stopPropagation();}}>
        <div className="mt">🏪 {selV.name}
          <div style={{marginLeft:'auto',display:'flex',gap:8}}>
            <button className="btn bs bsm" onClick={function(){
              var rows=selT.txns.map(function(tx){return '<tr><td>'+tx.date+'</td><td>'+tx.type+'</td><td>'+tx.desc+'</td><td>'+tx.site+'</td><td>'+(tx.inv||'N/A')+'</td><td>'+(tx.gst>0?INR(tx.gst):'\u2014')+'</td><td>'+INR(tx.amt)+'</td></tr>';}).join('');
              pdfWin('<h2>Vendor History \u2014 '+selV.name+'</h2><div class="info"><div class="iv"><div class="l">Total Business</div><div class="v">'+INR(selT.total)+'</div></div><div class="iv"><div class="l">Transactions</div><div class="v">'+selT.count+'</div></div><div class="iv"><div class="l">Last Txn</div><div class="v">'+selT.lastDate+'</div></div><div class="iv"><div class="l">Type</div><div class="v">'+(selV.type||'N/A')+'</div></div>'+(selV.phone?'<div class="iv"><div class="l">Phone</div><div class="v">'+selV.phone+'</div></div>':'')+(selV.gstNo?'<div class="iv"><div class="l">GST No.</div><div class="v">'+selV.gstNo+'</div></div>':'')+'</div>'+(rows?'<table><thead><tr><th>Date</th><th>Type</th><th>Description</th><th>Site</th><th>Invoice/Ref</th><th>GST</th><th>Amount</th></tr></thead><tbody>'+rows+'</tbody></table>':'<p>No transactions.</p>'));
            }}>Print History</button>
            {isAdmin&&!selV.auto&&<button className="btn bs bsm" onClick={function(){startEdit(selV);setSelVendor(null);}}>Edit</button>}
            <button onClick={function(){setSelVendor(null);}} style={{background:'none',color:'var(--tx2)',fontSize:18,lineHeight:1,cursor:'pointer'}}>&#x2715;</button>
          </div>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(130px,1fr))',gap:8,marginBottom:14}}>
          {[['Total Business',INR(selT.total),'var(--am)'],['Total GST',INR(selT.totGst||0),'var(--pu)'],['Transactions',selT.count,'var(--bl)'],['Last Transaction',selT.lastDate,'var(--tx)']].map(function(x){return <div key={x[0]} style={{background:'var(--sur2)',borderRadius:8,padding:'10px 12px'}}><div style={{fontSize:9,color:'var(--tx3)',textTransform:'uppercase',marginBottom:3}}>{x[0]}</div><div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:14,fontWeight:700,color:x[2]}}>{x[1]}</div></div>;})}
        </div>
        {(selV.phone||selV.email||selV.gstNo||selV.address)&&<div style={{background:'var(--sur2)',borderRadius:8,padding:'10px 14px',marginBottom:14,fontSize:12,display:'flex',gap:16,flexWrap:'wrap'}}>
          {selV.phone&&<span>&#128222; {selV.phone}</span>}
          {selV.email&&<span>&#9993; {selV.email}</span>}
          {selV.gstNo&&<span>GST: <b>{selV.gstNo}</b></span>}
          {selV.address&&<span>&#128205; {selV.address}</span>}
          {selV.notes&&<span style={{color:'var(--tx2)'}}>{selV.notes}</span>}
        </div>}
        {selT.txns.length===0?<div className="aba aba-a">No transactions found for this vendor.</div>:
        <div style={{overflowX:'auto'}}>
          <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:15,fontWeight:700,marginBottom:8}}>Transaction History ({selT.txns.length})</div>
          <table><thead><tr><th>Date</th><th>Type</th><th>Description</th><th>Site</th><th>Invoice</th><th>Amount</th></tr></thead>
          <tbody>{selT.txns.map(function(tx,i){var cls={Purchase:'bbl',Bill:'bam',Misc:'bpu'}[tx.type]||'bam';return <tr key={i}>
            <td className="mono tsm">{tx.date}</td>
            <td><span className={cls} style={{fontSize:9}}>{tx.type}</span></td>
            <td style={{fontSize:12}}>{tx.desc}</td>
            <td style={{fontSize:11,color:'var(--tx2)'}}>{tx.site}</td>
            <td className="mono tsm">{tx.inv||'\u2014'}</td>
            <td className="mono tsm" style={{color:'var(--pu)'}}>{tx.gst>0?INR(tx.gst):'\u2014'}</td>
            <td className="mono" style={{color:'var(--am)',fontWeight:600}}>{INR(tx.amt)}</td>
          </tr>;})}</tbody></table>
        </div>}
      </div>
    </div>}

    <div className="flex ic jb mb12">
      <div className="st" style={{margin:0}}>&#127978; Vendor Management</div>
      <div style={{display:'flex',gap:6}}>
        <button className="btn bs bsm" onClick={printAllVendors}>Print List</button>
        {isAdmin&&<button className="btn bp bsm" onClick={function(){setShowM(true);setEditId(null);setForm(blank);}}>+ Add Vendor</button>}
      </div>
    </div>

    <div style={{display:'flex',gap:8,flexWrap:'wrap',marginBottom:12,padding:'10px 12px',background:'var(--sur2)',border:'1px solid var(--bdr)',borderRadius:8,alignItems:'center'}}>
      <input style={{flex:1,minWidth:160}} placeholder="Search name, phone, GST..." value={srch} onChange={function(e){setSrch(e.target.value);}}/>
      <select style={{width:160}} value={typeF} onChange={function(e){setTypeF(e.target.value);}}><option value="all">All Types</option>{TYPES.map(function(t){return <option key={t} value={t}>{t}</option>;})}</select>
      {(srch||typeF!=='all')&&<button className="btn bs bsm" onClick={function(){setSrch('');setTypeF('all');}}>Clear</button>}
      <span style={{fontSize:11,color:'var(--tx3)',marginLeft:'auto'}}>{visible.length} vendors</span>
    </div>

    <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(280px,1fr))',gap:12}}>
      {visible.map(function(v){
        var t=getVendorTx(v.name);
        return <div key={v.id} className="card" style={{cursor:'pointer',borderLeft:'4px solid var(--am)'}}
          onClick={function(){setSelVendor(v.id);}}
          onMouseEnter={function(e){e.currentTarget.style.boxShadow='0 4px 16px rgba(245,158,11,.18)';}}
          onMouseLeave={function(e){e.currentTarget.style.boxShadow='';}}
        >
          <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',marginBottom:8}}>
            <div>
              <div style={{fontWeight:700,fontSize:14}}>{v.name}</div>
              <div style={{display:'flex',gap:6,marginTop:3,flexWrap:'wrap'}}>
                <span className="bbl" style={{fontSize:9}}>{v.type||'Supplier'}</span>
                {v.auto&&<span className="bam" style={{fontSize:9}}>Auto-detected</span>}
              </div>
            </div>
            {isAdmin&&!v.auto&&<div style={{display:'flex',gap:4}}>
              <button className="btn bs bxs" style={{fontSize:10}} onClick={function(e){e.stopPropagation();startEdit(v);}}>Edit</button>
              <button className="btn bd bxs" style={{fontSize:10}} onClick={function(e){e.stopPropagation();if(window.confirm('Remove '+v.name+'?'))removeItem(P.setVendors,v.id);}}>&#x2715;</button>
            </div>}
          </div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:6,marginBottom:v.phone||v.gstNo?8:0}}>
            {[['Total',INR(t.total),'var(--am)'],['GST',INR(t.totGst||0),'var(--pu)'],['Txns',t.count,'var(--bl)']].map(function(x){return <div key={x[0]} style={{background:'var(--sur2)',borderRadius:5,padding:'5px 7px',textAlign:'center'}}><div style={{fontSize:8,color:'var(--tx3)',textTransform:'uppercase'}}>{x[0]}</div><div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:12,fontWeight:700,color:x[2]}}>{x[1]}</div></div>;})}
          </div>
          {(v.phone||v.gstNo)&&<div style={{fontSize:11,color:'var(--tx2)',borderTop:'1px solid var(--bdr)',paddingTop:6,marginTop:4}}>
            {v.phone&&<span style={{marginRight:10}}>&#128222; {v.phone}</span>}
            {v.gstNo&&<span>GST: {v.gstNo}</span>}
          </div>}
        </div>;
      })}
      {visible.length===0&&<div style={{gridColumn:'1/-1',textAlign:'center',padding:32,color:'var(--tx3)',fontSize:13}}>No vendors found. Add vendors or they auto-appear from purchase/bill records.</div>}
    </div>

    {showM&&<Modal title={editId?'Edit Vendor':'Add Vendor'} icon="&#127978;" onClose={function(){setShowM(false);setEditId(null);}}>
      <div className="fg">
        <div className="fr"><label>Vendor Name *</label><input value={form.name} onChange={function(e){sf('name',e.target.value);}} placeholder="e.g. Ambuja Cements"/></div>
        <div className="fr"><label>Type</label><select value={form.type} onChange={function(e){sf('type',e.target.value);}}>{TYPES.map(function(t){return <option key={t} value={t}>{t}</option>;})}</select></div>
      </div>
      <div className="fg">
        <div className="fr"><label>Phone</label><input value={form.phone} onChange={function(e){sf('phone',e.target.value);}} placeholder="+91 XXXXX XXXXX"/></div>
        <div className="fr"><label>Email</label><input type="email" value={form.email} onChange={function(e){sf('email',e.target.value);}}/></div>
      </div>
      <div className="fg">
        <div className="fr"><label>GST Number</label><input value={form.gstNo} onChange={function(e){sf('gstNo',e.target.value);}} placeholder="e.g. 09AABCR1234A1Z5"/></div>
        <div className="fr"><label>Address</label><input value={form.address} onChange={function(e){sf('address',e.target.value);}}/></div>
      </div>
      <div className="fr"><label>Notes</label><textarea rows="2" value={form.notes} onChange={function(e){sf('notes',e.target.value);}}/></div>
      <div className="flex g6"><button className="btn bp" style={{flex:1}} onClick={save}>Save</button><button className="btn bs" onClick={function(){setShowM(false);setEditId(null);}}>Cancel</button></div>
    </Modal>}
  </div>;
}

function Bills(props){
  var user=props.user,P=props,lang=props.lang||'en';
  var L=function(k){return tl(lang,k);};
  var isAdmin=user.role==='admin'||user.role==='master_admin';
  var [showM,setShowM]=useState(false);
  var [editId,setEditId]=useState(null);
  var [viewBill,setViewBill]=useState(null);
  var [siteSel,setSiteSel]=useState('all');
  var [filterStatus,setFilterStatus]=useState('all');
  var [searchQ,setSearchQ]=useState('');
  var [fromDate,setFromDate]=useState('');
  var [toDate,setToDate]=useState('');
  var blank={invoiceNo:'',date:today(),vendor:'',siteId:'',base:'',gstType:'none',sgstPct:'',cgstPct:'',igstPct:'',notes:'',status:'pending',billFile:'',billFileName:'',_showGst:false};
  var [form,setForm]=useState(blank);
  function sf(k,v){setForm(function(p){var n=Object.assign({},p);n[k]=v;return n;});}
  function calcG(f){var b=+f.base||0,s=f.gstType==='intra'?Math.round(b*(+f.sgstPct||0)/100):0,g2=f.gstType==='intra'?Math.round(b*(+f.cgstPct||0)/100):0,ig=f.gstType==='inter'?Math.round(b*(+f.igstPct||0)/100):0;return{sgst:s,cgst:g2,igst:ig,total:s+g2+ig,grand:b+s+g2+ig};}
  function pickBill(){var fi=document.createElement('input');fi.type='file';fi.accept='application/pdf,image/*';fi.onchange=function(e){var f=e.target.files[0];if(!f)return;if(f.size>100*1024*1024){alert('Max 100MB');return;}var r=new FileReader();r.onload=function(ev){sf('billFile',ev.target.result);sf('billFileName',f.name);};r.readAsDataURL(f);};fi.click();}
  function save(){
    if(!form.vendor.trim()||!form.base||!form.date){alert('Vendor, Date and Taxable Amount are required.');return;}
    var g=calcG(form);
    var obj={id:editId||Date.now(),invoiceNo:form.invoiceNo,date:form.date,vendor:form.vendor,siteId:+form.siteId||0,base:+form.base,gstType:form.gstType,sgstPct:+form.sgstPct||0,cgstPct:+form.cgstPct||0,igstPct:+form.igstPct||0,sgstAmt:g.sgst,cgstAmt:g.cgst,igstAmt:g.igst,gstAmt:g.total,total:g.grand,notes:form.notes,status:form.status,billFile:form.billFile,billFileName:form.billFileName,by:user.name,ts:sts()};

function Tenders(props){

    department:'',value:'',completionPeriod:'',preBidMeeting:'',ddBg:'',feeAmount:'',
    bidFeePayableTo:'',bidFeePayableAt:'',emdAmount:'',emdPayableTo:'',emdPayableAt:'',

    if(tenderSearch){var q=tenderSearch.toLowerCase();if((t.orgName||'').toLowerCase().indexOf(q)<0&&(t.nameOfWork||'').toLowerCase().indexOf(q)<0&&(t.tenderNo||'').toLowerCase().indexOf(q)<0)return false;}
    if(tFromDate&&(t.date||'')< tFromDate)return false;
    if(tToDate&&(t.date||'')>tToDate)return false;
    return true;
  });
  var sorted=filtered.slice().sort(function(a,b){return (b.date||'').localeCompare(a.date||'');});

  function pickFiles(){
    var fi=document.createElement('input');fi.type='file';fi.multiple=true;fi.accept='application/pdf,image/*';

      emdPayableTo:t.emdPayableTo||'',emdPayableAt:t.emdPayableAt||'',subProcessingFee:t.subProcessingFee||'',
      subPaidFee:t.subPaidFee||'',status:t.status||'open',remark:t.remark||'',entryBy:t.entryBy||user.name,

function Salary(props){
  var user=props.user,P=props,lang=props.lang||'en';
  var L=function(k){return tl(lang,k);};
  var [tab,setTab]=useState('list');
  var [siteSel,setSiteSel]=useState('all');
  var [showForm,setShowForm]=useState(false);
  var [editId,setEditId]=useState(null);
  var months=['January','February','March','April','May','June','July','August','September','October','November','December'];
  var now=new Date();
  var blank={
    empId:'',month:months[now.getMonth()],year:String(now.getFullYear()),
    siteId:'',basic:'',hra:'',da:'',allowances:'',
    pf:'',esic:'',tds:'',otherDed:'',
    payMode:'cash',payDate:today(),status:'pending',remarks:''
  };
  var [form,setForm]=useState(blank);
  function sf(k,v){setForm(function(p){var n=Object.assign({},p);n[k]=v;return n;});}

  var salaries=P.salaries||[];
  var fieldWorkers=P.users.filter(function(u){return u.role==='field_worker';});
  var mySites=usites(user,P.sites);

  var visSal=siteSel==='all'
    ?salaries
    :salaries.filter(function(s){return s.siteId===+siteSel;});

  function calcNet(){
    var earnings=(+form.basic||0)+(+form.hra||0)+(+form.da||0)+(+form.allowances||0);
    var deductions=(+form.pf||0)+(+form.esic||0)+(+form.tds||0)+(+form.otherDed||0);
    return{gross:earnings,ded:deductions,net:earnings-deductions};
  }

  function save(){
    if(!form.empId||!form.basic){alert('Employee and Basic Salary required.');return;}
    var calc=calcNet();
    var emp=gUser(P.users,+form.empId);
    var obj=Object.assign({},form,{
      id:editId||Date.now(),empId:+form.empId,empName:emp.name,
      siteId:+form.siteId,gross:calc.gross,deductions:calc.ded,net:calc.net,
      by:user.name,ts:sts()
    });
    if(editId){
      P.setSalaries(function(prev){return prev.map(function(s){return s.id===editId?obj:s;});});
      setEditId(null);
    } else {
      addItem(P.setSalaries,obj);
    }
    setShowForm(false);setForm(blank);
  }

  function startEdit(s){
    setForm({empId:s.empId,month:s.month,year:s.year,siteId:s.siteId,basic:s.basic,hra:s.hra||'',da:s.da||'',allowances:s.allowances||'',pf:s.pf||'',esic:s.esic||'',tds:s.tds||'',otherDed:s.otherDed||'',payMode:s.payMode||'cash',payDate:s.payDate||today(),status:s.status||'pending',remarks:s.remarks||''});
    setEditId(s.id);setShowForm(true);
  }

  function printPayslip(s){
    var emp=gUser(P.users,s.empId);

function Inventory(props){

  function sf(k,v){setForm(function(p){var n=Object.assign({},p);n[k]=v;return n;});}

  var cats=['Cement','Steel','Sand','Aggregate','Brick','Paint','Electrical','Plumbing','Hardware','Other'];

  function getSiteStock(siteId){
    var purchases=P.purchases.filter(function(p){return p.siteId===siteId;});
    var map={};

      var matId=p.matId;
      var m=gMat(P.mats,matId);
      if(!map[matId])map[matId]={mat:m,qty:0,cost:0};
      map[matId].qty+=(+p.qty||0);
      map[matId].cost+=p.base+(p.gstAmt||0);
    });
    return Object.values(map);
  }

              <td className="mono tsm">{INR(m.rate)}/{m.unit}</td>
              <td className="mono tsm">{INR(m.stock*m.rate)}</td>
              <td>{low?<span className="brd" style={{fontSize:9}}>Low Stock</span>:<span className="bgr" style={{fontSize:9}}>OK</span>}</td>
              <td><button className="btn bs bxs" onClick={function(){startEdit(m);}}>✎</button></td>
            </tr>;
          })}</tbody>
        </table>
      </div>
    </div>}

    {siteSel!=='all'&&<div>
      <div className="aba aba-g" style={{marginBottom:12}}>
        Showing material usage from purchase records for <b>{gSite(P.sites,+siteSel).name}</b>.
      </div>
      {siteItems.length===0&&<div style={{color:'var(--tx3)',fontSize:13,padding:20,textAlign:'center'}}>No purchases recorded for this site yet.</div>}
      {siteItems.length>0&&<div className="card" style={{padding:0,overflowX:'auto'}}>
        <table>
          <thead><tr><th>Material</th><th>Category</th><th>Total Purchased</th><th>Total Cost</th></tr></thead>
          <tbody>{siteItems.map(function(x){
            return <tr key={x.mat.id}>
              <td style={{fontWeight:600,fontSize:12}}>{x.mat.name}</td>
              <td><span className="bbl" style={{fontSize:9}}>{x.mat.cat}</span></td>
              <td className="mono" style={{color:'var(--am)',fontWeight:600}}>{x.qty} {x.mat.unit}</td>
              <td className="mono" style={{color:'var(--gr)',fontWeight:600}}>{INR(Math.round(x.cost))}</td>
            </tr>;
          })}</tbody>
        </table>
      </div>}
    </div>}

    {showM&&<Modal title={editM?L('editMaterial'):L('addMaterial')} icon="📦" onClose={function(){setShowM(false);setEditM(null);}}>
      <div className="fg"><div className="fr"><label>{L('name')} *</label><input value={form.name} onChange={function(e){sf('name',e.target.value);}}/></div><div className="fr"><label>{L('category')}</label><select value={form.cat} onChange={function(e){sf('cat',e.target.value);}}>{cats.map(function(c){return <option key={c}>{c}</option>;})}</select></div></div>
      <div className="fg3"><div className="fr"><label>{L('unit')}</label><select value={form.unit} onChange={function(e){sf('unit',e.target.value);}}>{['bags','MT','CFT','no','L','Kg','m','m2','m3','set','pair'].map(function(u){return <option key={u}>{u}</option>;})}</select></div><div className="fr"><label>Stock</label><input type="number" value={form.stock} onChange={function(e){sf('stock',e.target.value);}}/></div><div className="fr"><label>Min Stock</label><input type="number" value={form.minStock} onChange={function(e){sf('minStock',e.target.value);}}/></div></div>
      <div className="fr"><label>{L('rate')} (per unit)</label><input type="number" value={form.rate} onChange={function(e){sf('rate',e.target.value);}}/></div>
      <div className="flex g6"><button className="btn bp" style={{flex:1}} onClick={save}>{L('save')}</button><button className="btn bs" onClick={function(){setShowM(false);setEditM(null);}}>{L('cancel')}</button></div>
    </Modal>}
  </div>;
}

function Machinery(props){
  var user=props.user,P=props,lang=props.lang||'en';
  var L=function(k){return tl(lang,k);};
  var isAdmin=user.role==='admin'||user.role==='master_admin';
  var machines=P.machinery||[];
  var [siteSel,setSiteSel]=useState('all');
  var [showAdd,setShowAdd]=useState(false);
  var [editId,setEditId]=useState(null);
  var [showUsage,setShowUsage]=useState(null);
  var [showTransfer,setShowTransfer]=useState(null);
  var [showHistory,setShowHistory]=useState(null);
  var [transferSite,setTransferSite]=useState('');
  var [usageForm,setUsageForm]=useState({date:today(),hours:'',cost:'',operator:'',notes:''});
  var mTypes=['Excavator','Bulldozer','Crane','Concrete Mixer','Concrete Pump','Generator','Compactor','Loader','Tipper','Drill','Other'];
  var firstSiteId=usites(user,P.sites).length?usites(user,P.sites)[0].id:'';
  var blank={name:'',type:'',reg:'',owner:'',ownership:'owned',currentSiteId:firstSiteId,status:'active'};
  var [mForm,setMForm]=useState(blank);
  function sfm(k,v){setMForm(function(p){var n=Object.assign({},p);n[k]=v;return n;});}
  function sfu(k,v){setUsageForm(function(p){var n=Object.assign({},p);n[k]=v;return n;});}

  var myIds=usites(user,P.sites).map(function(s){return s.id;});
  var visible=isAdmin
    ?(siteSel==='all'?machines:machines.filter(function(m){return m.currentSiteId===+siteSel;}))
    :machines.filter(function(m){return myIds.indexOf(m.currentSiteId)>=0;});

  function saveMachine(){
    if(!mForm.name.trim()){alert('Machine name required.');return;}
    if(editId){
      P.setMachinery(function(prev){return prev.map(function(m){return m.id===editId?Object.assign({},m,{name:mForm.name,type:mForm.type,reg:mForm.reg,owner:mForm.owner,ownership:mForm.ownership||'owned',currentSiteId:+mForm.currentSiteId,status:mForm.status}):m;});});
      setEditId(null);
    } else {
      addItem(P.setMachinery,{id:Date.now(),name:mForm.name,type:mForm.type,reg:mForm.reg,owner:mForm.owner,ownership:mForm.ownership||'owned',currentSiteId:+mForm.currentSiteId,status:mForm.status,usageLog:[],transferHistory:[{from:null,to:+mForm.currentSiteId,date:today(),by:user.name}]});
    }
    setShowAdd(false);setMForm(blank);
  }

  function startEdit(m){
    setMForm({name:m.name,type:m.type||'',reg:m.reg||'',owner:m.owner||'',ownership:m.ownership||'owned',currentSiteId:m.currentSiteId,status:m.status||'active'});
    setEditId(m.id);setShowAdd(true);
  }

  function logUsage(){
    if(!usageForm.hours){alert('Enter hours.');return;}
    var machineId=showUsage;
    P.setMachinery(function(prev){return prev.map(function(m){
      if(m.id!==machineId)return m;
      var entry={id:Date.now(),date:usageForm.date,hours:+usageForm.hours,cost:+usageForm.cost||0,operator:usageForm.operator,notes:usageForm.notes,siteId:m.currentSiteId,by:user.name};
      return Object.assign({},m,{usageLog:(m.usageLog||[]).concat([entry])});
    });});
    setUsageForm({date:today(),hours:'',cost:'',operator:'',notes:''});setShowUsage(null);
  }

  function doTransfer(){
    if(!transferSite){alert('Select destination.');return;}
    var machineId=showTransfer;
    P.setMachinery(function(prev){return prev.map(function(m){
      if(m.id!==machineId)return m;
      var h={from:m.currentSiteId,to:+transferSite,date:today(),by:user.name};
      return Object.assign({},m,{currentSiteId:+transferSite,transferHistory:(m.transferHistory||[]).concat([h])});
    });});
    setShowTransfer(null);setTransferSite('');
  }

  function usageSummary(m){
    var log=m.usageLog||[];
    var hrs=log.reduce(function(a,e){return a+(e.hours||0);},0);
    var cost=log.reduce(function(a,e){return a+(e.cost||0);},0);
    var days=Object.keys(log.reduce(function(a,e){a[e.date]=1;return a;},{})).length;
    return{hrs:hrs,days:days,n:log.length,cost:cost};
  }

  var statCol={active:'var(--gr)',idle:'var(--am)',maintenance:'var(--rd)'};
  var statLbl={active:'Active',idle:'Idle',maintenance:'Maintenance'};

  function printMachinery(){
    var siteLabel=siteSel==='all'?'All Sites':gSite(P.sites,+siteSel).name;
    var rows=visible.map(function(m){var s=gSite(P.sites,m.currentSiteId),su=usageSummary(m);return '<tr><td>'+m.name+'</td><td>'+(m.type||'N/A')+'</td><td>'+(m.reg||'N/A')+'</td><td>'+(m.owner||'N/A')+'</td><td>'+(m.ownership||'owned')+'</td><td>'+s.name+'</td><td>'+(statLbl[m.status]||m.status)+'</td><td>'+su.hrs+'h ('+su.days+' days)</td><td>'+INR(su.cost)+'</td></tr>';}).join('');
    pdfWin('<h2>Machinery Register \u2014 '+siteLabel+'</h2><div class="info"><div class="iv"><div class="l">Total Machines</div><div class="v">'+visible.length+'</div></div><div class="iv"><div class="l">Active</div><div class="v">'+visible.filter(function(m){return m.status==="active";}).length+'</div></div><div class="iv"><div class="l">Idle</div><div class="v">'+visible.filter(function(m){return m.status==="idle";}).length+'</div></div><div class="iv"><div class="l">Maintenance</div><div class="v">'+visible.filter(function(m){return m.status==="maintenance";}).length+'</div></div></div><table><thead><tr><th>Machine</th><th>Type</th><th>Reg/Serial</th><th>Owner</th><th>Ownership</th><th>Current Site</th><th>Status</th><th>Usage</th><th>Usage Cost</th></tr></thead><tbody>'+rows+'</tbody></table>');
  }
  var activeMachine=showUsage?machines.filter(function(m){return m.id===showUsage;})[0]:null;
  var transferMachine=showTransfer?machines.filter(function(m){return m.id===showTransfer;})[0]:null;
  var historyMachine=showHistory?machines.filter(function(m){return m.id===showHistory;})[0]:null;

  return <div className="fi">
    <div className="flex ic jb mb12" style={{marginBottom:12}}>
      <div style={{display:'flex',gap:8,alignItems:'center'}}>
        {isAdmin&&<select style={{width:160}} value={siteSel} onChange={function(e){setSiteSel(e.target.value);}}>
          <option value="all">All Sites</option>
          {usites(user,P.sites).map(function(s){return <option key={s.id} value={s.id}>{s.name}</option>;})}
        </select>}
      </div>
      <div style={{display:'flex',gap:6}}>
        <button className="btn bs bsm" onClick={printMachinery}>Print</button>
        {isAdmin&&<button className="btn bp bsm" onClick={function(){setShowAdd(true);setEditId(null);setMForm(blank);}}>+ Add Machine</button>}
      </div>
    </div>
    {showAdd&&<div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.65)',zIndex:2000,display:'flex',alignItems:'center',justifyContent:'center',padding:16}} onClick={function(){setShowAdd(false);setEditId(null);}}>
      <div style={{background:'var(--sur)',border:'1px solid var(--bdr2)',borderRadius:14,padding:22,width:500,maxWidth:'95vw'}} onClick={function(e){e.stopPropagation();}}>
        <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:20,fontWeight:700,marginBottom:14,color:'var(--am)'}}>{editId?'✎ Edit Machine':'+ Add Machine'}</div>
        <div className="fg">
          <div className="fr"><label>Machine Name *</label><input value={mForm.name} onChange={function(e){sfm('name',e.target.value);}} placeholder="e.g. JCB 3DX"/></div>
          <div className="fr"><label>Type</label>
            <select value={mForm.type} onChange={function(e){sfm('type',e.target.value);}}>
              <option value="">Select...</option>
              {mTypes.map(function(t){return <option key={t}>{t}</option>;})}
            </select>
          </div>
        </div>
        <div className="fg">
          <div className="fr"><label>Reg / Serial No.</label><input value={mForm.reg} onChange={function(e){sfm('reg',e.target.value);}}/></div>
          <div className="fr"><label>Owner / Vendor</label><input list="vnd-list3" value={mForm.owner} onChange={function(e){sfm('owner',e.target.value);}}/><datalist id="vnd-list3">{(P.vendors||[]).map(function(v){return <option key={v.id} value={v.name}/>;})} {(P.machinery||[]).reduce(function(acc,m){if(m.owner&&!acc.includes(m.owner))acc.push(m.owner);return acc;},[]).map(function(v,i){return <option key={'mv'+i} value={v}/>;})}</datalist></div>
        </div>
        <div className="fg">
          <div className="fr"><label>Ownership</label>
            <select value={mForm.ownership||'owned'} onChange={function(e){sfm('ownership',e.target.value);}}>
              <option value="owned">Self Owned</option>
              <option value="rented">Rented</option>
              <option value="hired">Hired (Per Hour)</option>
            </select>
          </div>
          <div className="fr"><label>Status</label>
            <select value={mForm.status} onChange={function(e){sfm('status',e.target.value);}}>
              <option value="active">Active</option>
              <option value="idle">Idle</option>
              <option value="maintenance">Maintenance</option>
            </select>
          </div>
        </div>
        <div className="fr"><label>Assigned Site</label>
          <select value={mForm.currentSiteId} onChange={function(e){sfm('currentSiteId',e.target.value);}}>
            {P.sites.map(function(s){return <option key={s.id} value={s.id}>{s.name}</option>;})}
          </select>
        </div>
        <div style={{display:'flex',gap:8,marginTop:6}}>
          <button className="btn bp" style={{flex:1}} onClick={saveMachine}>✓ {editId?'Save':'Add Machine'}</button>
          <button className="btn bs" onClick={function(){setShowAdd(false);setEditId(null);}}>✕ Cancel</button>
        </div>
      </div>
    </div>}

    {showUsage&&activeMachine&&<div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.65)',zIndex:2000,display:'flex',alignItems:'center',justifyContent:'center',padding:16}} onClick={function(){setShowUsage(null);}}>
      <div style={{background:'var(--sur)',border:'1px solid var(--bdr2)',borderRadius:14,padding:22,width:420,maxWidth:'95vw'}} onClick={function(e){e.stopPropagation();}}>
        <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:18,fontWeight:700,marginBottom:4}}>📈 Log Usage</div>
        <div style={{fontSize:12,color:'var(--tx2)',marginBottom:14}}><b style={{color:'var(--am)'}}>{activeMachine.name}</b> · {gSite(P.sites,activeMachine.currentSiteId).name}</div>
        <div className="fg">
          <div className="fr"><label>Date</label><input type="date" value={usageForm.date} onChange={function(e){sfu('date',e.target.value);}}/></div>
          <div className="fr"><label>Hours Used *</label><input type="number" min="0" step="0.5" value={usageForm.hours} onChange={function(e){sfu('hours',e.target.value);}} placeholder="e.g. 8"/></div>
        </div>
        <div className="fr"><label>Usage Cost (INR)</label><input type="number" value={usageForm.cost} onChange={function(e){sfu('cost',e.target.value);}} placeholder="e.g. 5000"/></div>
        <div className="fr"><label>Operator</label><input value={usageForm.operator} onChange={function(e){sfu('operator',e.target.value);}}/></div>
        <div className="fr"><label>Notes</label><textarea rows="2" value={usageForm.notes} onChange={function(e){sfu('notes',e.target.value);}}></textarea></div>
        <div style={{display:'flex',gap:8,marginTop:4}}>
          <button className="btn bp" style={{flex:1}} onClick={logUsage}>✓ Save Usage</button>
          <button className="btn bs" onClick={function(){setShowUsage(null);}}>Cancel</button>
        </div>
      </div>
    </div>}

    {showTransfer&&transferMachine&&<div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.65)',zIndex:2000,display:'flex',alignItems:'center',justifyContent:'center',padding:16}} onClick={function(){setShowTransfer(null);}}>
      <div style={{background:'var(--sur)',border:'1px solid var(--bdr2)',borderRadius:14,padding:22,width:380,maxWidth:'95vw'}} onClick={function(e){e.stopPropagation();}}>
        <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:18,fontWeight:700,marginBottom:4}}>🚘 Transfer Machine</div>
        <div style={{fontSize:12,color:'var(--tx2)',marginBottom:14}}><b style={{color:'var(--am)'}}>{transferMachine.name}</b><br/>Currently at: {gSite(P.sites,transferMachine.currentSiteId).name}</div>
        <div className="fr"><label>Transfer to Site *</label>
          <select value={transferSite} onChange={function(e){setTransferSite(e.target.value);}}>
            <option value="">Select destination...</option>
            {P.sites.filter(function(s){return s.id!==transferMachine.currentSiteId;}).map(function(s){return <option key={s.id} value={s.id}>{s.name}</option>;})}
          </select>
        </div>
        <div style={{display:'flex',gap:8,marginTop:8}}>
          <button className="btn bp" style={{flex:1}} onClick={doTransfer}>🚘 Transfer Now</button>
          <button className="btn bs" onClick={function(){setShowTransfer(null);}}>Cancel</button>
        </div>
      </div>
    </div>}

    {showHistory&&historyMachine&&<div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.65)',zIndex:2000,display:'flex',alignItems:'center',justifyContent:'center',padding:16}} onClick={function(){setShowHistory(null);}}>
      <div style={{background:'var(--sur)',border:'1px solid var(--bdr2)',borderRadius:14,padding:22,width:560,maxWidth:'95vw',maxHeight:'86vh',overflowY:'auto'}} onClick={function(e){e.stopPropagation();}}>
        <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:18,fontWeight:700,marginBottom:4}}>📄 {historyMachine.name}</div>
        <div style={{fontSize:12,color:'var(--tx2)',marginBottom:14}}>{historyMachine.type||'Machine'}{historyMachine.reg?' · '+historyMachine.reg:''} · <b style={{color:historyMachine.ownership==='owned'?'var(--gr)':'var(--am)'}}>{historyMachine.ownership==='rented'?'Rented':historyMachine.ownership==='hired'?'Hired':'Self Owned'}</b></div>
        <div style={{fontWeight:700,fontSize:13,marginBottom:8,color:'var(--am)'}}>Usage Log</div>
        {(function(){
          var s=usageSummary(historyMachine);
          return <div style={{display:'flex',gap:10,marginBottom:12,flexWrap:'wrap'}}>
            {[['Total Hours',s.hrs+'h','var(--am)'],['Days Used',s.days,'var(--bl)'],['Total Cost',INR(s.cost),'var(--rd)'],['Entries',s.n,'var(--gr)']].map(function(x){
              return <div key={x[0]} style={{background:'var(--sur2)',borderRadius:8,padding:'8px 14px',textAlign:'center'}}>
                <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:18,fontWeight:700,color:x[2]}}>{x[1]}</div>
                <div style={{fontSize:9,color:'var(--tx3)',textTransform:'uppercase'}}>{x[0]}</div>
              </div>;
            })}
          </div>;
        }())}
        {(historyMachine.usageLog||[]).length===0&&<div style={{color:'var(--tx3)',fontSize:12,marginBottom:14}}>No usage logged yet.</div>}
        {(historyMachine.usageLog||[]).length>0&&<div style={{marginBottom:16,overflowX:'auto'}}>
          <table style={{width:'100%',borderCollapse:'collapse',fontSize:12}}>
            <thead><tr>
              {['Date','Hours','Cost','Site','Operator','Notes'].map(function(h){return <th key={h} style={{padding:'7px 10px',textAlign:'left',background:'var(--sur2)',fontSize:11,color:'var(--tx2)',textTransform:'uppercase'}}>{h}</th>;})}
            </tr></thead>
            <tbody>{(historyMachine.usageLog||[]).slice().sort(function(a,b){return (b.date||'').localeCompare(a.date||'');}).map(function(e,i){
              return <tr key={e.id||i} style={{borderBottom:'1px solid var(--bdr)'}}>
                <td style={{padding:'8px 10px',fontFamily:"'IBM Plex Mono',monospace"}}>{e.date}</td>
                <td style={{padding:'8px 10px',fontWeight:700,color:'var(--am)'}}>{e.hours}h</td>
                <td style={{padding:'8px 10px',fontWeight:600,color:'var(--rd)'}}>{e.cost?INR(e.cost):"—"}</td>
                <td style={{padding:'8px 10px',color:'var(--bl)'}}>{gSite(P.sites,e.siteId).name}</td>
                <td style={{padding:'8px 10px'}}>{e.operator||"—"}</td>
                <td style={{padding:'8px 10px',color:'var(--tx2)'}}>{e.notes||"—"}</td>
              </tr>;
            })}</tbody>
          </table>
        </div>}
        <div style={{fontWeight:700,fontSize:13,marginBottom:8,color:'var(--am)'}}>Transfer History</div>
        <div style={{display:'flex',flexDirection:'column',gap:6,marginBottom:14}}>
          {(historyMachine.transferHistory||[]).slice().reverse().map(function(h,i){
            var fromS=h.from?gSite(P.sites,h.from):null;
            var toS=gSite(P.sites,h.to);
            return <div key={i} style={{display:'flex',alignItems:'center',gap:8,background:'var(--sur2)',borderRadius:7,padding:'8px 12px',fontSize:12}}>
              <span>🚘</span>
              <span style={{color:'var(--tx2)'}}>{fromS?fromS.name:'New Entry'}</span>
              <span style={{color:'var(--am)'}}>→</span>
              <span style={{fontWeight:600,color:'var(--gr)'}}>{toS.name}</span>
              <span style={{marginLeft:'auto',color:'var(--tx3)',fontFamily:"'IBM Plex Mono',monospace",fontSize:11}}>{h.date}</span>
              <span style={{color:'var(--tx3)',fontSize:11}}>by {h.by}</span>
            </div>;
          })}
        </div>
        <button className="btn bs" style={{width:'100%'}} onClick={function(){setShowHistory(null);}}>Close</button>
      </div>
    </div>}

    <div className="flex ic jb mb12">
      <div className="st" style={{margin:0}}>⚙ Machinery</div>
      {isAdmin&&<button className="btn bp bsm" onClick={function(){setMForm(blank);setEditId(null);setShowAdd(true);}}>+ Add Machine</button>}
    </div>

    <div className="g4 mb12">
      {[['Total',machines.length,'var(--tx)'],['Active',machines.filter(function(m){return m.status==='active';}).length,'var(--gr)'],['Idle',machines.filter(function(m){return m.status==='idle';}).length,'var(--am)'],['Rented',machines.filter(function(m){return m.ownership==='rented'||m.ownership==='hired';}).length,'var(--bl)']].map(function(x){
        return <div key={x[0]} style={{background:'var(--sur)',border:'1px solid var(--bdr)',borderRadius:10,padding:12,textAlign:'center'}}>
          <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:26,fontWeight:800,color:x[2]}}>{x[1]}</div>
          <div style={{fontSize:10,color:'var(--tx3)',textTransform:'uppercase'}}>{x[0]}</div>
        </div>;
      })}
    </div>

    {isAdmin&&<div style={{display:'flex',gap:8,marginBottom:14,flexWrap:'wrap',alignItems:'center'}}>
      <span style={{fontSize:12,fontWeight:600,color:'var(--tx2)'}}>Site:</span>
      {[{id:'all',name:'All Sites'}].concat(P.sites).map(function(s){
        var active=s.id==='all'?siteSel==='all':siteSel===s.id;
        return <button key={s.id} className={'btn bsm '+(active?'bp':'bs')} onClick={function(){setSiteSel(s.id==='all'?'all':s.id);}}>
          {s.name}
        </button>;
      })}
    </div>}

    {visible.length===0&&<div className="aba aba-g">No machines found.</div>}

    <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(300px,1fr))',gap:14}}>
      {visible.map(function(m){
        var s=gSite(P.sites,m.currentSiteId);
        var sc=statCol[m.status]||'var(--tx3)';
        var sl=statLbl[m.status]||m.status;
        var sum=usageSummary(m);
        var typeIcon=m.type==='Excavator'?'🚜':m.type==='Crane'?'🏗':m.type==='Generator'?'⚡':m.type==='Bulldozer'?'🚛':'⚙';
        var ownLabel=m.ownership==='rented'?'Rented':m.ownership==='hired'?'Hired':'Owned';
        var ownCol=m.ownership==='owned'?'var(--gr)':'var(--am)';
        return <div key={m.id} style={{background:'var(--sur)',border:'1px solid var(--bdr)',borderRadius:12,overflow:'hidden'}}>
          <div style={{height:4,background:sc}}></div>

function AttendanceReportTab(props){
  var users=props.users,att=props.att,sites=props.sites,L=props.L;
  var fws=users.filter(function(u){return u.role==='field_worker';});
  var totP=0,totA=0,totL=0;
  var barData=fws.map(function(emp){
    var a=att[emp.id]||{};
    var pr2=Object.values(a).filter(function(v){return v==='present';}).length;
    var ab=Object.values(a).filter(function(v){return v==='absent';}).length;
    var lv=Object.values(a).filter(function(v){return v==='leave';}).length;
    var t2=Object.keys(a).length;
    totP+=pr2;totA+=ab;totL+=lv;
    var pct2=t2?Math.round(pr2/t2*100):0;
    return{l:emp.name.split(' ')[0].substring(0,6),v:pct2,vl:pct2+'%',col:pct2>80?'var(--gr)':pct2>60?'var(--am)':'var(--rd)'};
  });
  return <div>
    <div className="g2 mb12">
      <div className="card"><div className="st">Attendance % per Employee</div><SvgBar data={barData} h={100}/></div>
      <div className="card"><div className="st">P / A / L Breakdown</div>
        <div style={{display:'flex',alignItems:'center',gap:14}}>
          <PieChart data={[{label:'Present',val:totP,color:'var(--gr)'},{label:'Absent',val:totA,color:'var(--rd)'},{label:'Leave',val:totL,color:'var(--bl)'}]} size={100}/>
          <div className="pie-leg" style={{flex:1}}>
            {[['Present',totP,'var(--gr)'],['Absent',totA,'var(--rd)'],['Leave',totL,'var(--bl)']].map(function(x){
              return <div key={x[0]} className="pie-li"><div className="pie-dot" style={{background:x[2]}}></div><div style={{flex:1,fontSize:11}}>{x[0]}</div><div className="mono tsm tm">{x[1]}</div></div>;
            })}
          </div>
        </div>
      </div>
    </div>
    <div className="card" style={{padding:0,overflowX:'auto'}}>
      <table><thead><tr><th>Employee</th><th>Site</th><th>Present</th><th>Absent</th><th>Leave</th><th>Att%</th><th>Salary</th><th>Earned</th></tr></thead>
        <tbody>{fws.map(function(emp){
          var a=att[emp.id]||{};
          var pr2=Object.values(a).filter(function(v){return v==='present';}).length;
          var ab=Object.values(a).filter(function(v){return v==='absent';}).length;
          var lv=Object.values(a).filter(function(v){return v==='leave';}).length;
          var t2=Object.keys(a).length;
          var pc=t2?Math.round(pr2/t2*100):0;
          var earned=emp.salary?Math.round((emp.salary*pr2)/26):0;
          var s=gSite(sites,emp.siteId);
          return <tr key={emp.id}>
            <td style={{fontWeight:600,fontSize:12}}>{emp.name}</td>
            <td className="tsm tm">{s.name}</td>
            <td style={{color:'var(--gr)',fontWeight:600}}>{pr2}</td>
            <td style={{color:'var(--rd)',fontWeight:600}}>{ab}</td>
            <td style={{color:'var(--bl)',fontWeight:600}}>{lv}</td>
            <td style={{color:pcc(pc),fontWeight:700}}>{pc}%</td>
            <td className="mono tsm">{emp.salary?INR(emp.salary):'N/A'}</td>
            <td className="mono" style={{color:'var(--gr)',fontWeight:600}}>{earned?INR(earned):'N/A'}</td>
          </tr>;
        })}</tbody>
      </table>
    </div>
  </div>;
}
