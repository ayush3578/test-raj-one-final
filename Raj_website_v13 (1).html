function Tasks(props){
  var user=props.user,P=props;
  var isAdmin=user.role==='admin'||user.role==='master_admin';
  var [tab,setTab]=useState('mine');
  var [showM,setShowM]=useState(false);
  var [editId,setEditId]=useState(null);
  var [srch,setSrch]=useState('');
  var blank={title:'',desc:'',assignTo:'',siteId:'',priority:'normal',dueDate:'',status:'todo'};
  var [form,setForm]=useState(blank);
  function sf(k,v){setForm(function(p){var n=Object.assign({},p);n[k]=v;return n;});}
  var allT=P.tasks||[];
  var mine=allT.filter(function(t){return t.assignTo===user.name||t.by===user.name;});
  var listed=(tab==='mine'?mine:allT).filter(function(t){return !srch||(t.title||'').toLowerCase().indexOf(srch.toLowerCase())>=0;}).slice().sort(function(a,b){var po={todo:0,inprogress:1,done:2};return (po[a.status]||0)-(po[b.status]||0)||(a.dueDate||'').localeCompare(b.dueDate||'');});
  function save(){
    if(!form.title.trim()||!form.assignTo){alert('Title and assignee required.');return;}
    var obj={id:editId||Date.now(),title:form.title.trim(),desc:form.desc.trim(),assignTo:form.assignTo,siteId:+form.siteId||0,priority:form.priority,dueDate:form.dueDate,status:form.status,by:user.name,ts:sts()};
    if(editId){upd(P.setTasks,editId,obj);}else{addItem(P.setTasks,obj);}
    setShowM(false);setEditId(null);setForm(blank);
  }
  function startEdit(t){setForm({title:t.title,desc:t.desc||'',assignTo:t.assignTo,siteId:t.siteId||'',priority:t.priority||'normal',dueDate:t.dueDate||'',status:t.status||'todo'});setEditId(t.id);setShowM(true);}
  function setStatus(id,st){P.setTasks(function(prev){return prev.map(function(t){return t.id===id?Object.assign({},t,{status:st}):t;});});}
  var prioCol={low:'var(--gr)',normal:'var(--bl)',high:'var(--am)',critical:'var(--rd)'};
  var stCls={todo:'bbl',inprogress:'bam',done:'bgr'};
  var stLabel={todo:'To Do',inprogress:'In Progress',done:'Done'};
  var overdue=allT.filter(function(t){return t.status!=='done'&&t.dueDate&&t.dueDate<today();}).length;
  return <div className="fi">
    <div className="flex ic jb mb12">
      <div className="st" style={{margin:0}}>&#9989; Task Manager</div>
      <button className="btn bp bsm" onClick={function(){setShowM(true);setEditId(null);setForm(blank);}}>+ Add Task</button>
    </div>
    {overdue>0&&<div className="aba aba-a" style={{marginBottom:10}}>&#9888; {overdue} overdue task{overdue!==1?'s':''}</div>}
    <div className="tbar">
      <button className={tab==='mine'?'ac':''} onClick={function(){setTab('mine');}}>My Tasks ({mine.length})</button>
      {isAdmin&&<button className={tab==='all'?'ac':''} onClick={function(){setTab('all');}}>All Tasks ({allT.length})</button>}
    </div>
    <div style={{display:'flex',gap:8,marginBottom:12,alignItems:'center'}}>
      <input value={srch} onChange={function(e){setSrch(e.target.value);}} placeholder="Search tasks..." style={{flex:1}}/>
      {srch&&<button className="btn bs bsm" onClick={function(){setSrch('');}}>Clear</button>}
    </div>
    <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(280px,1fr))',gap:10}}>
      {listed.map(function(t){
        var overdue2=t.status!=='done'&&t.dueDate&&t.dueDate<today();
        var site=t.siteId?gSite(P.sites,t.siteId):null;
        return <div key={t.id} className="card" style={{borderLeft:'4px solid '+prioCol[t.priority||'normal'],opacity:t.status==='done'?0.7:1}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:6}}>
            <div style={{fontWeight:700,fontSize:13,flex:1}}>{t.title}</div>
            {isAdmin&&<div style={{display:'flex',gap:4}}>
              <button className="btn bs bxs" onClick={function(){startEdit(t);}}>Edit</button>
              <button className="btn bd bxs" onClick={function(){if(window.confirm('Delete?'))removeItem(P.setTasks,t.id);}}>&#x2715;</button>
            </div>}
          </div>
          <div style={{display:'flex',gap:5,flexWrap:'wrap',marginBottom:6}}>
            <span className={stCls[t.status]||'bbl'} style={{fontSize:9}}>{stLabel[t.status]||t.status}</span>
            <span style={{fontSize:9,fontWeight:600,color:prioCol[t.priority||'normal']}}>{(t.priority||'normal').toUpperCase()}</span>
            {site&&<span className="bbl" style={{fontSize:9}}>{site.name}</span>}
          </div>
          {t.desc&&<div style={{fontSize:12,color:'var(--tx2)',marginBottom:6}}>{t.desc}</div>}
          <div style={{fontSize:10,color:overdue2?'var(--rd)':'var(--tx3)',marginBottom:8}}>
            &#128100; {t.assignTo} {t.dueDate&&(' · Due: '+t.dueDate+(overdue2?' (OVERDUE)':''))}
          </div>
          {t.status!=='done'&&<div style={{display:'flex',gap:5}}>
            {t.status==='todo'&&<button className="btn bs bxs" onClick={function(){setStatus(t.id,'inprogress');}}>Start</button>}
            {t.status==='inprogress'&&<button className="btn bp bxs" onClick={function(){setStatus(t.id,'done');}}>&#10003; Done</button>}
            {t.status!=='todo'&&<button className="btn bs bxs" onClick={function(){setStatus(t.id,'todo');}}>Reset</button>}
          </div>}
        </div>;
      })}
      {listed.length===0&&<div style={{gridColumn:'1/-1'}}><div className="aba aba-a">No tasks found.</div></div>}
    </div>
    {showM&&<Modal title={editId?'Edit Task':'Add Task'} icon="&#9989;" onClose={function(){setShowM(false);setEditId(null);}}>
      <div className="fr"><label>Task Title *</label><input value={form.title} onChange={function(e){sf('title',e.target.value);}}/></div>
      <div className="fr"><label>Description</label><textarea rows="2" value={form.desc} onChange={function(e){sf('desc',e.target.value);}}/></div>
      <div className="fg">
        <div className="fr"><label>Assign To *</label><select value={form.assignTo} onChange={function(e){sf('assignTo',e.target.value);}}><option value="">Select...</option>{(P.users||[]).map(function(u){return <option key={u.id} value={u.name}>{u.name}</option>;})}</select></div>
        <div className="fr"><label>Site</label><select value={form.siteId} onChange={function(e){sf('siteId',e.target.value);}}><option value="">All / General</option>{usites(user,P.sites).map(function(s){return <option key={s.id} value={s.id}>{s.name}</option>;})}</select></div>
      </div>
      <div className="fg">
        <div className="fr"><label>Priority</label><select value={form.priority} onChange={function(e){sf('priority',e.target.value);}}><option value="low">Low</option><option value="normal">Normal</option><option value="high">High</option><option value="critical">Critical</option></select></div>
        <div className="fr"><label>Due Date</label><input type="date" value={form.dueDate} onChange={function(e){sf('dueDate',e.target.value);}}/></div>
      </div>
      <div className="fr"><label>Status</label><select value={form.status} onChange={function(e){sf('status',e.target.value);}}><option value="todo">To Do</option><option value="inprogress">In Progress</option><option value="done">Done</option></select></div>
      <div className="flex g6"><button className="btn bp" style={{flex:1}} onClick={save}>Save</button><button className="btn bs" onClick={function(){setShowM(false);setEditId(null);}}>Cancel</button></div>
    </Modal>}
  </div>;
}

function Safety(props){

  var [showM,setShowM]=useState(false);

  var bPPE={empId:'',date:today(),items:'',condition:'new',returnDate:''};
  var bDrill={siteId:'',date:today(),type:'Fire Drill',attendees:'',topics:'',actionItems:'',conductedBy:user.name};

    setEditId(null);

  }

    if(tab==='incidents'){
      if(!form.siteId||!form.desc.trim()){alert('Site and description required.');return;}
      var obj=Object.assign({},form,{id:editId||Date.now(),siteId:+form.siteId,lostDays:+form.lostDays||0,by:user.name,ts:sts()});
      if(editId){upd(P.setSafetyLog,editId,obj);}else{addItem(P.setSafetyLog,obj);}
    } else if(tab==='ppe'){
      if(!form.empId||!form.items.trim()){alert('Employee and items required.');return;}
      addItem(P.setPpeLog,Object.assign({},form,{id:Date.now(),issuedBy:user.name,ts:sts()}));
    } else {
      if(!form.siteId||!form.type){alert('Site required.');return;}

function Clients(props){
  var user=props.user,P=props;
  var isAdmin=user.role==='admin'||user.role==='master_admin';
  var [tab,setTab]=useState('register');
  var [showM,setShowM]=useState(false);
  var [editId,setEditId]=useState(null);
  var [selClient,setSelClient]=useState(null);
  var [srch,setSrch]=useState('');
  var bClient={name:'',company:'',phone:'',email:'',gst:'',address:'',project:''};
  var bComm={clientId:'',date:today(),mode:'Email',subject:'',summary:'',file:'',fileName:''};
  var bVar={clientId:'',siteId:'',date:today(),desc:'',reason:'',extraCost:'',status:'pending',approvedBy:''};
  var [form,setForm]=useState(bClient);
  function sf(k,v){setForm(function(p){var n=Object.assign({},p);n[k]=v;return n;});}

  var clients=P.clients||[];
  var comms=P.variations?[]:[];
  var vars=P.variations||[];

  function openAdd(){setEditId(null);setForm(tab==='register'?bClient:tab==='correspondence'?bComm:bVar);setShowM(true);}
  function saveClient(){
    if(!form.name.trim()){alert('Name required.');return;}
    var obj=Object.assign({},form,{id:editId||Date.now(),name:form.name.trim(),ts:sts(),by:user.name});
    if(editId){upd(P.setClients,editId,obj);}else{addItem(P.setClients,obj);}
    setShowM(false);setEditId(null);setForm(bClient);
  }
  function saveComm(){
    if(!form.clientId||!form.subject.trim()){alert('Client and subject required.');return;}
    addItem(P.setVariations,[]);
    // Store correspondence as variation type 'comm' — reuse variations state
    addItem(P.setVariations,Object.assign({},form,{id:Date.now(),_type:'comm',by:user.name,ts:sts()}));
    setShowM(false);setForm(bComm);
  }
  function saveVar(){
    if(!form.clientId||!form.desc.trim()){alert('Client and description required.');return;}
    addItem(P.setVariations,Object.assign({},form,{id:Date.now(),_type:'variation',siteId:+form.siteId||0,extraCost:+form.extraCost||0,by:user.name,ts:sts()}));
    setShowM(false);setForm(bVar);
  }
  function doSave(){if(tab==='register')saveClient();else if(tab==='correspondence')saveComm();else saveVar();}

  var visClients=clients.filter(function(c){return !srch||(c.name||'').toLowerCase().indexOf(srch.toLowerCase())>=0||(c.company||'').toLowerCase().indexOf(srch.toLowerCase())>=0;});
  var allVar=vars.filter(function(x){return x._type==='variation';});
  var allComm=vars.filter(function(x){return x._type==='comm';});

  return <div className="fi">
    <div className="flex ic jb mb12">
      <div className="st" style={{margin:0}}>&#129309; Client Management</div>
      <button className="btn bp bsm" onClick={openAdd}>+ Add</button>
    </div>
    <div className="tbar">
      <button className={tab==='register'?'ac':''} onClick={function(){setTab('register');}}>Register ({clients.length})</button>
      <button className={tab==='correspondence'?'ac':''} onClick={function(){setTab('correspondence');}}>Correspondence ({allComm.length})</button>
      <button className={tab==='variations'?'ac':''} onClick={function(){setTab('variations');}}>Variations ({allVar.length})</button>
    </div>

    {tab==='register'&&<div>
      <div style={{display:'flex',gap:8,marginBottom:12}}>
        <input value={srch} onChange={function(e){setSrch(e.target.value);}} placeholder="Search clients..." style={{flex:1}}/>
        {srch&&<button className="btn bs bsm" onClick={function(){setSrch('');}}>Clear</button>}
      </div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(270px,1fr))',gap:10}}>
        {visClients.length===0&&<div style={{gridColumn:'1/-1'}}><div className="aba aba-a">No clients added yet.</div></div>}
        {visClients.map(function(c){return <div key={c.id} className="card" style={{borderLeft:'4px solid var(--bl)'}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
            <div>
              <div style={{fontWeight:700,fontSize:14}}>{c.name}</div>
              {c.company&&<div style={{fontSize:11,color:'var(--tx2)'}}>{c.company}</div>}
            </div>
            <div style={{display:'flex',gap:4}}>
              {c.phone&&<a href={'tel:'+c.phone} className="btn bs bxs" style={{fontSize:10}}>Call</a>}
              {c.phone&&<a href={'https://wa.me/91'+c.phone.replace(/\D/g,'')} target="_blank" className="btn bp bxs" style={{fontSize:10,background:'#25D366',color:'#fff'}}>WA</a>}
            </div>
          </div>
          {c.project&&<div style={{fontSize:12,color:'var(--tx2)',marginTop:4}}>Project: {c.project}</div>}
          {c.email&&<div style={{fontSize:11,color:'var(--bl)',marginTop:2}}>{c.email}</div>}
          {c.gst&&<div style={{fontSize:11,color:'var(--tx3)',marginTop:2}}>GST: {c.gst}</div>}
          <div style={{display:'flex',gap:5,marginTop:8}}>
            <button className="btn bs bxs" onClick={function(){setForm({name:c.name,company:c.company||'',phone:c.phone||'',email:c.email||'',gst:c.gst||'',address:c.address||'',project:c.project||''});setEditId(c.id);setShowM(true);}}>Edit</button>
            {isAdmin&&<button className="btn bd bxs" onClick={function(){if(window.confirm('Delete '+c.name+'?'))removeItem(P.setClients,c.id);}}>&#x2715;</button>}
          </div>
        </div>;})}
      </div>
    </div>}

    {tab==='correspondence'&&<div style={{display:'flex',flexDirection:'column',gap:8}}>
      {allComm.length===0&&<div className="aba aba-a">No correspondence logged.</div>}
      {allComm.slice().sort(function(a,b){return (b.date||'').localeCompare(a.date||'');}).map(function(x){
        var cl=clients.filter(function(c){return String(c.id)===String(x.clientId);})[0];
        return <div key={x.id} className="card" style={{borderLeft:'4px solid var(--bl)'}}>
          <div style={{display:'flex',justifyContent:'space-between',flexWrap:'wrap',gap:6}}>
            <div>
              <div style={{fontWeight:700,fontSize:13}}>{x.subject}</div>
              <div style={{fontSize:11,color:'var(--tx2)',marginTop:2}}>{cl?cl.name:'Unknown'} &middot; {x.mode} &middot; {x.date}</div>
            </div>
            {isAdmin&&<button className="btn bd bxs" onClick={function(){if(window.confirm('Delete?'))removeItem(P.setVariations,x.id);}}>&#x2715;</button>}
          </div>
          {x.summary&&<div style={{fontSize:12,color:'var(--tx2)',marginTop:6}}>{x.summary}</div>}
          {x.file&&<button className="btn bs bxs" style={{marginTop:6,fontSize:10}} onClick={function(){window.open(x.file,'_blank');}}>View Doc</button>}
        </div>;
      })}
    </div>}

    {tab==='variations'&&<div style={{display:'flex',flexDirection:'column',gap:8}}>
      {allVar.length===0&&<div className="aba aba-a">No variation orders logged.</div>}
      {allVar.slice().sort(function(a,b){return (b.date||'').localeCompare(a.date||'');}).map(function(x){
        var cl=clients.filter(function(c){return String(c.id)===String(x.clientId);})[0];
        var stCls2={pending:'bam',approved:'bgr',rejected:'brd'};
        return <div key={x.id} className="card" style={{borderLeft:'4px solid var(--pu)'}}>
          <div style={{display:'flex',justifyContent:'space-between',flexWrap:'wrap',gap:6}}>
            <div>
              <div style={{fontWeight:700,fontSize:13}}>{x.desc}</div>
              <div style={{display:'flex',gap:5,marginTop:3}}>
                <span className={stCls2[x.status]||'bam'} style={{fontSize:9}}>{(x.status||'pending').toUpperCase()}</span>
                {cl&&<span className="bbl" style={{fontSize:9}}>{cl.name}</span>}
              </div>
            </div>
            <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:16,fontWeight:700,color:'var(--am)'}}>{INR(x.extraCost)}</div>
          </div>
          {x.reason&&<div style={{fontSize:12,color:'var(--tx2)',marginTop:6}}>Reason: {x.reason}</div>}
          <div style={{display:'flex',gap:5,marginTop:8}}>
            {isAdmin&&x.status==='pending'&&<button className="btn bp bxs" onClick={function(){P.setVariations(function(prev){return prev.map(function(v){return v.id===x.id?Object.assign({},v,{status:'approved',approvedBy:user.name}):v;});});}}>Approve</button>}
            {isAdmin&&<button className="btn bd bxs" onClick={function(){if(window.confirm('Delete?'))removeItem(P.setVariations,x.id);}}>&#x2715;</button>}
          </div>
        </div>;
      })}
    </div>}

    {showM&&<Modal title={tab==='register'?'Client Details':tab==='correspondence'?'Log Correspondence':'Variation Order'} icon="&#129309;" onClose={function(){setShowM(false);setEditId(null);}} wide>
      {tab==='register'&&<div>
        <div className="fg"><div className="fr"><label>Name *</label><input value={form.name} onChange={function(e){sf('name',e.target.value);}}/></div><div className="fr"><label>Company</label><input value={form.company} onChange={function(e){sf('company',e.target.value);}}/></div></div>
        <div className="fg"><div className="fr"><label>Phone</label><input value={form.phone} onChange={function(e){sf('phone',e.target.value);}}/></div><div className="fr"><label>Email</label><input type="email" value={form.email} onChange={function(e){sf('email',e.target.value);}}/></div></div>
        <div className="fg"><div className="fr"><label>GST No.</label><input value={form.gst} onChange={function(e){sf('gst',e.target.value);}}/></div><div className="fr"><label>Project</label><input value={form.project} onChange={function(e){sf('project',e.target.value);}}/></div></div>
        <div className="fr"><label>Address</label><input value={form.address} onChange={function(e){sf('address',e.target.value);}}/></div>
      </div>}
      {tab==='correspondence'&&<div>
        <div className="fg"><div className="fr"><label>Client *</label><select value={form.clientId} onChange={function(e){sf('clientId',e.target.value);}}><option value="">Select...</option>{clients.map(function(c){return <option key={c.id} value={c.id}>{c.name}</option>;})}</select></div><div className="fr"><label>Date</label><input type="date" value={form.date} onChange={function(e){sf('date',e.target.value);}}/></div></div>
        <div className="fg"><div className="fr"><label>Mode</label><select value={form.mode} onChange={function(e){sf('mode',e.target.value);}}><option>Email</option><option>Letter</option><option>Meeting</option><option>Phone</option><option>WhatsApp</option></select></div><div className="fr"><label>Subject *</label><input value={form.subject} onChange={function(e){sf('subject',e.target.value);}}/></div></div>
        <div className="fr"><label>Summary</label><textarea rows="3" value={form.summary} onChange={function(e){sf('summary',e.target.value);}}/></div>
      </div>}
      {tab==='variations'&&<div>
        <div className="fg"><div className="fr"><label>Client *</label><select value={form.clientId} onChange={function(e){sf('clientId',e.target.value);}}><option value="">Select...</option>{clients.map(function(c){return <option key={c.id} value={c.id}>{c.name}</option>;})}</select></div><div className="fr"><label>Date</label><input type="date" value={form.date} onChange={function(e){sf('date',e.target.value);}}/></div></div>
        <div className="fr"><label>Description *</label><textarea rows="2" value={form.desc} onChange={function(e){sf('desc',e.target.value);}}/></div>
        <div className="fr"><label>Reason / Justification</label><textarea rows="2" value={form.reason} onChange={function(e){sf('reason',e.target.value);}}/></div>
        <div className="fg"><div className="fr"><label>Extra Cost (Rs)</label><input type="number" value={form.extraCost} onChange={function(e){sf('extraCost',e.target.value);}}/></div><div className="fr"><label>Status</label><select value={form.status} onChange={function(e){sf('status',e.target.value);}}><option value="pending">Pending</option><option value="approved">Approved</option><option value="rejected">Rejected</option></select></div></div>
      </div>}
      <div className="flex g6"><button className="btn bp" style={{flex:1}} onClick={doSave}>Save</button><button className="btn bs" onClick={function(){setShowM(false);setEditId(null);}}>Cancel</button></div>
    </Modal>}

function Documents(props){
  var user=props.user,P=props;
  var isAdmin=user.role==='admin'||user.role==='master_admin';
  var [showM,setShowM]=useState(false);
  var [siteSel,setSiteSel]=useState('all');
  var [catFilter,setCatFilter]=useState('all');
  var [srch,setSrch]=useState('');
  var blank={siteId:user.siteId||'',category:'Drawing',name:'',desc:'',file:'',fileName:'',version:'1'};
  var [form,setForm]=useState(blank);
  function sf(k,v){setForm(function(p){var n=Object.assign({},p);n[k]=v;return n;});}
  var cats=['Drawing','BOQ','Contract','Legal/NOC','Financial','Insurance','Approval','Other'];
  var catCol={Drawing:'var(--bl)',BOQ:'var(--am)',Contract:'var(--pu)','Legal/NOC':'var(--rd)',Financial:'var(--gr)',Insurance:'var(--am)',Approval:'var(--gr)',Other:'var(--tx2)'};
  var all=(P.documents||[]).filter(function(d){return isAdmin||!d.siteId||d.siteId===user.siteId;});
  var vis=all.filter(function(d){
    if(siteSel!=='all'&&String(d.siteId)!==siteSel)return false;
    if(catFilter!=='all'&&d.category!==catFilter)return false;
    if(srch&&(d.name||'').toLowerCase().indexOf(srch.toLowerCase())<0)return false;
    return true;
  }).slice().sort(function(a,b){return (b.ts||'').localeCompare(a.ts||'');});
  function pickFile(){var fi=document.createElement('input');fi.type='file';fi.accept='application/pdf,image/*,.docx,.xlsx,.dwg';fi.onchange=function(e){var f=e.target.files[0];if(!f)return;if(f.size>50*1024*1024){alert('Max 50MB');return;}var r=new FileReader();r.onload=function(ev){sf('file',ev.target.result);sf('fileName',f.name);};r.readAsDataURL(f);};fi.click();}
  function save(){
    if(!form.name.trim()||!form.file){alert('Document name and file required.');return;}
    addItem(P.setDocuments,{id:Date.now(),siteId:+form.siteId||0,category:form.category,name:form.name.trim(),desc:form.desc.trim(),file:form.file,fileName:form.fileName,version:form.version,by:user.name,ts:sts()});
    setShowM(false);setForm(blank);
  }
  return <div className="fi">
    <div className="flex ic jb mb12">
      <div className="st" style={{margin:0}}>&#128194; Document Vault</div>
      <button className="btn bp bsm" onClick={function(){setShowM(true);}}>+ Upload</button>
    </div>
    <div style={{display:'flex',gap:8,flexWrap:'wrap',marginBottom:12,alignItems:'center'}}>
      <SiteFilter sites={usites(user,P.sites)} value={siteSel} onChange={setSiteSel} lang={props.lang||'en'}/>
      <select style={{width:130}} value={catFilter} onChange={function(e){setCatFilter(e.target.value);}}><option value="all">All Types</option>{cats.map(function(c){return <option key={c} value={c}>{c}</option>;})}</select>
      <input value={srch} onChange={function(e){setSrch(e.target.value);}} placeholder="Search docs..." style={{flex:1,minWidth:120}}/>
      {(srch||catFilter!=='all'||siteSel!=='all')&&<button className="btn bs bsm" onClick={function(){setSrch('');setCatFilter('all');setSiteSel('all');}}>Clear</button>}
      <span style={{fontSize:11,color:'var(--tx3)'}}>{vis.length} docs</span>
    </div>
    <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(240px,1fr))',gap:10}}>
      {vis.length===0&&<div style={{gridColumn:'1/-1'}}><div className="aba aba-a">No documents found.</div></div>}
      {vis.map(function(d){
        var site=d.siteId?gSite(P.sites,d.siteId):null;
        var col=catCol[d.category]||'var(--tx2)';
        var isImg=d.file&&d.file.indexOf('image/')>0;
        return <div key={d.id} className="card" style={{borderLeft:'4px solid '+col}}>
          {isImg&&<img src={d.file} alt={d.name} style={{width:'100%',height:100,objectFit:'cover',borderRadius:6,marginBottom:8,cursor:'pointer'}} onClick={function(){window.open(d.file,'_blank');}}/>}
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
            <div style={{flex:1}}>
              <div style={{fontWeight:700,fontSize:13}}>{d.name}</div>
              <div style={{display:'flex',gap:5,marginTop:3,flexWrap:'wrap'}}>
                <span style={{fontSize:9,fontWeight:700,color:col,background:col+'18',padding:'1px 6px',borderRadius:4}}>{d.category}</span>
                {site&&<span className="bbl" style={{fontSize:9}}>{site.name}</span>}
                <span style={{fontSize:9,color:'var(--tx3)'}}>v{d.version}</span>
              </div>
            </div>
          </div>
          {d.desc&&<div style={{fontSize:11,color:'var(--tx2)',marginTop:4}}>{d.desc}</div>}
          <div style={{fontSize:10,color:'var(--tx3)',marginTop:4}}>By {d.by} &middot; {d.ts?d.ts.split(',')[0]:''}</div>
          <div style={{display:'flex',gap:5,marginTop:8}}>
            <button className="btn bp bxs" onClick={function(){window.open(d.file,'_blank');}}>Open</button>
            <a href={d.file} download={d.fileName} className="btn bs bxs" style={{textDecoration:'none',display:'inline-flex',alignItems:'center'}}>Download</a>
            {isAdmin&&<button className="btn bd bxs" onClick={function(){if(window.confirm('Delete?'))removeItem(P.setDocuments,d.id);}}>&#x2715;</button>}
          </div>
        </div>;
      })}
    </div>
    {showM&&<Modal title="Upload Document" icon="&#128194;" onClose={function(){setShowM(false);}}>
      <div className="fg">
        <div className="fr"><label>Document Name *</label><input value={form.name} onChange={function(e){sf('name',e.target.value);}} placeholder="e.g. Foundation Drawing Rev 2"/></div>
        <div className="fr"><label>Category</label><select value={form.category} onChange={function(e){sf('category',e.target.value);}}>{cats.map(function(c){return <option key={c}>{c}</option>;})}</select></div>

function DPR(props){
  var user=props.user,P=props,lang=props.lang||'en';

  var [showM,setShowM]=useState(false);
  var [editId,setEditId]=useState(null);
  var [siteSel,setSiteSel]=useState('all');
  var [srch,setSrch]=useState('');
  var today2=today();
  var blank={siteId:user.siteId||'',date:today2,weather:'Clear',workDone:'',workerCount:'',materialsUsed:'',issuesFaced:'',nextDayPlan:'',progressPct:'',photos:[]};
  var [form,setForm]=useState(blank);
  function sf(k,v){setForm(function(p){var n=Object.assign({},p);n[k]=v;return n;});}

  var mySites=usites(user,P.sites);
  var allDprs=P.dprs||[];
  var visDprs=(isAdmin?allDprs:allDprs.filter(function(d){return d.by===user.name||d.siteId===user.siteId;}))
    .filter(function(d){return siteSel==='all'||d.siteId===+siteSel;})
    .filter(function(d){return !srch||(d.workDone||'').toLowerCase().indexOf(srch.toLowerCase())>=0||(d.date||'').indexOf(srch)>=0;})
    .slice().sort(function(a,b){return (b.date||'').localeCompare(a.date||'');});

  function pickPhoto(){
    var fi=document.createElement('input');fi.type='file';fi.accept='image/*';fi.multiple=true;
    fi.onchange=function(e){
      var files=Array.prototype.slice.call(e.target.files).slice(0,5);
      files.forEach(function(f){
        if(f.size>5*1024*1024){alert('Max 5MB per photo');return;}
        var r=new FileReader();
        r.onload=function(ev){sf('photos',(form.photos||[]).concat([{data:ev.target.result,name:f.name}]));};
        r.readAsDataURL(f);
      });
    };
    fi.click();
  }

      {visDprs.length===0&&<div className="aba aba-a">No DPRs found. Click New DPR to submit one.</div>}
      {visDprs.map(function(d){
        var site=gSite(P.sites,d.siteId);
        var wCol={Clear:'var(--gr)',Cloudy:'var(--tx2)',Rain:'var(--bl)','Heavy Rain':'var(--bl)',Storm:'var(--rd)','Extreme Heat':'var(--am)'}[d.weather]||'var(--tx2)';
        return <div key={d.id} className="card" style={{borderLeft:'4px solid var(--am)'}}>

                <span className="mono tsm">{d.date}</span>
                <span style={{fontSize:11,fontWeight:600,color:wCol}}>&#9729; {d.weather}</span>
                {d.workerCount>0&&<span className="bbl" style={{fontSize:10}}>&#128119; {d.workerCount} workers</span>}
                {d.progressPct>0&&<span className="bgr" style={{fontSize:10}}>{d.progressPct}% done</span>}
              </div>
            </div>
            <div style={{display:'flex',gap:6}}>
              <button className="btn bs bxs" onClick={function(){printDPR(d);}}>Print</button>
              {(isAdmin||d.by===user.name)&&<button className="btn bs bxs" onClick={function(){startEdit(d);}}>Edit</button>}
              {isAdmin&&<button className="btn bd bxs" onClick={function(){if(window.confirm('Delete this DPR?'))removeItem(P.setDprs,d.id);}}>&#x2715;</button>}
            </div>
          </div>
          <div style={{fontSize:13,lineHeight:1.6,marginBottom:8}}><b>Work Done:</b> {d.workDone}</div>
          {d.materialsUsed&&<div style={{fontSize:12,color:'var(--tx2)',marginBottom:4}}><b>Materials:</b> {d.materialsUsed}</div>}
          {d.issuesFaced&&<div style={{fontSize:12,color:'var(--rd)',marginBottom:4}}><b>Issues:</b> {d.issuesFaced}</div>}
          {d.nextDayPlan&&<div style={{fontSize:12,color:'var(--bl)',marginBottom:4}}><b>Tomorrow:</b> {d.nextDayPlan}</div>}
          {d.progressPct>0&&<div className="pb" style={{marginTop:8,height:6}}><div className="pf" style={{width:d.progressPct+'%',background:'var(--gr)'}}></div></div>}
          {(d.photos||[]).length>0&&<div style={{display:'flex',gap:8,marginTop:8,flexWrap:'wrap'}}>
            {d.photos.map(function(ph,i){return <img key={i} src={ph.data} alt={ph.name} style={{height:60,width:80,objectFit:'cover',borderRadius:6,border:'1px solid var(--bdr)',cursor:'pointer'}} onClick={function(){window.open(ph.data,'_blank');}}/>;})}</div>}
          <div style={{fontSize:10,color:'var(--tx3)',marginTop:8}}>Submitted by {d.by} &middot; {d.ts}</div>
        </div>;
      })}
    </div>
    {showM&&<Modal title={editId?'Edit DPR':'New Daily Progress Report'} icon="&#128221;" onClose={function(){setShowM(false);setEditId(null);}} wide>
      <div className="fg">
        <div className="fr"><label>Site *</label>{mySites.length===1?<input readOnly value={mySites[0].name} style={{background:'var(--sur2)',color:'var(--tx2)'}}/>:<select value={form.siteId} onChange={function(e){sf('siteId',e.target.value);}}><option value="">Select...</option>{mySites.map(function(s){return <option key={s.id} value={s.id}>{s.name}</option>;})}</select>}</div>
        <div className="fr"><label>Date *</label><input type="date" value={form.date} onChange={function(e){sf('date',e.target.value);}}/></div>
      </div>
      <div className="fg">
        <div className="fr"><label>Weather</label><select value={form.weather} onChange={function(e){sf('weather',e.target.value);}}>{weathers.map(function(w){return <option key={w} value={w}>{w}</option>;})}</select></div>
        <div className="fr"><label>Workers Present</label><input type="number" value={form.workerCount} onChange={function(e){sf('workerCount',e.target.value);}} placeholder="0"/></div>
      </div>
      <div className="fr"><label>Work Done Today *</label><textarea rows="3" value={form.workDone} onChange={function(e){sf('workDone',e.target.value);}} placeholder="Describe all work completed today..."/></div>
      <div className="fr"><label>Materials Used</label><textarea rows="2" value={form.materialsUsed} onChange={function(e){sf('materialsUsed',e.target.value);}} placeholder="e.g. 50 bags cement, 2 MT steel..."/></div>
      <div className="fr"><label>Issues / Problems Faced</label><textarea rows="2" value={form.issuesFaced} onChange={function(e){sf('issuesFaced',e.target.value);}} placeholder="Any delays, shortages, disputes..."/></div>
      <div className="fr"><label>Plan for Tomorrow</label><textarea rows="2" value={form.nextDayPlan} onChange={function(e){sf('nextDayPlan',e.target.value);}} placeholder="Work planned for next day..."/></div>
      <div className="fg">
        <div className="fr"><label>Overall Progress %</label><input type="number" min="0" max="100" value={form.progressPct} onChange={function(e){sf('progressPct',e.target.value);}} placeholder="0-100"/></div>
        <div className="fr"><label>Site Photos</label>
          <div style={{display:'flex',gap:8,alignItems:'center',flexWrap:'wrap'}}>
            <button className="btn bs bsm" onClick={pickPhoto}>&#128247; Add Photos</button>
            {(form.photos||[]).map(function(ph,i){return <div key={i} style={{position:'relative'}}><img src={ph.data} alt={ph.name} style={{height:40,width:50,objectFit:'cover',borderRadius:4,border:'1px solid var(--bdr)'}}/><button onClick={function(){sf('photos',form.photos.filter(function(_,j){return j!==i;}));}} style={{position:'absolute',top:-4,right:-4,width:14,height:14,borderRadius:'50%',background:'var(--rd)',color:'#fff',fontSize:9,display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',border:'none',lineHeight:1}}>x</button></div>;})}
          </div>
        </div>
      </div>
      <div className="flex g6"><button className="btn bp" style={{flex:1}} onClick={save}>Save DPR</button><button className="btn bs" onClick={function(){setShowM(false);setEditId(null);}}>Cancel</button></div>
    </Modal>}
  </div>;
}

function Indents(props){
  var user=props.user,P=props,lang=props.lang||'en';
  var isAdmin=user.role==='admin'||user.role==='master_admin';
  var isStore=isAdmin||user.role==='site_manager';
  var [tab,setTab]=useState('pending');
  var [showM,setShowM]=useState(false);
  var [issueId,setIssueId]=useState(null);
  var [issuedQty,setIssuedQty]=useState('');
  var [issuedNote,setIssuedNote]=useState('');
  var [srch,setSrch]=useState('');
  var blank={siteId:user.siteId||'',matId:'',qty:'',unit:'',urgency:'normal',purpose:'',date:today()};
  var [form,setForm]=useState(blank);
  function sf(k,v){setForm(function(p){var n=Object.assign({},p);n[k]=v;return n;});}

  var allIndents=P.indents||[];
  var myIndents=isAdmin?allIndents:allIndents.filter(function(x){return x.reqBy===user.name||x.siteId===user.siteId;});
  var tabFiltered=tab==='all'?myIndents:myIndents.filter(function(x){return x.status===tab;});
  var vis=tabFiltered.filter(function(x){
    if(!srch)return true;
    var m=gMat(P.mats,x.matId),s=srch.toLowerCase();
    return (m.name||'').toLowerCase().indexOf(s)>=0||(x.purpose||'').toLowerCase().indexOf(s)>=0;
  }).slice().sort(function(a,b){return (b.date||'').localeCompare(a.date||'');});

  function submit(){
    if(!form.matId||!form.qty||!form.siteId){alert('Site, Material and Quantity are required.');return;}
    var obj={id:Date.now(),siteId:+form.siteId,matId:+form.matId,qty:+form.qty,unit:form.unit,
      urgency:form.urgency,purpose:form.purpose.trim(),date:form.date,
      reqBy:user.name,status:'pending',issuedQty:0,issuedNote:'',ts:sts()};
    addItem(P.setIndents,obj);
    addItem(P.setLog,{id:Date.now(),user:user.name,action:'Indent raised: '+gMat(P.mats,+form.matId).name+' x'+form.qty,time:sts(),type:'indent'});
    setShowM(false);setForm(blank);
  }

  function issueNow(){
    if(!issuedQty){alert('Enter issued quantity.');return;}
    P.setIndents(function(prev){return prev.map(function(x){
      if(x.id!==issueId)return x;
      return Object.assign({},x,{status:'issued',issuedQty:+issuedQty,issuedNote:issuedNote,issuedBy:user.name,issuedOn:today()});
    });});
    addItem(P.setLog,{id:Date.now(),user:user.name,action:'Indent issued '+issuedQty+' units',time:sts(),type:'indent'});
    setIssueId(null);setIssuedQty('');setIssuedNote('');
  }

  function rejectIndent(id){
    if(!window.confirm('Reject this indent?'))return;
    P.setIndents(function(prev){return prev.map(function(x){return x.id===id?Object.assign({},x,{status:'rejected',issuedBy:user.name}):x;});});
  }

  var urgColors={normal:'var(--bl)',high:'var(--am)',critical:'var(--rd)'};
  var stColors={pending:'var(--am)',issued:'var(--gr)',rejected:'var(--rd)'};
  var pending=allIndents.filter(function(x){return x.status==='pending';}).length;

  return <div className="fi">
    <div className="flex ic jb mb12">
      <div className="st" style={{margin:0}}>&#128196; Material Indents</div>
      <button className="btn bp bsm" onClick={function(){setShowM(true);setForm(blank);}}>+ Raise Indent</button>
    </div>
    <div className="tbar">
      {[['pending','Pending',pending],['issued','Issued',0],['rejected','Rejected',0],['all','All',0]].map(function(t){
        return <button key={t[0]} className={tab===t[0]?'ac':''} onClick={function(){setTab(t[0]);}}>
          {t[1]}{t[2]>0&&<span style={{background:'var(--rd)',color:'#fff',fontSize:9,padding:'1px 5px',borderRadius:8,marginLeft:4}}>{t[2]}</span>}
        </button>;
      })}
    </div>
    <div style={{display:'flex',gap:8,marginBottom:12,alignItems:'center'}}>
      <input value={srch} onChange={function(e){setSrch(e.target.value);}} placeholder="Search material / purpose..." style={{flex:1}}/>
      {srch&&<button className="btn bs bsm" onClick={function(){setSrch('');}}>Clear</button>}
    </div>
    {vis.length===0&&<div className="aba aba-a">No indents found.</div>}
    <div style={{display:'flex',flexDirection:'column',gap:10}}>
      {vis.map(function(x){
        var mat=gMat(P.mats,x.matId),site=gSite(P.sites,x.siteId);
        return <div key={x.id} className="card" style={{borderLeft:'4px solid '+stColors[x.status]}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',flexWrap:'wrap',gap:8}}>
            <div>
              <div style={{fontWeight:700,fontSize:14}}>{mat.name}</div>
              <div style={{display:'flex',gap:6,marginTop:3,flexWrap:'wrap'}}>
                <span className="bbl" style={{fontSize:10}}>{site.name}</span>
                <span style={{fontSize:10,fontWeight:600,color:urgColors[x.urgency]}}>&#9650; {x.urgency.toUpperCase()}</span>
                <span style={{fontSize:10,color:stColors[x.status],fontWeight:700}}>{x.status.toUpperCase()}</span>
              </div>
            </div>
            <div style={{textAlign:'right'}}>
              <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:18,fontWeight:700}}>Qty: {x.qty} {x.unit}</div>
              {x.status==='issued'&&<div style={{fontSize:11,color:'var(--gr)'}}>Issued: {x.issuedQty} {x.unit}</div>}
            </div>
          </div>
          {x.purpose&&<div style={{fontSize:12,color:'var(--tx2)',marginTop:6}}>Purpose: {x.purpose}</div>}
          <div style={{fontSize:10,color:'var(--tx3)',marginTop:4}}>By {x.reqBy} &middot; {x.date}</div>
          {x.status==='issued'&&x.issuedNote&&<div style={{fontSize:11,color:'var(--tx2)',marginTop:4}}>Note: {x.issuedNote}</div>}
          {isStore&&x.status==='pending'&&<div style={{display:'flex',gap:6,marginTop:10}}>
            <button className="btn bp bsm" onClick={function(){setIssueId(x.id);setIssuedQty(String(x.qty));setIssuedNote('');}}>Issue Material</button>
            <button className="btn bd bsm" onClick={function(){rejectIndent(x.id);}}>Reject</button>
          </div>}
          {issueId===x.id&&<div style={{marginTop:10,padding:'10px 12px',background:'var(--sur2)',borderRadius:8,border:'1px solid var(--bdr)'}}>
            <div className="fg" style={{marginBottom:8}}>
              <div className="fr"><label>Issued Qty</label><input type="number" value={issuedQty} onChange={function(e){setIssuedQty(e.target.value);}}/></div>
              <div className="fr"><label>Note</label><input value={issuedNote} onChange={function(e){setIssuedNote(e.target.value);}} placeholder="Optional note..."/></div>
            </div>
            <div style={{display:'flex',gap:6}}>
              <button className="btn bp bsm" onClick={issueNow}>&#10003; Confirm Issue</button>
              <button className="btn bs bsm" onClick={function(){setIssueId(null);}}>Cancel</button>
            </div>
          </div>}
        </div>;
      })}
    </div>
    {showM&&<Modal title="Raise Material Indent" icon="&#128196;" onClose={function(){setShowM(false);}}>
      <div className="fg">
        <div className="fr"><label>Site *</label><select value={form.siteId} onChange={function(e){sf('siteId',e.target.value);}}><option value="">Select...</option>{usites(user,P.sites).map(function(s){return <option key={s.id} value={s.id}>{s.name}</option>;})}</select></div>
        <div className="fr"><label>Date</label><input type="date" value={form.date} onChange={function(e){sf('date',e.target.value);}}/></div>
      </div>
      <div className="fg">
        <div className="fr"><label>Material *</label><select value={form.matId} onChange={function(e){sf('matId',e.target.value);sf('unit',gMat(P.mats,+e.target.value).unit||'');}}><option value="">Select...</option>{(P.mats||[]).map(function(m){return <option key={m.id} value={m.id}>{m.name}</option>;})}</select></div>
        <div className="fr"><label>Quantity *</label><input type="number" value={form.qty} onChange={function(e){sf('qty',e.target.value);}}/></div>
      </div>
      <div className="fg">
        <div className="fr"><label>Unit</label><input value={form.unit} onChange={function(e){sf('unit',e.target.value);}} placeholder="bags / MT / nos..."/></div>
        <div className="fr"><label>Urgency</label><select value={form.urgency} onChange={function(e){sf('urgency',e.target.value);}}><option value="normal">Normal</option><option value="high">High</option><option value="critical">Critical</option></select></div>
      </div>
      <div className="fr"><label>Purpose / Reason</label><textarea rows="2" value={form.purpose} onChange={function(e){sf('purpose',e.target.value);}} placeholder="What is this material needed for?"/></div>
      <div className="flex g6"><button className="btn bp" style={{flex:1}} onClick={submit}>Submit Indent</button><button className="btn bs" onClick={function(){setShowM(false);}}>Cancel</button></div>
    </Modal>}
  </div>;
}

function RABills(props){
  var user=props.user,P=props,lang=props.lang||'en';
  var isAdmin=user.role==='admin'||user.role==='master_admin';
  var [showM,setShowM]=useState(false);
  var [editId,setEditId]=useState(null);
  var [siteSel,setSiteSel]=useState('all');
  var [srch,setSrch]=useState('');
  var blank={siteId:user.siteId||'',client:'',raNo:'',date:today(),workDesc:'',contractAmt:'',billAmt:'',previousCert:'',retention:'5',advance:'',netPayable:'',status:'submitted',dueDate:'',notes:''};
  var [form,setForm]=useState(blank);
  function sf(k,v){setForm(function(p){var n=Object.assign({},p);n[k]=v;return n;});}

  function calcNet(f){
    var bill=+f.billAmt||0,prev=+f.previousCert||0,ret=Math.round(bill*(+f.retention||0)/100),adv=+f.advance||0;
    return bill-prev-ret-adv;
  }

  var allRA=P.rabills||[];
  var vis=(isAdmin?allRA:allRA.filter(function(x){return x.by===user.name||x.siteId===user.siteId;}))
    .filter(function(x){return siteSel==='all'||x.siteId===+siteSel;})
    .filter(function(x){return !srch||(x.client||'').toLowerCase().indexOf(srch.toLowerCase())>=0||(x.raNo||'').toLowerCase().indexOf(srch.toLowerCase())>=0;})
    .slice().sort(function(a,b){return (b.date||'').localeCompare(a.date||'');});

  var totBill=vis.reduce(function(a,x){return a+(x.billAmt||0);},0);
  var totNet=vis.reduce(function(a,x){return a+(x.netPayable||0);},0);
  var totCert=vis.filter(function(x){return x.status==='certified';}).reduce(function(a,x){return a+(x.netPayable||0);},0);

  function save(){
    if(!form.siteId||!form.client.trim()||!form.billAmt){alert('Site, Client and Bill Amount required.');return;}
    var net=calcNet(form);
    var obj={id:editId||Date.now(),siteId:+form.siteId,client:form.client.trim(),raNo:form.raNo,
      date:form.date,workDesc:form.workDesc.trim(),contractAmt:+form.contractAmt||0,
      billAmt:+form.billAmt,previousCert:+form.previousCert||0,retention:+form.retention||0,
      advance:+form.advance||0,netPayable:net,status:form.status,dueDate:form.dueDate,
      notes:form.notes.trim(),by:user.name,ts:sts()};
    if(editId){upd(P.setRaBills,editId,obj);}else{addItem(P.setRaBills,obj);}
    addItem(P.setLog,{id:Date.now(),user:user.name,action:'RA Bill '+(editId?'updated':'added')+': '+form.client+' '+INR(+form.billAmt),time:sts(),type:'rabill'});
    setShowM(false);setEditId(null);setForm(blank);
  }

  function startEdit(x){
    setForm({siteId:x.siteId,client:x.client,raNo:x.raNo||'',date:x.date,workDesc:x.workDesc||'',
      contractAmt:x.contractAmt||'',billAmt:x.billAmt||'',previousCert:x.previousCert||'',
      retention:x.retention||'5',advance:x.advance||'',netPayable:x.netPayable||'',
      status:x.status,dueDate:x.dueDate||'',notes:x.notes||''});
    setEditId(x.id);setShowM(true);
  }

  function printRA(x){
    var site=gSite(P.sites,x.siteId);
    pdfWin('<h2>Running Account Bill</h2><h3>'+x.client+' &mdash; RA No. '+(x.raNo||'N/A')+'</h3><div class="info"><div class="iv"><div class="l">Site</div><div class="v">'+site.name+'</div></div><div class="iv"><div class="l">Date</div><div class="v">'+x.date+'</div></div><div class="iv"><div class="l">Contract Amt</div><div class="v">'+INR(x.contractAmt)+'</div></div><div class="iv"><div class="l">Bill Amount</div><div class="v">'+INR(x.billAmt)+'</div></div><div class="iv"><div class="l">Previous Certified</div><div class="v">'+INR(x.previousCert)+'</div></div><div class="iv"><div class="l">Retention ('+x.retention+'%)</div><div class="v">'+INR(Math.round(x.billAmt*x.retention/100))+'</div></div><div class="iv"><div class="l">Advance Recovery</div><div class="v">'+INR(x.advance)+'</div></div><div class="iv"><div class="l">Net Payable</div><div class="v">'+INR(x.netPayable)+'</div></div><div class="iv"><div class="l">Status</div><div class="v">'+x.status.toUpperCase()+'</div></div></div>'+(x.workDesc?'<h3>Work Description</h3><p>'+x.workDesc+'</p>':'')+(x.notes?'<p><i>'+x.notes+'</i></p>':''));
  }

  var stCls={submitted:'bam',certified:'bgr',paid:'bgr',rejected:'brd',pending:'bbl'};
  var netPreview=calcNet(form);

  return <div className="fi">
    <div className="flex ic jb mb12">
      <div className="st" style={{margin:0}}>&#128203; RA Bills</div>
      <button className="btn bp bsm" onClick={function(){setShowM(true);setEditId(null);setForm(blank);}}>+ Add RA Bill</button>
    </div>
    {usites(user,P.sites).length>1&&<SiteFilter sites={usites(user,P.sites)} value={siteSel} onChange={setSiteSel} lang={lang}/>}
    <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(140px,1fr))',gap:8,marginBottom:12}}>
      {[['Total Billed',INR(totBill),'var(--am)'],['Net Payable',INR(totNet),'var(--bl)'],['Certified',INR(totCert),'var(--gr)'],['Bills',vis.length,'var(--tx)']].map(function(x){return <div key={x[0]} style={{background:'var(--sur)',border:'1px solid var(--bdr)',borderRadius:8,padding:'10px 12px'}}><div style={{fontSize:9,color:'var(--tx3)',textTransform:'uppercase',marginBottom:3}}>{x[0]}</div><div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:16,fontWeight:700,color:x[2]}}>{x[1]}</div></div>;})}
    </div>
    <div style={{display:'flex',gap:8,marginBottom:12,alignItems:'center'}}>
      <input value={srch} onChange={function(e){setSrch(e.target.value);}} placeholder="Search client / RA No..." style={{flex:1}}/>
      {srch&&<button className="btn bs bsm" onClick={function(){setSrch('');}}>Clear</button>}
    </div>
    {vis.length===0&&<div className="aba aba-a">No RA bills found.</div>}
    <div style={{display:'flex',flexDirection:'column',gap:10}}>
      {vis.map(function(x){
        var site=gSite(P.sites,x.siteId);
        var overdue=x.dueDate&&x.dueDate<today()&&x.status!=='paid';
        return <div key={x.id} className="card" style={{borderLeft:'4px solid '+(overdue?'var(--rd)':'var(--am)')}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',flexWrap:'wrap',gap:8,marginBottom:8}}>
            <div>
              <div style={{fontWeight:700,fontSize:14}}>{x.client}</div>
              <div style={{display:'flex',gap:6,marginTop:3,flexWrap:'wrap'}}>
                <span className="bbl" style={{fontSize:10}}>{site.name}</span>
                {x.raNo&&<span className="mono tsm">RA #{x.raNo}</span>}
                <span className={stCls[x.status]||'bam'} style={{fontSize:10}}>{x.status.toUpperCase()}</span>
                {overdue&&<span className="brd" style={{fontSize:10}}>OVERDUE</span>}
              </div>
            </div>
            <div style={{textAlign:'right'}}>
              <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:18,fontWeight:700,color:'var(--am)'}}>{INR(x.netPayable)}</div>
              <div style={{fontSize:10,color:'var(--tx3)'}}>net payable</div>
            </div>
          </div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:6,marginBottom:8}}>
            {[['Billed',INR(x.billAmt)],['Previous',INR(x.previousCert)],['Contract',INR(x.contractAmt)]].map(function(t){return <div key={t[0]} style={{background:'var(--sur2)',borderRadius:5,padding:'4px 8px'}}><div style={{fontSize:8,color:'var(--tx3)'}}>{t[0]}</div><div style={{fontSize:12,fontWeight:600,fontFamily:"'Barlow Condensed',sans-serif"}}>{t[1]}</div></div>;})}
          </div>
          {x.workDesc&&<div style={{fontSize:12,color:'var(--tx2)',marginBottom:6}}>{x.workDesc}</div>}
          {x.dueDate&&<div style={{fontSize:11,color:overdue?'var(--rd)':'var(--tx3)'}}>Due: {x.dueDate}</div>}
          <div style={{display:'flex',gap:6,marginTop:8}}>
            <button className="btn bs bxs" onClick={function(){printRA(x);}}>Print</button>
            {isAdmin&&<>
              <button className="btn bs bxs" onClick={function(){startEdit(x);}}>Edit</button>
              {x.status==='submitted'&&<button className="btn bp bxs" onClick={function(){P.setRaBills(function(prev){return prev.map(function(r){return r.id===x.id?Object.assign({},r,{status:'certified'}):r;});});}}>Certify</button>}
              {x.status==='certified'&&<button className="btn bp bxs" style={{background:'var(--gr)'}} onClick={function(){P.setRaBills(function(prev){return prev.map(function(r){return r.id===x.id?Object.assign({},r,{status:'paid'}):r;});});}}>Mark Paid</button>}

function Reports(props){
  var user=props.user,P=props;
  var [tab,setTab]=useState('financial');
  var lang=props.lang||'en';
  var L=function(k){return tl(lang,k);};
  var us=usites(user,P.sites);

  var totBudget=us.reduce(function(a,s){return a+s.budget;},0);
  var matBase=(P.purchases||[]).reduce(function(a,p){return a+p.base;},0);
  var totGst=(P.purchases||[]).reduce(function(a,p){return a+(p.gstAmt||0);},0);
  var totPurch=matBase+totGst;
  var totLabour=(P.labour||[]).reduce(function(a,l){return a+(l.total||0);},0);
  var totFuel=(P.fuel||[]).reduce(function(a,f){return a+f.cost;},0);
  var totMisc=(P.misc||[]).reduce(function(a,m){return a+m.amt;},0);
  var totSpent=totPurch+totLabour+totFuel+totMisc;
  var dailyL=(P.labour||[]).filter(function(l){return l.type==='daily';}).reduce(function(a,l){return a+(l.total||0);},0);
  var contrL=(P.labour||[]).filter(function(l){return l.type==='contractor';}).reduce(function(a,l){return a+(l.total||0);},0);

  var catMap={};
  (P.purchases||[]).forEach(function(p){
    var m=gMat(P.mats,p.matId);
    catMap[m.cat||'Other']=(catMap[m.cat||'Other']||0)+p.base;
  });
  var catColors=['#F59E0B','#3B82F6','#10B981','#8B5CF6','#EF4444','#EC4899','#06B6D4'];
  var catPie=Object.entries(catMap).map(function(e,i){return{label:e[0],val:e[1],color:catColors[i%catColors.length]};});

  var spendPie=[
    {label:'Materials',val:matBase,color:'#F59E0B'},
    {label:L('labour'),val:totLabour,color:'#EF4444'},
    {label:'Fuel',val:totFuel,color:'#3B82F6'},
    {label:'Misc',val:totMisc,color:'#8B5CF6'},
    {label:'GST',val:totGst,color:'#10B981'}
  ];

  function siteTotal(sid){
    return [P.purchases,P.fuel,P.misc,P.labour].reduce(function(acc,arr){
      return acc+(arr||[]).filter(function(x){return x.siteId===sid;})
        .reduce(function(a,x){return a+(x.base||0)+(x.gstAmt||0)+(x.cost||0)+(x.amt||0)+(x.total||0);},0);
    },0);
  }

  var siteBar=us.map(function(s){
    var sp=siteTotal(s.id);
    var pp=s.budget?Math.round(sp/s.budget*100):0;
    return{l:s.name.split(' ')[0].substring(0,6),v:sp,vl:Math.round(sp/1000)+'K',col:pp>80?'var(--rd)':'var(--gr)'};
  });

  var months=['Oct','Nov','Dec','Jan','Feb','Mar'];
  var spArr=[620000,840000,1050000,1180000,1320000,totSpent];
  var monthLine=months.map(function(m,i){return{l:m,v:spArr[i]};});

  var tabs=[['financial','Financial'],['sites','Site-wise'],['gst','GST'],['labour','Labour'],['attendance','Attendance'],['analytics','Analytics']];

  return <div className="fi">
    <div className="flex ic jb mb12">
      <div className="st" style={{margin:0}}>{L('financialRep')}</div>
      <button className="btn bs bsm" onClick={function(){
        if(tab==='financial'){

function Complaints(props){
  var user=props.user,P=props,lang=props.lang||'en';
  var L=function(k){return tl(lang,k);};
  var isAdmin=user.role==='admin'||user.role==='master_admin';

  var [tab,setTab]=useState(isAdmin?'all':'mine');
  var [showForm,setShowForm]=useState(false);
  var [respondId,setRespondId]=useState(null);
  var [form,setForm]=useState({category:'Work Conditions',title:'',desc:''});
  var [respText,setRespText]=useState('');

  function sf(k,v){setForm(function(p){var n=Object.assign({},p);n[k]=v;return n;});}

  var cats=['Work Conditions','Safety Issue','Salary / Payment','Management','Equipment','Harassment','Other'];

  var allComplaints=P.complaints||[];
  var mine=allComplaints.filter(function(c){return c.uid===user.id;});
  var forAdmin=isAdmin?allComplaints:mine;
  var listed=tab==='mine'?mine:forAdmin;
  var sorted=listed.slice().sort(function(a,b){return (b.ts||'').localeCompare(a.ts||'');});

  function submit(){
    if(!form.title.trim()||!form.desc.trim()){alert('Please fill subject and description.');return;}
    addItem(P.setComplaints,{
      id:Date.now(),uid:user.id,name:user.name,
      category:form.category,title:form.title.trim(),desc:form.desc.trim(),
      ts:sts(),status:'pending',response:'',responseTs:'',respondedBy:''
    });
    setForm({category:'Work Conditions',title:'',desc:''});
    setShowForm(false);
  }

  function sendResponse(id){
    if(!respText.trim()){alert('Please write a response.');return;}
    var idx=allComplaints.findIndex(function(c){return c.id===id;});
    if(idx<0)return;
    P.setComplaints(function(prev){
      var n=prev.slice();
      n[idx]=Object.assign({},n[idx],{status:'resolved',response:respText.trim(),responseTs:sts(),respondedBy:user.name});
      return n;
    });
    setRespText('');setRespondId(null);
  }

  var statusColor={pending:'var(--am)',resolved:'var(--gr)',rejected:'var(--rd)'};
  var statusLabel={pending:L('complaintPending')||'Pending Review',resolved:L('complaintResolved')||'Resolved',rejected:'Rejected'};

  return <div className="fi">
    {/* File complaint modal */}
    {showForm&&<div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.65)',zIndex:2000,display:'flex',alignItems:'center',justifyContent:'center',padding:16}} onClick={function(){setShowForm(false);}}>
      <div style={{background:'var(--sur)',border:'1px solid var(--bdr2)',borderRadius:12,padding:22,width:480,maxWidth:'95vw',maxHeight:'90vh',overflowY:'auto'}} onClick={function(e){e.stopPropagation();}}>
        <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:20,fontWeight:700,marginBottom:14}}>📌 {L('fileComplaint')}</div>
        <div className="fr"><label>Category</label>
          <select value={form.category} onChange={function(e){sf('category',e.target.value);}}>
            {cats.map(function(c){return <option key={c}>{c}</option>;})}
          </select>
        </div>
        <div className="fr"><label>{L('complaintTitle')} *</label>
          <input value={form.title} onChange={function(e){sf('title',e.target.value);}} placeholder="Brief subject of your complaint"/>
        </div>
        <div className="fr"><label>{L('complaintDesc')} *</label>
          <textarea rows="4" value={form.desc} onChange={function(e){sf('desc',e.target.value);}} placeholder="Describe the issue in detail..."></textarea>
        </div>
        <div className="aba aba-a" style={{marginBottom:12}}>Your complaint will be sent to the Admin for review. You will see their response here.</div>
        <div style={{display:'flex',gap:8}}>
          <button className="btn bp" style={{flex:1}} onClick={submit}>{L('submitComplaint')}</button>
          <button className="btn bs" onClick={function(){setShowForm(false);}}>✕ {L('cancel')}</button>
        </div>
      </div>
    </div>}

    {/* Respond modal */}
    {respondId!==null&&<div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.65)',zIndex:2000,display:'flex',alignItems:'center',justifyContent:'center',padding:16}} onClick={function(){setRespondId(null);}}>
      <div style={{background:'var(--sur)',border:'1px solid var(--bdr2)',borderRadius:12,padding:22,width:440,maxWidth:'95vw'}} onClick={function(e){e.stopPropagation();}}>
        <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:20,fontWeight:700,marginBottom:14}}>💬 {L('respond')}</div>
        <div style={{background:'var(--sur2)',borderRadius:8,padding:'10px 13px',marginBottom:12,fontSize:12,color:'var(--tx2)'}}>
          {(allComplaints.filter(function(c){return c.id===respondId;})[0]||{}).desc||''}
        </div>
        <div className="fr"><label>{L('response')} *</label>
          <textarea rows="4" value={respText} onChange={function(e){setRespText(e.target.value);}} placeholder="Write your response to the employee..."></textarea>
        </div>
        <div style={{display:'flex',gap:8}}>
          <button className="btn bp" style={{flex:1}} onClick={function(){sendResponse(respondId);}}>✓ Send Response</button>
          <button className="btn bs" onClick={function(){setRespondId(null);setRespText('');}}>✕ {L('cancel')}</button>
        </div>
      </div>
    </div>}

    <div className="flex ic jb mb12">
      <div className="st" style={{margin:0}}>📌 {L('complaints')}</div>
      {!isAdmin&&<button className="btn bp bsm" onClick={function(){setShowForm(true);}}>+ {L('fileComplaint')}</button>}
    </div>

    {isAdmin&&<div className="tbar">
      <button className={tab==='all'?'ac':''} onClick={function(){setTab('all');}}>All Complaints <span style={{background:'var(--am)',color:'#000',fontSize:9,padding:'1px 5px',borderRadius:8,marginLeft:4}}>{allComplaints.length}</span></button>
      <button className={tab==='pending'?'ac':''} onClick={function(){setTab('pending');}}>Pending <span style={{background:'var(--rd)',color:'#fff',fontSize:9,padding:'1px 5px',borderRadius:8,marginLeft:4}}>{allComplaints.filter(function(c){return c.status==='pending';}).length}</span></button>
      <button className={tab==='resolved'?'ac':''} onClick={function(){setTab('resolved');}}>Resolved</button>
    </div>}

    {!isAdmin&&<div className="tbar">
      <button className={tab==='mine'?'ac':''} onClick={function(){setTab('mine');}}>My Complaints ({mine.length})</button>
    </div>}

    {sorted.length===0&&<div className="aba aba-g">{L('noComplaints')}</div>}

    <div style={{display:'flex',flexDirection:'column',gap:12}}>
      {sorted.filter(function(c){
        if(tab==='pending')return c.status==='pending';
        if(tab==='resolved')return c.status==='resolved';
        return true;
      }).map(function(c){
        var submitter=gUser(P.users,c.uid);
        var col=statusColor[c.status]||'var(--tx3)';
        var isPending=c.status==='pending';
        return <div key={c.id} style={{background:'var(--sur)',border:'1px solid var(--bdr)',borderRadius:10,padding:'14px 16px',borderLeft:'4px solid '+col}}>
          <div style={{display:'flex',gap:10,alignItems:'flex-start',marginBottom:8,flexWrap:'wrap'}}>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontWeight:700,fontSize:14,marginBottom:2}}>{c.title}</div>
              <div style={{display:'flex',gap:8,flexWrap:'wrap',alignItems:'center'}}>
                <span style={{background:'rgba(59,130,246,.12)',color:'var(--bl)',border:'1px solid var(--bdr)',borderRadius:4,fontSize:10,fontWeight:600,padding:'1px 7px'}}>{c.category}</span>
                <span style={{fontSize:10,fontWeight:700,color:col,background:col+'18',border:'1px solid '+col+'44',borderRadius:4,padding:'1px 7px'}}>{statusLabel[c.status]||c.status}</span>
              </div>
            </div>
            {isAdmin&&isPending&&<button className="btn bp bxs" onClick={function(){setRespondId(c.id);setRespText('');}}>💬 {L('respond')}</button>}
          </div>
          {/* Who filed + when */}
          <div style={{display:'flex',gap:8,alignItems:'center',marginBottom:8}}>
            <Avt user={submitter} size={22}/>
            <span style={{fontSize:11,color:'var(--tx2)'}}>{c.name}</span>
            <span style={{fontSize:10,color:'var(--tx3)'}}>· {c.ts}</span>
          </div>
          {/* Complaint body */}
          <div style={{fontSize:13,lineHeight:1.5,color:'var(--tx)',background:'var(--sur2)',borderRadius:7,padding:'9px 12px',marginBottom:c.response?10:0}}>
            {c.desc}
          </div>
          {/* Response block */}
          {c.response&&<div style={{background:'rgba(16,185,129,.06)',border:'1px solid rgba(16,185,129,.2)',borderRadius:7,padding:'9px 12px',marginTop:8}}>
            <div style={{fontSize:10,fontWeight:700,color:'var(--gr)',marginBottom:4}}>✓ ADMIN RESPONSE — {c.respondedBy} · {c.responseTs}</div>
            <div style={{fontSize:13,lineHeight:1.5}}>{c.response}</div>
          </div>}
          {/* Awaiting response notice for employee */}
          {!isAdmin&&isPending&&<div style={{fontSize:11,color:'var(--am)',marginTop:8}}>⌛ Your complaint is under review. You will be notified once Admin responds.</div>}
        </div>;
      })}
    </div>
  </div>;
}

    saveDB({sites:sites,users:users,mats:mats,purchases:purchases,reqs:reqs,fuel:fuel,misc:misc,labour:labour,leaves:leaves,policies:policies,att:att,shifts:shifts,groups:groups,chatMsgs:chatMsgs,dms:dms,log:log,seenIds:seenIds,complaints:complaints,tenders:tenders,bills:bills,vendors:vendors,dprs:dprs,indents:indents,rabills:rabills,workorders:workorders,tasks:tasks,notices:notices,pettycash:pettycash,expenses:expenses,loans:loans,tdsrecs:tdsrecs,snags:snags,documents:documents,safetylog:safetylog,ppelog:ppelog,drills:drills,clients:clients,variations:variations,warnings:warnings,drawings:drawings,equipchecks:equipchecks,subpayments:subpayments,pricehistory:pricehistory,reminders:reminders,salaries:salaries,machinery:machinery});
  },[sites,users,mats,purchases,reqs,fuel,misc,labour,leaves,policies,att,shifts,groups,chatMsgs,dms,log,seenIds,complaints,tenders,bills,vendors,dprs,indents,rabills,workorders,tasks,notices,pettycash,expenses,loans,tdsrecs,snags,documents,safetylog,ppelog,drills,clients,variations,warnings,drawings,equipchecks,subpayments,pricehistory,reminders,salaries,machinery]);

  useEffect(function(){
    /* Firebase real-time sync — pull latest data when any device saves */
    if(RAJ_FB_ENABLED&&RAJ_FB_REF){
      RAJ_FB_REF.on('value',function(snap){
        var d=snap.val();
        if(!d)return;
        try{localStorage.setItem(DB,JSON.stringify(d));}catch(e){}
        if(d.sites)setSites(d.sites);
        if(d.users)setUsers(d.users);
        if(d.mats)setMats(d.mats);
        if(d.purchases)setPurchases(d.purchases);
        if(d.reqs)setReqs(d.reqs);
        if(d.fuel)setFuel(d.fuel);
        if(d.misc)setMisc(d.misc);
        if(d.labour)setLabour(d.labour);
        if(d.leaves)setLeaves(d.leaves);
        if(d.policies)setPolicies(d.policies);
        if(d.att)setAtt(d.att);
        if(d.shifts)setShifts(d.shifts);
        if(d.groups)setGroups(d.groups);
        if(d.chatMsgs)setChatMsgs(Array.isArray(d.chatMsgs)?d.chatMsgs:[]);
        if(d.dms)setDms(d.dms);
        if(d.log)setLog(d.log);
        if(d.seenIds)setSeenIds(d.seenIds);
        if(d.complaints)setComplaints(d.complaints);
        if(d.tenders)setTenders(d.tenders);
        if(d.bills)setBills(d.bills);
        if(d.vendors)setVendors(d.vendors);
        if(d.dprs)setDprs(d.dprs);
        if(d.indents)setIndents(d.indents);
        if(d.rabills)setRaBills(d.rabills);
        if(d.workorders)setWorkOrders(d.workorders);
        if(d.tasks)setTasks(d.tasks);
        if(d.notices)setNotices(d.notices);
        if(d.pettycash)setPettyCash(d.pettycash);
        if(d.expenses)setExpenses(d.expenses);
        if(d.loans)setLoans(d.loans);
        if(d.tdsrecs)setTdsRecs(d.tdsrecs);
        if(d.snags)setSnags(d.snags);
        if(d.documents)setDocuments(d.documents);
        if(d.safetylog)setSafetyLog(d.safetylog);
        if(d.ppelog)setPpeLog(d.ppelog);
        if(d.drills)setDrills(d.drills);
        if(d.clients)setClients(d.clients);
        if(d.variations)setVariations(d.variations);
        if(d.warnings)setWarnings(d.warnings);
        if(d.drawings)setDrawings(d.drawings);
        if(d.equipchecks)setEquipChecks(d.equipchecks);
        if(d.subpayments)setSubPayments(d.subpayments);
        if(d.pricehistory)setPriceHistory(d.pricehistory);
        if(d.reminders)setReminders(d.reminders);
        if(d.salaries)setSalaries(d.salaries);
        if(d.machinery)setMachinery(d.machinery);
      });
      return function(){RAJ_FB_REF.off();};
    }
  },[]);

  useEffect(function(){
    function onSync(e){
      if(e.key!==DB||!e.newValue)return;
      try{
        var d=JSON.parse(e.newValue);
        if(d.sites)setSites(d.sites);
        if(d.users)setUsers(d.users);
        if(d.mats)setMats(d.mats);
        if(d.purchases)setPurchases(d.purchases);
        if(d.reqs)setReqs(d.reqs);
        if(d.fuel)setFuel(d.fuel);
        if(d.misc)setMisc(d.misc);
        if(d.labour)setLabour(d.labour);
        if(d.leaves)setLeaves(d.leaves);
        if(d.policies)setPolicies(d.policies);
        if(d.att)setAtt(d.att);
        if(d.shifts)setShifts(d.shifts);
        if(d.groups)setGroups(d.groups);
        if(d.chatMsgs)setChatMsgs(d.chatMsgs);
        if(d.dms)setDms(d.dms);
        if(d.log)setLog(d.log);
        if(d.complaints)setComplaints(d.complaints);
        if(d.tenders)setTenders(d.tenders);
        if(d.bills)setBills(d.bills);
        if(d.vendors)setVendors(d.vendors);
        if(d.salaries)setSalaries(d.salaries);
        if(d.machinery)setMachinery(d.machinery);
      }catch(ex){}
    }
    window.addEventListener('storage',onSync);
    return function(){window.removeEventListener('storage',onSync);};
  },[]);

  function logout(){setUser(null);setPage('dashboard');}

  var L=function(k){return tl(lang,k);};

  var P={
    user:user,
    sites:sites,setSites:setSites,
    users:users,setUsers:setUsers,
    mats:mats,setMats:setMats,
    purchases:purchases,setPurchases:setPurchases,
    reqs:reqs,setReqs:setReqs,
    fuel:fuel,setFuel:setFuel,
    misc:misc,setMisc:setMisc,
    labour:labour,setLabour:setLabour,
    leaves:leaves,setLeaves:setLeaves,
    policies:policies,setPolicies:setPolicies,
    att:att,setAtt:setAtt,
    shifts:shifts,setShifts:setShifts,
    groups:groups,setGroups:setGroups,
    chatMsgs:chatMsgs,setChatMsgs:setChatMsgs,
    dms:dms,setDms:setDms,
    log:log,setLog:setLog,
    seenIds:seenIds,setSeenIds:setSeenIds,
    complaints:complaints,setComplaints:setComplaints,
    tenders:tenders,setTenders:setTenders,
    bills:bills,setBills:setBills,
    vendors:vendors,setVendors:setVendors,
    dprs:dprs,setDprs:setDprs,
    indents:indents,setIndents:setIndents,
    rabills:rabills,setRaBills:setRaBills,
    workorders:workorders,setWorkOrders:setWorkOrders,
    tasks:tasks,setTasks:setTasks,
    notices:notices,setNotices:setNotices,
    pettycash:pettycash,setPettyCash:setPettyCash,
    expenses:expenses,setExpenses:setExpenses,
    loans:loans,setLoans:setLoans,
    tdsrecs:tdsrecs,setTdsRecs:setTdsRecs,
    snags:snags,setSnags:setSnags,
    documents:documents,setDocuments:setDocuments,
    safetylog:safetylog,setSafetyLog:setSafetyLog,
    ppelog:ppelog,setPpeLog:setPpeLog,
    drills:drills,setDrills:setDrills,
    clients:clients,setClients:setClients,
    variations:variations,setVariations:setVariations,
    warnings:warnings,setWarnings:setWarnings,
    drawings:drawings,setDrawings:setDrawings,
    equipchecks:equipchecks,setEquipChecks:setEquipChecks,
    subpayments:subpayments,setSubPayments:setSubPayments,
    pricehistory:pricehistory,setPriceHistory:setPriceHistory,
    reminders:reminders,setReminders:setReminders,
    salaries:salaries,setSalaries:setSalaries,
    machinery:machinery,setMachinery:setMachinery,
    setPage:setPage,onLogout:logout,lang:lang,dark:dark,setDark:setDark,setLang:setLang,apiKey:apiKey,setApiKey:setApiKey
  };

  if(!user)return <Login users={users} lang={lang} onLogin={function(u){setUser(u);addItem(setLog,{id:Date.now(),user:u.name,action:'Logged in',time:sts(),type:'login'});}}/>;

  var isMA=user.role==='master_admin';
  var isA=user.role==='admin'||isMA;
  var pendingReqs=(reqs||[]).filter(function(r){return r.status==='pending';}).length;
  var unreadChat=(chatMsgs||[]).filter(function(m){return m.uid!==user.id;}).length;
  var pendingComplaints=(complaints||[]).filter(function(c){return c.status==='pending';}).length;
  var totalNotifs=(reqs||[]).filter(function(r){return r.status==='pending'&&seenIds.indexOf('r'+r.id)<0;}).length+(isA?pendingComplaints:0);

  var rl={'master_admin':4,'admin':3,'site_manager':2,'contractor':2,'field_worker':2};
  var myLevel=rl[user.role]||1;
  var navGroups=[
    {label:'Home',items:[
      {id:'dashboard',icon:'📊',label:'Dashboard'},
      {id:'comms',icon:'💬',label:'Communications'},
    ]},
    {label:'My Work',items:[
      {id:'attendance',icon:'📅',label:'Attendance'},
      {id:'tasks',icon:'✅',label:'Tasks'},
      {id:'expenses',icon:'💸',label:'My Expenses'},
      {id:'indents',icon:'📤',label:'Material Request'},
      {id:'complaints',icon:'📢',label:'Complaints',badge:isA?pendingComplaints:0},
      {id:'usersettings',icon:'⚙️',label:'Settings'},
    ]},
    {label:'Operations',minLevel:2,items:[
      {id:'dailyops',icon:'📝',label:'Daily Ops'},
      {id:'matstore',icon:'📦',label:'Materials'},
      {id:'sitefinance',icon:'💰',label:'Site Finance'},
      {id:'qualitysafety',icon:'🦺',label:'Quality & Safety'},
      {id:'machinery',icon:'⚙️',label:'Machinery'},
    ]},
    {label:'Finance',minLevel:3,items:[
      {id:'payments',icon:'💰',label:'Payments'},
      {id:'hubvendors',icon:'🏪',label:'Vendors'},
      {id:'contracts',icon:'📋',label:'Contracts'},
      {id:'hubclients',icon:'🤝',label:'Clients'},
    ]},
    {label:'People & Files',minLevel:3,items:[
      {id:'hubstaff',icon:'👥',label:'Staff'},
      {id:'hubfiles',icon:'📂',label:'Files'},
    ]},
    {label:'Reports & More',minLevel:3,items:[
      {id:'hubreports',icon:'📈',label:'Reports'},
      {id:'hubadmin',icon:'⚙️',label:'Admin'},
      {id:'ai',icon:'🤖',label:'AI Assistant'},
    ]},
  ].map(function(g){
    return Object.assign({},g,{items:(g.items||[]).filter(function(n){return ((n.minLevel||1)<=myLevel)&&((g.minLevel||1)<=myLevel);})});
  }).filter(function(g){return g.items.length>0;});
  var allNavItems=navGroups.reduce(function(a,g){return a.concat(g.items);},[]);
  var bnavIds=myLevel<=1?['dashboard','attendance','tasks','comms','complaints']:
    myLevel===2?['dashboard','dailyops','sitefinance','matstore','attendance']:
    myLevel===3?['dashboard','payments','hubreports','matstore','hubadmin']:
    ['dashboard','hubreports','payments','matstore','hubadmin'];
  var bnav=bnavIds.map(function(id){return allNavItems.filter(function(n){return n.id===id;})[0];}).filter(Boolean);

  return <div>
    <div id="sb">
      <div className="logo">
        <img src={LOGO} alt="RAJ" style={{height:30,width:'auto',objectFit:'contain'}}/>
        <div style={{marginLeft:8}}>
          <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:15,fontWeight:800,color:'var(--am)',lineHeight:1.1}}>RAJ</div>
          <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:10,fontWeight:600,color:'var(--tx3)',letterSpacing:'.06em',lineHeight:1.1}}>CONSTRUCTION</div>
        </div>
      </div>
      <nav>
        {navGroups.map(function(g,gi){return <div key={gi}>
          <div style={{fontSize:9,fontWeight:700,color:'var(--tx3)',textTransform:'uppercase',letterSpacing:'.08em',padding:gi===0?'8px 14px 3px':'12px 14px 3px'}}>{g.label}</div>
          {g.items.map(function(n){return <div key={n.id} className={'ni'+(page===n.id?' ac':'')} onClick={function(){setPage(n.id);document.getElementById('sb').classList.remove('op');}}>
            <span className="ico">{n.icon}</span>
            <span style={{flex:1,fontSize:12}}>{n.label}</span>
            {n.badge>0&&<span className="nb">{n.badge}</span>}
          </div>;}  )}
        </div>;}  )}
      </nav>
      <div className="ua">
        <div style={{display:'flex',gap:8,alignItems:'center'}}>
          <Avt user={user} size={28}/>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontSize:11,fontWeight:600,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{user.name}</div>
            <div style={{fontSize:9,color:'var(--tx3)'}}>{RL[user.role]}</div>
          </div>
          <button title={L('signOut')} className="btn bd bxs" onClick={logout}>↩</button>
        </div>
      </div>
    </div>

    <div id="mn">
      <div id="tb">
        <div style={{display:'flex',alignItems:'center',gap:8}}>
          <button id="mmt" onClick={function(){document.getElementById('sb').classList.toggle('op');}}>☰</button>
          <span className="pt">{(allNavItems.find(function(n){return n.id===page;})||{label:'RAJ'}).label}</span>
        </div>
        <div className="tr">
          <GlobalSearch {...P} setPage={setPage}/>
          <DateTime/>
          <div style={{position:'relative'}}>
            <button className="btn bs bsm" onClick={function(){setCalcOpen(function(p){return !p;});}}>💲</button>
            {calcOpen&&<Calculator onClose={function(){setCalcOpen(false);}}/>}
          </div>
          <div style={{position:'relative'}}>
            <button className="btn bs bsm" style={{position:'relative'}} onClick={function(){setNotifOpen(function(p){return !p;});}}>
              🔔
              {totalNotifs>0&&<span style={{position:'absolute',top:-4,right:-4,background:'var(--rd)',color:'#fff',fontSize:9,fontWeight:700,padding:'0 4px',borderRadius:8,minWidth:14,textAlign:'center',lineHeight:'14px'}}>{totalNotifs}</span>}
            </button>
            {notifOpen&&<div className="np">
              <div style={{padding:'8px 12px',borderBottom:'1px solid var(--bdr)',fontWeight:700,fontSize:12,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                Notifications
                <button onClick={function(){setNotifOpen(false);}} style={{background:'none',color:'var(--tx3)',fontSize:14,cursor:'pointer'}}>✕</button>
              </div>
              {(reqs||[]).filter(function(r){return r.status==='pending';}).map(function(r){
                var m=gMat(mats,r.matId);
                var seen=seenIds.indexOf('r'+r.id)>=0;
                return <div key={r.id} className={'ni2'+(seen?' seen':'')} onClick={function(){setPage('requisitions');setNotifOpen(false);if(!seen)setSeenIds(function(p){return p.concat('r'+r.id);});}}>
                  <b>Req:</b> {m.name} x{r.qty}
                  <div style={{fontSize:10,color:'var(--tx3)'}}>{r.on}</div>
                </div>;
              })}
              {isA&&(complaints||[]).filter(function(c){return c.status==='pending';}).map(function(c){
                return <div key={c.id} className="ni2" onClick={function(){setPage('complaints');setNotifOpen(false);}}>
                  <b>📌 Complaint:</b> {c.name}
                  <div style={{fontSize:11,color:'var(--tx2)',marginTop:1}}>{c.title}</div>
                  <div style={{fontSize:10,color:'var(--tx3)'}}>{c.ts}</div>
                </div>;
              })}
              {totalNotifs===0&&<div className="ni2" style={{color:'var(--tx3)'}}>No new notifications.</div>}
            </div>}
          </div>
          <button className="btn bs bsm" onClick={function(){setDark(function(p){return !p;});}}>{dark?'☀️':'🌙'}</button>
        </div>
      </div>

      <div id="ct">
        {page==='comms'&&<HubComms {...P}/>}
        {page==='dailyops'&&<HubDailyOps {...P}/>}
        {page==='matstore'&&<HubMaterials {...P}/>}
        {page==='contracts'&&isA&&<HubContracts {...P}/>}
        {page==='payments'&&isA&&<HubPayments {...P}/>}
        {page==='hubvendors'&&isA&&<HubVendors {...P}/>}
        {page==='qualitysafety'&&<HubSafety {...P}/>}
        {page==='hubfiles'&&<HubFiles {...P}/>}
        {page==='hubstaff'&&isA&&<HubStaff {...P}/>}
        {page==='hubreports'&&isA&&<HubReports {...P}/>}
        {page==='sitefinance'&&<Finance {...P}/>}
        {page==='usersettings'&&<Settings {...P}/>}
        {page==='hubclients'&&isA&&<HubClients {...P}/>}
        {page==='hubadmin'&&<HubAdmin {...P}/>}
                {page==='dashboard'&&<Dashboard {...P}/>}
        {page==='requisitions'&&<Requisitions {...P}/>}
        {page==='attendance'&&<Attendance {...P}/>}
        {page==='ai'&&<AIChatbot {...P} apiKey={apiKey}/>}
        {page==='complaints'&&<Complaints {...P}/>}
        {page==='tasks'&&<Tasks {...P}/>}
        {page==='expenses'&&<Expenses {...P}/>}
        {page==='indents'&&<Indents {...P}/>}
        {page==='machinery'&&<Machinery {...P}/>}
      </div>
    </div>

    <div id="bnav">
      {bnav.map(function(n){
        return <div key={n.id} className={'bi'+(page===n.id?' ac':'')} onClick={function(){setPage(n.id);document.getElementById('sb').classList.remove('op');}}>
          {n.badge>0&&<span className="bb">{n.badge}</span>}
          <span className="bn">{n.icon}</span>
          <span>{n.label}</span>
        </div>;
      })}
    </div>
  </div>;
}

try{
  var _root=document.getElementById('root');
  var _sp=document.getElementById('splash');
  if(_sp)_sp.remove();
  ReactDOM.createRoot(_root).render(<App/>);
}catch(e){
  window.__RAJ_ERR(e.message,'',0,0,e);
}
</script>
</body>
</html>
