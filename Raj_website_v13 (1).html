<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
<title>RAJ Construction</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=IBM+Plex+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
:root{--bg:#0C0E14;--sur:#13161F;--sur2:#1A1E2A;--bdr:#252B3B;--bdr2:#313849;--am:#F59E0B;--amd:#D97706;--aml:#FCD34D;--bl:#3B82F6;--gr:#10B981;--rd:#EF4444;--pu:#8B5CF6;--tx:#E4E8F0;--tx2:#A8B3C8;--tx3:#5E6B82;--sw:220px;}
body.light{--bg:#F0F4FA;--sur:#fff;--sur2:#EEF2F8;--bdr:#D1D9E6;--bdr2:#94A3B8;--tx:#0F172A;--tx2:#475569;--tx3:#94A3B8;}
html,body{margin:0;padding:0;width:100%;height:100%;overflow-x:hidden;}
*,*::before,*::after{box-sizing:border-box;}
body{background:var(--bg);color:var(--tx);font-family:'IBM Plex Sans',sans-serif;min-height:100vh;transition:background .3s,color .3s;}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--bdr2);border-radius:2px}
button{font-family:'IBM Plex Sans',sans-serif;cursor:pointer;border:none;outline:none;}
input,select,textarea{font-family:'IBM Plex Sans',sans-serif;color:var(--tx);background:var(--sur2);border:1px solid var(--bdr);border-radius:6px;padding:8px 11px;font-size:14px;outline:none;width:100%;transition:border-color .2s;}
input:focus,select:focus,textarea:focus{border-color:var(--am);}
select option{background:var(--sur2);}
label{font-size:12px;color:var(--tx2);font-weight:500;display:block;margin-bottom:4px;}
/* Badges */
.bam{display:inline-flex;align-items:center;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600;background:rgba(245,158,11,.15);color:var(--am);border:1px solid rgba(245,158,11,.3);}
.bgr{display:inline-flex;align-items:center;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600;background:rgba(16,185,129,.15);color:var(--gr);border:1px solid rgba(16,185,129,.3);}
.brd{display:inline-flex;align-items:center;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600;background:rgba(239,68,68,.15);color:var(--rd);border:1px solid rgba(239,68,68,.3);}
.bbl{display:inline-flex;align-items:center;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600;background:rgba(59,130,246,.15);color:var(--bl);border:1px solid rgba(59,130,246,.3);}
.bpu{display:inline-flex;align-items:center;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600;background:rgba(139,92,246,.15);color:var(--pu);border:1px solid rgba(139,92,246,.3);}
/* Buttons */
.btn{display:inline-flex;align-items:center;gap:5px;padding:8px 14px;border-radius:6px;font-size:13px;font-weight:500;transition:all .18s;cursor:pointer;white-space:nowrap;}
.bp{background:var(--am);color:#0C0E14;}.bp:hover{background:var(--aml);}
.bs{background:var(--sur2);color:var(--tx);border:1px solid var(--bdr2);}.bs:hover{border-color:var(--am);color:var(--am);}
.bd{background:rgba(239,68,68,.12);color:var(--rd);border:1px solid rgba(239,68,68,.25);}.bd:hover{background:var(--rd);color:#fff;}
.bg2{background:rgba(16,185,129,.12);color:var(--gr);border:1px solid rgba(16,185,129,.25);}.bg2:hover{background:var(--gr);color:#fff;}
.bsm{padding:5px 10px;font-size:12px;}.bxs{padding:3px 8px;font-size:11px;}
/* Cards & Grids */
.card{background:var(--sur);border:1px solid var(--bdr);border-radius:10px;padding:16px;}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;}
.g5{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:11px;}
.fg3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:11px;}
.fr{margin-bottom:12px;}
/* Tables */
table{width:100%;border-collapse:collapse;}
th{background:var(--sur2);color:var(--tx2);font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;padding:10px 12px;text-align:left;border-bottom:1px solid var(--bdr);}
td{padding:10px 12px;border-bottom:1px solid var(--bdr);font-size:13px;color:var(--tx);vertical-align:middle;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:rgba(255,255,255,.012);}
/* Stat cards */
.sc{background:var(--sur);border:1px solid var(--bdr);border-radius:10px;padding:14px;position:relative;overflow:hidden;}
.sc::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;}
.sca::before{background:var(--am);}.scb::before{background:var(--bl);}
.scg::before{background:var(--gr);}.scr::before{background:var(--rd);}.scp::before{background:var(--pu);}
.sv{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:700;line-height:1.1;margin:4px 0 2px;}
.sl{font-size:10px;color:var(--tx3);text-transform:uppercase;letter-spacing:.07em;font-weight:600;}
/* Progress bar */
.pb{height:5px;background:var(--bdr);border-radius:3px;overflow:hidden;margin-top:7px;}
.pf{height:100%;border-radius:3px;transition:width .5s;}
/* Modals */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:2000;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(3px);padding:14px;overflow-y:auto;}
.mo{background:var(--sur);border:1px solid var(--bdr2);border-radius:12px;padding:20px;max-width:600px;width:100%;max-height:92vh;overflow-y:auto;}
.mt{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:700;margin-bottom:16px;display:flex;align-items:center;gap:8px;}
/* Full-screen site detail */
.fs-ov{position:fixed;inset:0;background:var(--bg);z-index:2000;display:flex;flex-direction:column;overflow:hidden;}
.fs-header{padding:12px 20px;border-bottom:1px solid var(--bdr);display:flex;align-items:center;gap:12px;background:var(--sur);flex-shrink:0;flex-wrap:wrap;}
.fs-body{flex:1;overflow-y:auto;padding:20px;}
/* Section heading */
.st{font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.st::before{content:'';display:inline-block;width:3px;height:17px;background:var(--am);border-radius:2px;flex-shrink:0;}
/* Utilities */
.flex{display:flex;}.ic{align-items:center;}.jb{justify-content:space-between;}
.g6{gap:6px;}.mb12{margin-bottom:12px;}.tm{color:var(--tx2);}.tsm{font-size:12px;}
.mono{font-family:'IBM Plex Mono',monospace;}
.dvd{border:none;border-top:1px solid var(--bdr);margin:12px 0;}
/* Alert banners */
.aba{padding:9px 14px;font-size:12px;font-weight:500;display:flex;align-items:center;gap:7px;border-radius:8px;margin-bottom:12px;}
.aba-r{background:rgba(239,68,68,.09);border:1px solid rgba(239,68,68,.25);color:var(--rd);}
.aba-a{background:rgba(245,158,11,.09);border:1px solid rgba(245,158,11,.25);color:var(--am);}
.aba-g{background:rgba(16,185,129,.09);border:1px solid rgba(16,185,129,.25);color:var(--gr);}
/* Site status pills */
.sac{background:rgba(16,185,129,.12);color:var(--gr);border:1px solid rgba(16,185,129,.25);border-radius:4px;font-size:10px;font-weight:700;padding:2px 7px;}
.spa{background:rgba(245,158,11,.12);color:var(--am);border:1px solid rgba(245,158,11,.25);border-radius:4px;font-size:10px;font-weight:700;padding:2px 7px;}
.sco{background:rgba(59,130,246,.12);color:var(--bl);border:1px solid rgba(59,130,246,.25);border-radius:4px;font-size:10px;font-weight:700;padding:2px 7px;}
.scl{background:rgba(100,100,100,.12);color:var(--tx3);border:1px solid rgba(100,100,100,.25);border-radius:4px;font-size:10px;font-weight:700;padding:2px 7px;}
.ls{background:rgba(239,68,68,.12);color:var(--rd);border:1px solid rgba(239,68,68,.25);border-radius:3px;font-size:10px;font-weight:700;padding:1px 5px;}
/* Tab bar */
.tbar{display:flex;gap:3px;margin-bottom:14px;background:var(--sur2);border-radius:8px;padding:3px;flex-wrap:wrap;}
.tbar button{flex:1;min-width:55px;padding:7px 8px;border-radius:6px;font-size:12px;font-weight:600;background:none;color:var(--tx2);}
.tbar button.ac{background:var(--sur);color:var(--am);box-shadow:0 1px 4px rgba(0,0,0,.2);}
/* Notifications */
.np{position:absolute;right:0;top:44px;width:290px;background:var(--sur);border:1px solid var(--bdr2);border-radius:10px;box-shadow:0 8px 28px rgba(0,0,0,.3);z-index:400;max-height:380px;overflow-y:auto;}
.ni2{padding:10px 12px;border-bottom:1px solid var(--bdr);font-size:12px;cursor:pointer;}
.ni2:last-child{border-bottom:none;}.ni2.seen{opacity:.4;}.ni2:hover{background:var(--sur2);}
/* Pie chart legend */
.pie-leg{display:flex;flex-direction:column;gap:6px;}
.pie-li{display:flex;align-items:center;gap:7px;font-size:12px;}
.pie-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0;}
/* Attendance calendar */
.aday{aspect-ratio:1;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;cursor:pointer;border:1px solid transparent;min-height:32px;}
.apr{background:rgba(16,185,129,.18);color:var(--gr);border-color:rgba(16,185,129,.28);}
.aab{background:rgba(239,68,68,.1);color:var(--rd);border-color:rgba(239,68,68,.2);}
.alv{background:rgba(59,130,246,.1);color:var(--bl);border-color:rgba(59,130,206,.2);}
.aem{background:var(--sur2);color:var(--tx3);}.atd{border-color:var(--am)!important;}
/* AI dots */
.td{width:5px;height:5px;background:var(--tx3);border-radius:50%;animation:bn 1.2s infinite;display:inline-block;}
.td:nth-child(2){animation-delay:.2s;}.td:nth-child(3){animation-delay:.4s;}
@keyframes bn{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-5px)}}
.fi{animation:fi .2s ease;}@keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
/* Calculator */
.calc-wrap{position:absolute;top:54px;right:0;width:265px;background:var(--sur);border:1px solid var(--bdr2);border-radius:12px;box-shadow:0 12px 40px rgba(0,0,0,.4);z-index:500;padding:12px;}
.calc-disp{background:var(--bg);border:1px solid var(--bdr);border-radius:8px;padding:8px 12px;margin-bottom:8px;text-align:right;}
.calc-expr{font-size:10px;color:var(--tx3);min-height:14px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.calc-num{font-family:'IBM Plex Mono',monospace;font-size:22px;font-weight:700;color:var(--tx);}
.calc-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:4px;}
.cb{padding:10px 4px;border-radius:6px;font-size:14px;font-weight:600;background:var(--sur2);color:var(--tx);border:1px solid var(--bdr);cursor:pointer;text-align:center;}
.cb:hover{background:var(--bdr2);}.cb-op{background:rgba(245,158,11,.12);color:var(--am);border-color:rgba(245,158,11,.25);}
.cb-eq{background:var(--am);color:#0C0E14;}.cb-cl{background:rgba(239,68,68,.12);color:var(--rd);}
/* DateTime topbar */
.dtbar{display:flex;flex-direction:column;align-items:flex-end;font-size:10px;color:var(--tx3);line-height:1.3;min-width:70px;}
.dtbar .t{font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:600;color:var(--tx);}
/* Search */
#gsw{position:relative;}
#gsw input{width:140px;font-size:12px;padding:6px 10px;}
.gsr{position:absolute;top:36px;right:0;width:270px;background:var(--sur);border:1px solid var(--bdr2);border-radius:9px;box-shadow:0 8px 24px rgba(0,0,0,.35);z-index:500;max-height:280px;overflow-y:auto;}
.gsri{padding:9px 12px;border-bottom:1px solid var(--bdr);cursor:pointer;font-size:12px;}
.gsri:hover{background:var(--sur2);}.gsri:last-child{border-bottom:none;}
/* Site filter bar */
.sfbar{display:flex;align-items:center;gap:10px;margin-bottom:14px;padding:9px 13px;background:var(--sur2);border-radius:8px;border:1px solid var(--bdr);}
.sfbar label{font-size:12px;font-weight:600;color:var(--tx2);white-space:nowrap;margin:0;}
.sfbar select{max-width:200px;}
/* Toggle switch */
.tog{width:48px;height:28px;background:var(--bdr2);border-radius:14px;position:relative;cursor:pointer;transition:background .25s;flex-shrink:0;display:inline-block;}
.tog.on{background:var(--am);}
.tog::after{content:'';position:absolute;left:4px;top:4px;width:20px;height:20px;background:#fff;border-radius:10px;transition:transform .25s;box-shadow:0 1px 4px rgba(0,0,0,.3);}
.tog.on::after{transform:translateX(20px);}
/* Settings */
.set-sec{margin-bottom:16px;padding:16px;background:var(--sur);border:1px solid var(--bdr);border-radius:10px;}
.set-sec h3{font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:700;margin:0 0 12px;color:var(--am);}
.pf-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--bdr);font-size:13px;gap:8px;}
.pf-row:last-child{border-bottom:none;}
.pf-row .pl{color:var(--tx2);font-size:12px;}
.pf-row .pv{font-weight:600;}

/* ─── CHAT — mobile-first ─── */
.chat-root{display:flex;height:calc(100vh - 110px);border:1px solid var(--bdr);border-radius:10px;overflow:hidden;background:var(--sur);}
/* Sidebar */
.chat-sidebar{width:220px;border-right:1px solid var(--bdr);display:flex;flex-direction:column;flex-shrink:0;background:var(--sur);}
.chat-sidebar-head{padding:10px 12px;border-bottom:1px solid var(--bdr);font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;display:flex;align-items:center;justify-content:space-between;}
.chat-list{flex:1;overflow-y:auto;}
.chat-item{padding:10px 13px;border-bottom:1px solid var(--bdr);cursor:pointer;position:relative;}
.chat-item:hover,.chat-item.active{background:var(--sur2);}
.chat-item.active{border-left:3px solid var(--am);}
/* Chat main */
.chat-main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;}
.chat-main-head{padding:10px 14px;border-bottom:1px solid var(--bdr);display:flex;align-items:center;gap:10px;flex-shrink:0;}
.chat-msgs{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:8px;}
.chat-empty{flex:1;display:flex;align-items:center;justify-content:center;color:var(--tx3);flex-direction:column;gap:10px;}
.chat-input-row{padding:10px 12px;border-top:1px solid var(--bdr);display:flex;gap:8px;align-items:center;flex-shrink:0;}
/* Message bubbles */
.msg-row{display:flex;gap:6px;max-width:78%;align-items:flex-end;}
.msg-row.me{align-self:flex-end;flex-direction:row-reverse;}
.msg-row.them{align-self:flex-start;flex-direction:row;}
.msg-bubble{background:var(--sur2);border:1px solid var(--bdr);border-radius:4px 12px 12px 12px;padding:8px 11px;position:relative;}
.msg-bubble.me{background:rgba(245,158,11,.14);border-color:rgba(245,158,11,.28);border-radius:12px 4px 12px 12px;}
/* ID card */
@media print{.no-print{display:none!important;}.id-card-print{display:block!important;}}
.msg-quote{background:rgba(255,255,255,.07);border-left:2px solid var(--am);border-radius:3px;padding:4px 8px;margin-bottom:5px;font-size:10px;color:var(--tx2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:220px;}
body.light .msg-quote{background:rgba(0,0,0,.07);}
/* Message action button — always visible small ⋮ */
.msg-menu-btn{background:var(--sur2);border:1px solid var(--bdr);color:var(--tx3);font-size:11px;width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;align-self:flex-start;margin-top:2px;transition:opacity .15s;}
.msg-menu-btn:hover{background:var(--bdr2);color:var(--tx);}
/* Message context menu */
.msg-ctx{position:fixed;background:var(--sur);border:1px solid var(--bdr2);border-radius:8px;padding:4px;box-shadow:0 6px 20px rgba(0,0,0,.35);z-index:3000;min-width:130px;}
.msg-ctx button{display:block;width:100%;text-align:left;padding:7px 12px;border-radius:5px;font-size:13px;color:var(--tx);background:none;white-space:nowrap;}
.msg-ctx button:hover{background:var(--sur2);}
/* Image viewer */
.img-vwr{position:fixed;inset:0;background:rgba(0,0,0,.96);z-index:4000;display:flex;flex-direction:column;}
.img-vwr-top{padding:12px 16px;display:flex;gap:8px;align-items:center;flex-shrink:0;}
.img-vwr-body{flex:1;display:flex;align-items:center;justify-content:center;padding:12px;}
.img-vwr-body img{max-width:95vw;max-height:82vh;object-fit:contain;border-radius:8px;}
/* Reply bar */
.reply-bar{padding:7px 12px;border-top:1px solid var(--bdr);display:flex;align-items:center;gap:8px;background:var(--sur2);flex-shrink:0;}
.reply-bar-txt{flex:1;font-size:11px;color:var(--tx2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
/* Unread */
.unread-dot{width:9px;height:9px;background:#22C55E;border-radius:50%;flex-shrink:0;}
.unread-count{background:#22C55E;color:#fff;font-size:9px;font-weight:700;padding:1px 5px;border-radius:10px;min-width:18px;text-align:center;line-height:16px;}
/* Pinned announcement */
.pm{background:rgba(245,158,11,.06);border:1px solid rgba(245,158,11,.18);border-radius:7px;padding:8px 11px;margin-bottom:9px;font-size:12px;}
.pm .pl{font-size:9px;font-weight:700;letter-spacing:.08em;color:var(--am);margin-bottom:3px;}
/* Chat images */
.chat-img{max-width:200px;max-height:160px;border-radius:8px;display:block;cursor:pointer;}
.chat-vid{max-width:200px;border-radius:8px;display:block;}
/* Forward modal list items */
.fwd-item{padding:10px 13px;border-bottom:1px solid var(--bdr);cursor:pointer;display:flex;align-items:center;gap:9px;}
.fwd-item:hover{background:var(--sur2);}
/* Layout */
#sb{width:var(--sw);background:var(--sur);border-right:1px solid var(--bdr);position:fixed;left:0;top:0;bottom:0;z-index:300;display:flex;flex-direction:column;transition:transform .28s;overflow-y:auto;overflow-x:hidden;}
#sb .logo{padding:10px 13px;border-bottom:1px solid var(--bdr);display:flex;align-items:center;min-height:54px;}
#sb .logo img{height:30px;width:auto;object-fit:contain;}
#sb nav{padding:7px 5px;flex:1;}
#sb .ni{display:flex;align-items:center;gap:8px;padding:8px 9px;border-radius:7px;cursor:pointer;color:var(--tx2);font-size:12px;font-weight:500;position:relative;margin-bottom:1px;min-height:36px;}
#sb .ni:hover{background:var(--sur2);color:var(--tx);}
#sb .ni.ac{background:rgba(245,158,11,.11);color:var(--am);}
#sb .ni.ac::before{content:'';position:absolute;left:0;top:5px;bottom:5px;width:3px;background:var(--am);border-radius:0 2px 2px 0;}
#sb .ni .ico{font-size:15px;width:18px;text-align:center;flex-shrink:0;}
#sb .nb{background:var(--rd);color:#fff;font-size:9px;font-weight:700;padding:1px 5px;border-radius:10px;margin-left:auto;}
#sb .ua{padding:9px;border-top:1px solid var(--bdr);}
#mn{margin-left:var(--sw);min-height:100vh;display:flex;flex-direction:column;}
#tb{background:var(--sur);border-bottom:1px solid var(--bdr);padding:0 14px;height:54px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;flex-shrink:0;}
#tb .pt{font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:700;}
#tb .tr{display:flex;align-items:center;gap:6px;}
#ct{padding:14px;flex:1;}
/* Login */
#lp{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg);position:relative;overflow:hidden;padding:16px;}
#lp::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(45deg,transparent,transparent 40px,rgba(245,158,11,.016) 40px,rgba(245,158,11,.016) 41px);}
.lb{width:100%;max-width:390px;background:var(--sur);border:1px solid var(--bdr2);border-radius:14px;padding:28px;position:relative;z-index:1;}
.lbr{text-align:center;margin-bottom:20px;}
.lbr img{height:64px;width:auto;margin:0 auto 8px;display:block;}
.lbr p{color:var(--tx2);font-size:12px;margin:0;}
.lq{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:12px;}
.qb{background:var(--sur2);border:1px solid var(--bdr);border-radius:7px;padding:8px;text-align:center;cursor:pointer;}
.qb:hover{border-color:var(--am);background:rgba(245,158,11,.05);}
.qb .qr{font-size:10px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--am);margin-bottom:2px;}
.qb .qn{font-size:11px;color:var(--tx2);}
/* Mobile hamburger and bottom nav */
#mmt{display:none;background:none;color:var(--tx);font-size:22px;padding:6px;border-radius:5px;min-width:36px;min-height:36px;align-items:center;justify-content:center;}
#bnav{display:none;position:fixed;bottom:0;left:0;right:0;height:54px;background:var(--sur);border-top:1px solid var(--bdr);z-index:200;justify-content:space-around;align-items:center;padding-bottom:env(safe-area-inset-bottom);}
#bnav .bi{display:flex;flex-direction:column;align-items:center;gap:2px;padding:4px 8px;cursor:pointer;color:var(--tx3);font-size:9px;font-weight:600;position:relative;min-width:44px;min-height:44px;justify-content:center;}
#bnav .bi.ac{color:var(--am);}
#bnav .bi .bn{font-size:18px;}
#bnav .bb{position:absolute;top:2px;right:2px;background:var(--rd);color:#fff;font-size:9px;font-weight:700;padding:0 3px;border-radius:7px;}
/* ─── RESPONSIVE ─── */
@media(max-width:900px){
  #mmt{display:inline-flex;}
  #sb{transform:translateX(-100%);}
  #sb.op{transform:translateX(0);box-shadow:4px 0 24px rgba(0,0,0,.4);}
  #mn{margin-left:0!important;padding-bottom:60px;}
  #bnav{display:flex;}
  .g2,.g3,.g4,.g5,.fg,.fg3{grid-template-columns:1fr!important;}
  .g2.keep2{grid-template-columns:1fr 1fr!important;}
  .mo{max-width:100%;max-height:88vh;}
  #ct{padding:10px;}
  #tb{padding:0 10px;}
  #gsw input{width:100px;}
  .calc-wrap{width:260px;right:-10px;}
  .fs-body{padding:12px;}
  /* Chat mobile: sidebar OR chat, full width */
  .chat-root{flex-direction:column;height:calc(100vh - 130px);}
  .chat-sidebar{width:100%;border-right:none;border-bottom:1px solid var(--bdr);}
  .chat-sidebar.mobile-hide{display:none;}
  .chat-main.mobile-hide{display:none;}
  .dtbar{display:none;}
  #gsw{display:none;}
}
@media(max-width:480px){
  .tbar button{min-width:0;padding:6px 4px;font-size:11px;}
  .btn{padding:7px 10px;font-size:12px;}
  td,th{padding:7px 8px;font-size:12px;}
  .chat-root{height:calc(100vh - 125px);}
}

<script>
/* ── Firebase Setup UI (plain JS, no Babel) ──────────────────────────── */
(function(){
  var cfg = null;
  try{ cfg = JSON.parse(localStorage.getItem('raj_fb_config')||'null'); }catch(e){}
  if(cfg && cfg.databaseURL && cfg.apiKey) return; // already configured

  // Create overlay
  var ov = document.createElement('div');
  ov.id = 'fb-setup';
  ov.style.cssText = 'position:fixed;inset:0;background:#0C0E14;z-index:99999;display:flex;align-items:center;justify-content:center;padding:20px;font-family:sans-serif';

  ov.innerHTML = [
    '<div style="background:#161920;border:1px solid #2a2d36;border-radius:14px;padding:28px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto">',
      '<div style="font-family:Barlow Condensed,sans-serif;font-size:24px;font-weight:800;color:#F59E0B;margin-bottom:4px">RAJ CONSTRUCTION</div>',
      '<div style="font-size:14px;color:#9ca3af;margin-bottom:20px">Cloud Database Setup</div>',
      '<p style="font-size:13px;color:#d1d5db;line-height:1.7;margin:0 0 16px">',
        'To sync data across all devices, connect a free Firebase database.<br>',
        '<b style="color:#F59E0B">One-time setup per device.</b>',
      '</p>',
      '<div style="background:#0C0E14;border-radius:8px;padding:14px;font-size:12px;color:#9ca3af;line-height:1.9;margin-bottom:16px">',
        '<b style="color:#F59E0B;font-size:13px">Quick Setup (2 minutes):</b><br>',
        '1. Go to <a href="https://console.firebase.google.com" target="_blank" style="color:#60a5fa">console.firebase.google.com</a><br>',
        '2. Create project &rarr; click <b style="color:#d1d5db">&lt;/&gt; Web</b> &rarr; Register app<br>',
        '3. Copy the <b style="color:#d1d5db">firebaseConfig</b> object shown<br>',
        '4. In left menu: <b style="color:#d1d5db">Build &rarr; Realtime Database</b> &rarr; Create &rarr; Test Mode<br>',
        '5. Paste the config below and click Connect',
      '</div>',
      '<textarea id="fb-cfg-input" rows="8" placeholder="Paste the firebaseConfig object here..." ',
        'style="width:100%;box-sizing:border-box;background:#0C0E14;color:#d1d5db;border:1px solid #2a2d36;',
        'border-radius:8px;padding:10px;font-family:monospace;font-size:11px;resize:vertical;margin-bottom:12px">',
      '</textarea>',
      '<div style="display:flex;gap:10px">',
        '<button id="fb-connect-btn" style="flex:1;background:#F59E0B;color:#0C0E14;font-weight:700;font-size:14px;',
          'padding:11px;border:none;border-radius:8px;cursor:pointer">',
          'Connect Database',
        '</button>',
        '<button id="fb-skip-btn" style="padding:11px 18px;background:#1e2230;color:#9ca3af;border:1px solid #2a2d36;',
          'border-radius:8px;cursor:pointer;font-size:13px">',
          'Use Local Only',
        '</button>',
      '</div>',
      '<div id="fb-status" style="margin-top:10px;font-size:12px;color:#9ca3af;text-align:center"></div>',
    '</div>'
  ].join('');

  document.body.appendChild(ov);

  function parseConfig(raw){
    raw = raw.trim();
    // Try JSON parse first
    try{ return JSON.parse(raw); } catch(e){}
    // Try extracting key:value pairs (handles JS object literal)
    var result = {};
    raw.split('
').forEach(function(line){
      var ci = line.indexOf(':');
      if(ci < 0) return;
      var k = line.slice(0,ci).trim().replace(/[{}"';\s]/g,'');
      var v = line.slice(ci+1).trim().replace(/[,"'};]/g,'').trim();
      if(k && v && k.length < 30) result[k] = v;
    });
    return (result.apiKey && result.databaseURL) ? result : null;
  }

  document.getElementById('fb-connect-btn').onclick = function(){
    var raw = document.getElementById('fb-cfg-input').value;
    var st = document.getElementById('fb-status');
    var cfg = parseConfig(raw);
    if(!cfg || !cfg.apiKey || !cfg.databaseURL){
      st.style.color = '#ef4444';
      st.textContent = 'Could not read config. Make sure you pasted the full firebaseConfig object.';
      return;
    }
    st.style.color = '#9ca3af';
    st.textContent = 'Saving...';
    localStorage.setItem('raj_fb_config', JSON.stringify(cfg));
    st.style.color = '#10b981';
    st.textContent = 'Connected! Reloading...';
    setTimeout(function(){ location.reload(); }, 800);
  };

  document.getElementById('fb-skip-btn').onclick = function(){
    localStorage.setItem('raj_fb_skip', '1');
    document.getElementById('fb-setup').remove();
  };

  // Don't show again if user chose to skip
  if(localStorage.getItem('raj_fb_skip')){
    document.getElementById('fb-setup').remove();
  }
})();
</script>

    data[u.id]={};

function PieChart(props){
  var data=props.data,size=props.size||110,total=data.reduce(function(a,d){return a+d.val;},0)||1,cum=-Math.PI/2;
  var slices=data.map(function(d){var ang=(d.val/total)*2*Math.PI,r=size/2-5,x1=Math.cos(cum)*r,y1=Math.sin(cum)*r;cum+=ang;var x2=Math.cos(cum)*r,y2=Math.sin(cum)*r;return{color:d.color,path:'M0,0 L'+x1+','+y1+' A'+r+','+r+',0,'+(ang>Math.PI?1:0)+',1,'+x2+','+y2+'Z'};});
  var hw=size/2;
  return <svg width={size} height={size} viewBox={(-hw)+' '+(-hw)+' '+size+' '+size}>{slices.map(function(s,i){return <path key={i} d={s.path} fill={s.color} opacity="0.88"/>;})}<circle r={size*0.22} fill="var(--sur)"/></svg>;
}
function GlobalSearch(props){
  var [q,setQ]=useState(''),res=[];
  var lang=props.lang||'en';
  if(q.length>1){
    var ql=q.toLowerCase();
    props.purchases.forEach(function(p){if((p.inv&&p.inv.toLowerCase().indexOf(ql)>=0)||p.vendor.toLowerCase().indexOf(ql)>=0)res.push({type:tl(lang,'purchases'),label:(p.inv||'N/A')+' - '+p.vendor,sub:INR(p.base)+' '+tl(lang,'by')+' '+p.by,page:'purchases'});});
    props.mats.forEach(function(m){if(m.name.toLowerCase().indexOf(ql)>=0)res.push({type:tl(lang,'inventory'),label:m.name,sub:INR(m.rate)+'/'+m.unit,page:'inventory'});});
    props.users.forEach(function(u){if(u.name.toLowerCase().indexOf(ql)>=0)res.push({type:tl(lang,'employees'),label:u.name,sub:RL[u.role],page:'employees'});});
    props.sites.forEach(function(s){if(s.name.toLowerCase().indexOf(ql)>=0)res.push({type:tl(lang,'sites'),label:s.name,sub:s.loc,page:'sites'});});
    props.policies.forEach(function(p){if(p.polNo.toLowerCase().indexOf(ql)>=0||p.name.toLowerCase().indexOf(ql)>=0)res.push({type:tl(lang,'policies'),label:p.polNo+' '+p.name,sub:p.expiry,page:'policies'});});
    res=res.slice(0,8);
  }
  return <div id="gsw">
    <input placeholder={'🔍 '+tl(lang,'search')+'...'} value={q} onChange={function(e){setQ(e.target.value);}} onBlur={function(){setTimeout(function(){setQ('');},220);}}/>
    {q.length>1&&res.length>0&&<div className="gsr">{res.map(function(r,i){return <div key={i} className="gsri" onClick={function(){props.setPage(r.page);setQ('');}}>
      <div style={{fontSize:9,fontWeight:700,letterSpacing:'.07em',textTransform:'uppercase',color:'var(--am)',marginBottom:2}}>{r.type}</div>
      <div style={{fontWeight:500}}>{r.label}</div><div style={{fontSize:11,color:'var(--tx3)'}}>{r.sub}</div>
    </div>;}  )}</div>}
  </div>;
}

}
function Calculator(props){
  var [expr,setExpr]=useState(''),[dispRes,setDispRes]=useState('0');
  function press(v){
    if(v==='C'){setExpr('');setDispRes('0');return;}
    if(v==='DEL'){setExpr(function(p){return p.slice(0,-1);});return;}
    if(v==='='){try{var r=Function('"use strict";return('+expr.replace(/\^/g,'**')+')')();var rs=String(Math.round(r*1e10)/1e10);setDispRes(rs);setExpr(rs);}catch(er){setDispRes('Error');}return;}
    setExpr(function(p){return p+v;});setDispRes('');
  }
  var rows=[['7','8','9','/'],['4','5','6','*'],['1','2','3','-'],['0','.','=','+'],['C','DEL','(',')']] ;
  return <div className="calc-wrap">
    <div className="flex ic jb" style={{marginBottom:8}}><span style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,fontSize:14}}>🔢 Calculator</span><button onClick={props.onClose} style={{background:'none',color:'var(--tx3)',fontSize:14}}>✕</button></div>
    <div className="calc-disp"><div className="calc-expr">{expr||'\u00a0'}</div><div className="calc-num">{dispRes||expr.slice(-8)||'0'}</div></div>
    <div className="calc-grid">{rows.reduce(function(a,r){return a.concat(r);},[]).map(function(v,i){var cls='cb'+(v==='='?' cb-eq':v==='C'||v==='DEL'?' cb-cl':['/','*','-','+'].indexOf(v)>=0?' cb-op':'');return <button key={i} className={cls} onClick={function(){press(v);}}>{v==='*'?'×':v==='/'?'÷':v}</button>;})}</div>
  </div>;
}

/* ── BAR CHART — large, readable, value labels ── */
function SvgBar(props){
  var data=props.data,col=props.col||'var(--am)';
  if(!data||!data.length)return null;
  var max=Math.max.apply(null,data.map(function(d){return d.v;}))||1;
  var n=data.length;
  var vw=Math.max(260,n*56);
  var vh=170,barW=Math.min(38,vw/n*0.52),gap=vw/n,plotB=30,plotT=15;
  return <div style={{width:'100%',overflowX:n>5?'auto':'visible',paddingBottom:4}}>
    <svg viewBox={'0 0 '+vw+' '+vh} style={{width:n>5?vw+'px':'100%',minWidth:'100%',height:vh}} preserveAspectRatio="xMidYMid meet">
      {[0,25,50,75,100].map(function(pct){
        var y=plotT+((100-pct)/100)*(vh-plotB-plotT);
        return <g key={pct}>
          <line x1={28} y1={y} x2={vw-4} y2={y} stroke="var(--bdr2)" strokeWidth="0.7" strokeDasharray="4,3"/>
          <text x={24} y={y+3.5} textAnchor="end" fontSize="9" fill="var(--tx3)">{Math.round(max*pct/100/1000)}K</text>
        </g>;
      })}
      {data.map(function(d,i){
        var bh=Math.max(4,(d.v/max)*(vh-plotB-plotT));
        var cx=gap*i+gap/2,by=vh-plotB-bh,barCol=d.col||col;
        return <g key={i}>
          <rect x={cx-barW/2} y={by} width={barW} height={bh} fill={barCol} rx="3" opacity="0.92"/>
          {d.v>0&&<text x={cx} y={by-6} textAnchor="middle" fontSize="10" fontWeight="700" fill={barCol}>{d.vl||''}</text>}
          <text x={cx} y={vh-12} textAnchor="middle" fontSize="10" fill="var(--tx2)" fontWeight="600">{d.l}</text>
        </g>;
      })}
      <line x1={28} y1={vh-plotB} x2={vw-4} y2={vh-plotB} stroke="var(--bdr)" strokeWidth="1.2"/>
    </svg>
  </div>;
}

/* ── LINE CHART — clear dots + value callouts ── */
function SvgLine(props){
  var data=props.data,col=props.col||'var(--am)',id2=props.id||'l';
  if(!data||data.length<2)return null;
  var max=Math.max.apply(null,data.map(function(d){return d.v;}))||1;
  var n=data.length,vw=320,vh=170,pad=34,padB=30,padT=18;
  var plotW=vw-pad-6,plotH=vh-padB-padT;
  var pts=data.map(function(d,i){return{x:pad+(i/(n-1))*plotW,y:padT+plotH-(d.v/max)*plotH,v:d.v,l:d.l};});
  var path='M'+pts.map(function(p){return p.x.toFixed(1)+','+p.y.toFixed(1);}).join(' L');
  var area='M'+pts[0].x+','+(padT+plotH)+' '+pts.map(function(p){return 'L'+p.x.toFixed(1)+','+p.y.toFixed(1);}).join(' ')+' L'+pts[pts.length-1].x+','+(padT+plotH)+' Z';
  return <svg viewBox={'0 0 '+vw+' '+vh} style={{width:'100%',height:vh}}>
    <defs>
      <linearGradient id={'lg_'+id2} x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stopColor={col} stopOpacity="0.28"/>
        <stop offset="100%" stopColor={col} stopOpacity="0.02"/>
      </linearGradient>
    </defs>
    {[0,25,50,75,100].map(function(pct){
      var y=padT+plotH-(pct/100)*plotH;
      return <g key={pct}>
        <line x1={pad} y1={y} x2={pad+plotW} y2={y} stroke="var(--bdr2)" strokeWidth="0.7" strokeDasharray="4,3"/>
        <text x={pad-4} y={y+3.5} textAnchor="end" fontSize="9" fill="var(--tx3)">{Math.round(max*pct/100/1000)}K</text>
      </g>;
    })}
    <path d={area} fill={'url(#lg_'+id2+')'}/>
    <path d={path} fill="none" stroke={col} strokeWidth="2.2" strokeLinejoin="round"/>
    {pts.map(function(p,i){
      var isLast=i===pts.length-1;
      return <g key={i}>
        <circle cx={p.x} cy={p.y} r={isLast?5.5:4} fill={col} stroke="var(--sur)" strokeWidth="2"/>
        {(isLast||i===0)&&<text x={p.x} y={p.y-10} textAnchor="middle" fontSize="10" fontWeight="700" fill={col}>{Math.round(p.v/1000)}K</text>}
        <text x={p.x} y={padT+plotH+16} textAnchor="middle" fontSize="9.5" fill="var(--tx2)">{p.l}</text>
      </g>;
    })}
    <line x1={pad} y1={padT+plotH} x2={pad+plotW} y2={padT+plotH} stroke="var(--bdr)" strokeWidth="1.2"/>
  </svg>;
}

/* ── GAUGE — big, legible ── */
function Gauge(props){
  var pct=Math.min(100,Math.max(0,props.pct||0));
  var col=pct>80?'var(--rd)':pct>60?'var(--am)':'var(--gr)';
  var r=36,cx=52,cy=58;
  function arc(deg){var rad=(deg-90)*Math.PI/180;return{x:cx+r*Math.cos(rad),y:cy+r*Math.sin(rad)};}
  var s2=arc(-135),e2=arc(270*pct/100-135),big=pct>50?1:0;
  return <svg viewBox="0 0 104 76" style={{width:'100%',height:76}}>
    <path d={'M '+arc(-135).x+' '+arc(-135).y+' A '+r+' '+r+' 0 1 1 '+arc(135).x+' '+arc(135).y} fill="none" stroke="var(--bdr2)" strokeWidth="8" strokeLinecap="round"/>
    {pct>0&&<path d={'M '+s2.x+' '+s2.y+' A '+r+' '+r+' 0 '+big+' 1 '+e2.x+' '+e2.y} fill="none" stroke={col} strokeWidth="8" strokeLinecap="round"/>}
    <text x={cx} y={cy+2} textAnchor="middle" fontSize="16" fontWeight="800" fill={col}>{pct}%</text>
    <text x={cx} y={cx+23} textAnchor="middle" fontSize="8.5" fill="var(--tx2)">{(props.label||'').substring(0,14)}</text>

}

/* ── PURCHASES: SGST/CGST/IGST + unit + invoice ── */
function Purchases(props){
  var user=props.user,P=props;
  var lang=props.lang||'en';var L=function(k){return tl(lang,k);};
  var [showM,setShowM]=useState(false);
  var [editP,setEditP]=useState(null);
  var [siteSel,setSiteSel]=useState('all');
  var [viewInv,setViewInv]=useState(null);
  var [viewTab,setViewTab]=useState('list');
  var [searchQ,setSearchQ]=useState('');
  var [fromDate,setFromDate]=useState('');
  var [toDate,setToDate]=useState('');
  var [vendorQ,setVendorQ]=useState('');
  var blank={siteId:user.siteId||'',matId:'',date:today(),qty:'',unit:'',base:'',vendor:'',inv:'',invFile:'',invFileName:'',gstType:'none',sgstPct:'',cgstPct:'',igstPct:'',_showGst:false};
  var [form,setForm]=useState(blank);
  function sf(k,v){setForm(function(p){var n=Object.assign({},p);n[k]=v;return n;});}
  var units=['bags','MT','CFT','nos','L','Kg','m','m2','m3','set','pair','RMT','sqft','cum','box'];
  var us2=usites(user,P.sites).filter(function(s){return s.status!=='closed';});
  var allVis=user.role==='master_admin'||user.role==='admin'?P.purchases:P.purchases.filter(function(p){return p.siteId===user.siteId;});
  var vis=siteSel==='all'?allVis:allVis.filter(function(p){return p.siteId===+siteSel;});
  var sorted=vis.filter(function(p){
    if(searchQ){var m=gMat(P.mats,p.matId);if(m.name.toLowerCase().indexOf(searchQ.toLowerCase())<0&&(p.inv||'').toLowerCase().indexOf(searchQ.toLowerCase())<0)return false;}
    if(vendorQ&&(p.vendor||'').toLowerCase().indexOf(vendorQ.toLowerCase())<0)return false;
    if(fromDate&&p.date<fromDate)return false;
    if(toDate&&p.date>toDate)return false;
    return true;
  }).slice().sort(function(a,b){return new Date(b.ts||b.date)-new Date(a.ts||a.date);});

  function calcGst(f){
    var base=+f.base||0;
    var sgst=f.gstType==='intra'?Math.round(base*(+f.sgstPct||0)/100):0;
    var cgst=f.gstType==='intra'?Math.round(base*(+f.cgstPct||0)/100):0;
    var igst=f.gstType==='inter'?Math.round(base*(+f.igstPct||0)/100):0;
    return{sgst:sgst,cgst:cgst,igst:igst,total:sgst+cgst+igst,grand:base+sgst+cgst+igst};
  }

  function pickInvoice(){
    var fi=document.createElement('input');fi.type='file';fi.accept='application/pdf,image/*';
    fi.onchange=function(e){var f=e.target.files[0];if(!f)return;if(f.size>100*1024*1024){alert('Max 100MB');return;}var r=new FileReader();r.onload=function(ev){sf('invFile',ev.target.result);sf('invFileName',f.name);};r.readAsDataURL(f);};
    fi.click();
  }

  function save(){
    if(!form.siteId||!form.matId||!form.qty||!form.base||!form.vendor){alert('Fill required fields.');return;}
    var g=calcGst(form);
    var obj={siteId:+form.siteId,matId:+form.matId,date:form.date,qty:+form.qty,unit:form.unit,base:+form.base,vendor:form.vendor,inv:form.inv,invFile:form.invFile,invFileName:form.invFileName,gstType:form.gstType,sgstPct:+form.sgstPct||0,cgstPct:+form.cgstPct||0,igstPct:+form.igstPct||0,sgstAmt:g.sgst,cgstAmt:g.cgst,igstAmt:g.igst,gstAmt:g.total,total:g.grand};
    if(editP){
      upd(P.setPurchases,editP.id,obj);
      addItem(P.setLog,{id:Date.now(),user:user.name,action:'Edited purchase '+(form.inv||''),time:sts(),type:'edit'});
      setEditP(null);
    } else {
      addItem(P.setPurchases,Object.assign({},obj,{id:Date.now(),by:user.name,ts:sts()}));
      addItem(P.setLog,{id:Date.now(),user:user.name,action:'Added purchase: '+gMat(P.mats,+form.matId).name,time:sts(),type:'purchase'});
    }
    setShowM(false);setForm(blank);
  }

  function startEdit(p){
    setForm({siteId:p.siteId,matId:p.matId,date:p.date,qty:p.qty,unit:p.unit||'',base:p.base,vendor:p.vendor,inv:p.inv||'',invFile:p.invFile||'',invFileName:p.invFileName||'',gstType:p.gstType||'none',sgstPct:p.sgstPct||'',cgstPct:p.cgstPct||'',igstPct:p.igstPct||''});
    setEditP(p);setShowM(true);
  }

  var totBase=vis.reduce(function(a,p){return a+(p.base||0);},0);
  var totSgst=vis.reduce(function(a,p){return a+(p.sgstAmt||0);},0);
  var totCgst=vis.reduce(function(a,p){return a+(p.cgstAmt||0);},0);
  var totIgst=vis.reduce(function(a,p){return a+(p.igstAmt||0);},0);
  var totGst=vis.reduce(function(a,p){return a+(p.gstAmt||0);},0);
  var totGrand=vis.reduce(function(a,p){return a+(p.total||p.base||0);},0);
  var canFilter=usites(user,P.sites).filter(function(s){return s.status!=='closed';}).length>1;
  var formG=calcGst(form);
  var byType={intra:vis.filter(function(p){return p.gstType==='intra';}),inter:vis.filter(function(p){return p.gstType==='inter';}),none:vis.filter(function(p){return !p.gstType||p.gstType==='none';})};

  function printPurchaseReport(){
    var siteLabel=siteSel==='all'?'All Sites':gSite(P.sites,+siteSel).name;
    var rows=sorted.map(function(p){var m=gMat(P.mats,p.matId),s=gSite(P.sites,p.siteId);return '<tr><td>'+p.date+'</td><td>'+s.name+'</td><td>'+m.name+'</td><td>'+p.qty+' '+(p.unit||m.unit||'')+'</td><td>'+p.vendor+'</td><td>'+(p.inv||'N/A')+'</td><td>'+INR(p.base)+'</td><td>'+INR(p.gstAmt||0)+'</td><td>'+INR(p.total||p.base)+'</td></tr>';}).join('');
    pdfWin('<h2>Purchase Log \u2014 '+siteLabel+'</h2><div class="info"><div class="iv"><div class="l">Entries</div><div class="v">'+sorted.length+'</div></div><div class="iv"><div class="l">Base</div><div class="v">'+INR(totBase)+'</div></div><div class="iv"><div class="l">Total GST</div><div class="v">'+INR(totGst)+'</div></div><div class="iv"><div class="l">Grand Total</div><div class="v">'+INR(totGrand)+'</div></div></div><table><thead><tr><th>Date</th><th>Site</th><th>Material</th><th>Qty</th><th>Vendor</th><th>Invoice</th><th>Base</th><th>GST</th><th>Grand</th></tr></thead><tbody>'+rows+'</tbody></table>');
  }

function Labour(props){
  var user=props.user,P=props;
  var [showM,setShowM]=useState(false);
  var [editL,setEditL]=useState(null);
  var [siteSel,setSiteSel]=useState('all');
  var lang=props.lang||'en';var L=function(k){return tl(lang,k);};
  var blank={siteId:user.siteId||'',date:today(),type:'daily',num:'',rate:'',total:'',contractor:'',numWorkers:''};
  var [form,setForm]=useState(blank);
  var [labSrch,setLabSrch]=useState('');
  var [labType,setLabType]=useState('all');
  function sf(k,v){setForm(function(p){var n=Object.assign({},p);n[k]=v;return n;});}
  var us2=usites(user,P.sites).filter(function(s){return s.status!=='closed';});
  var allVis=user.role==='master_admin'||user.role==='admin'?P.labour:P.labour.filter(function(l){return l.siteId===user.siteId;});
  var vis=(siteSel==='all'?allVis:allVis.filter(function(l){return l.siteId===+siteSel;})).filter(function(l){
    if(labTypeFilter!=='all'&&l.type!==labTypeFilter)return false;
    if(labFromDate&&l.date<labFromDate)return false;
    if(labToDate&&l.date>labToDate)return false;
    return true;
  });
  var totWages=vis.reduce(function(a,l){return a+(l.total||0);},0);

}

  var user=props.user,P=props;
  var [tab,setTab]=useState('users');
  var [showM,setShowM]=useState(false);
  var [editUid,setEditUid]=useState(null);
  var [showCreds,setShowCreds]=useState(false);
  var lang=props.lang||'en';var L=function(k){return tl(lang,k);};
  var blank={name:'',email:'',password:'',role:'admin',phone:'',designation:'',bio:'',salary:'',siteIds:[]};
  var [form,setForm]=useState(blank);
  function sf(k,v){setForm(function(p){var n=Object.assign({},p);n[k]=v;return n;});}
  var cols=['#F59E0B','#3B82F6','#10B981','#8B5CF6','#EC4899','#06B6D4','#F97316'];

  /* ── Users tab functions ── */
  function openCreate(){setEditUid(null);setForm(blank);setShowM(true);}
  function openEdit(u){
    setEditUid(u.id);
    setForm({name:u.name||'',email:u.email||'',password:u.password||'',role:u.role||'admin',phone:u.phone||'',designation:u.designation||'',bio:u.bio||'',salary:u.salary||'',siteIds:u.siteIds||[]});
    setShowM(true);
  }
  function save(){
    if(!form.name||!form.email||!form.password){alert('Fill required fields.');return;}
    var siteIds=form.siteIds&&form.siteIds.length?form.siteIds:undefined;
    var primarySite=siteIds&&siteIds.length===1?siteIds[0]:undefined;
    if(editUid){
      upd(P.setUsers,editUid,{name:form.name,email:form.email,password:form.password,role:form.role,phone:form.phone,designation:form.designation,bio:form.bio,salary:+form.salary||0,siteIds:siteIds,siteId:primarySite});
    } else {
      var av=form.name.split(' ').map(function(w){return w[0];}).join('').slice(0,2).toUpperCase();
      addItem(P.setUsers,Object.assign({},form,{id:Date.now(),avatar:av,color:cols[Math.floor(Math.random()*cols.length)],siteIds:siteIds,siteId:primarySite,salary:+form.salary||0}));
    }
    setShowM(false);setEditUid(null);setForm(blank);
  }
  function del(id){if(id===user.id){alert('Cannot delete own account.');return;}var target=P.users.filter(function(u){return u.id===id;})[0];if(target&&(target.role==='admin'||target.role==='master_admin')&&user.role!=='master_admin'){alert('Only Master Admin can delete admin accounts.');return;}if(!window.confirm('Delete this user?'))return;removeItem(P.setUsers,id);}
  function pickPhotoFor(uid){
    var fi=document.createElement('input');fi.type='file';fi.accept='image/*';
    fi.onchange=function(e){var f=e.target.files[0];if(!f)return;if(f.size>2*1024*1024){alert('Max 2MB.');return;}var r=new FileReader();r.onload=function(ev){upd(P.setUsers,uid,{photo:ev.target.result});};r.readAsDataURL(f);};
    fi.click();
  }
  function removePhoto(uid){if(window.confirm('Remove photo?'))upd(P.setUsers,uid,{photo:''});}

  /* ── Edit Profiles tab functions ── */
  var firstId=P.users[0]?P.users[0].id:null;
  var [selEmp,setSelEmp]=useState(firstId);
  var selUser=P.users.filter(function(u){return u.id===selEmp;})[0]||P.users[0];
  var [pf,setPf]=useState({name:selUser?selUser.name||'':'',phone:selUser?selUser.phone||'':'',designation:selUser?selUser.designation||'':'',bio:selUser?selUser.bio||'':'',photo:selUser?selUser.photo||':':''});
  function loadEmp(u){setSelEmp(u.id);setPf({name:u.name||'',phone:u.phone||'',designation:u.designation||'',bio:u.bio||'',photo:u.photo||''});}
  function pickEmpPhoto(){
    var fi=document.createElement('input');fi.type='file';fi.accept='image/*';
    fi.onchange=function(e){var f=e.target.files[0];if(!f)return;if(f.size>2*1024*1024){alert('Max 2MB.');return;}var r=new FileReader();r.onload=function(ev){setPf(function(p){return Object.assign({},p,{photo:ev.target.result});});};r.readAsDataURL(f);};
    fi.click();
  }
  function saveProfile(){
    if(!pf.name||!pf.name.trim()){alert('Name required.');return;}
    upd(P.setUsers,selEmp,{name:pf.name.trim(),phone:pf.phone,designation:pf.designation,bio:pf.bio,photo:pf.photo});
    alert((selUser?selUser.name:'User')+' updated!');
  }
  var previewEmp=selUser?Object.assign({},selUser,{photo:pf.photo,name:pf.name}):null;

  var isMA=user.role==='master_admin';

  return <div className="fi">
    <div className="flex ic jb mb12">
      <div className="st" style={{margin:0}}>👥 {L('userMgmt')}</div>
      {tab==='users'&&<div style={{display:'flex',gap:8}}>
        <button className={'btn bsm '+(showCreds?'bp':'bs')} onClick={function(){setShowCreds(function(p){return !p;});}}>{showCreds?'Hide Creds':'View Creds'}</button>
        <button className="btn bp bsm" onClick={openCreate}>+ {L('createUser')}</button>
      </div>}
    </div>

    {/* Tabs */}
    <div className="tbar" style={{marginBottom:14}}>
      {[['users','👥 Users'],['profiles','✎ Edit Profiles']].map(function(x){
        return <button key={x[0]} className={tab===x[0]?'ac':''} onClick={function(){setTab(x[0]);}}>{x[1]}</button>;
      })}
    </div>

    {/* ── USERS TAB ── */}
    {tab==='users'&&<div>
      {showCreds&&<div className="aba aba-a" style={{marginBottom:10}}>&#9888; Credentials visible. Close when done.</div>}

      {/* Create / Edit Modal */}
      {showM&&<div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.65)',zIndex:2000,display:'flex',alignItems:'flex-start',justifyContent:'center',padding:16,overflowY:'auto'}} onClick={function(){setShowM(false);setEditUid(null);}}>
        <div style={{background:'var(--sur)',border:'1px solid var(--bdr2)',borderRadius:14,padding:24,width:520,maxWidth:'100%',marginTop:20,marginBottom:20}} onClick={function(e){e.stopPropagation();}}>
          <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:22,fontWeight:700,marginBottom:16,color:'var(--am)'}}>
            {editUid?'✎ Edit User':'+ Create User'}
          </div>
          <div className="fg">
            <div className="fr"><label>{L('name')} *</label><input value={form.name} onChange={function(e){sf('name',e.target.value);}}/></div>
            <div className="fr"><label>{L('role')} *</label>
              <select value={form.role} onChange={function(e){sf('role',e.target.value);}}>
                {isMA&&<option value="admin">Senior Manager (Admin)</option>}
                <option value="field_worker">Field Manager</option>
                <option value="site_manager">Site Manager</option>
                <option value="contractor">Contractor</option>
                {isMA&&<option value="master_admin">Master Admin (Owner/Partner)</option>}
              </select>
            </div>
          </div>
          <div className="fr"><label>Email *</label><input type="email" value={form.email} onChange={function(e){sf('email',e.target.value);}}/></div>
          <div className="fg">
            <div className="fr"><label>{L('password')} *</label><input type="text" value={form.password} onChange={function(e){sf('password',e.target.value);}}/></div>
            <div className="fr"><label>{L('phone')}</label><input value={form.phone} onChange={function(e){sf('phone',e.target.value);}}/></div>
          </div>
          <div className="fg">
            <div className="fr"><label>{L('designation')}</label><input value={form.designation} onChange={function(e){sf('designation',e.target.value);}}/></div>
            <div className="fr"><label>Salary (INR/month)</label><input type="number" value={form.salary} onChange={function(e){sf('salary',e.target.value);}}/></div>
          </div>
          <div className="fr"><label>Bio</label><textarea rows="2" value={form.bio} onChange={function(e){sf('bio',e.target.value);}}></textarea></div>
          <div className="fr">
            <label>Assigned Sites</label>
            <div style={{display:'flex',flexDirection:'column',gap:4,maxHeight:130,overflowY:'auto',border:'1px solid var(--bdr)',borderRadius:6,padding:6}}>
              {P.sites.map(function(s){
                var checked=(form.siteIds||[]).indexOf(s.id)>=0;
                return <label key={s.id} style={{display:'flex',alignItems:'center',gap:6,fontSize:12,cursor:'pointer',padding:'2px 4px'}}>
                  <input type="checkbox" style={{width:'auto'}} checked={checked} onChange={function(){sf('siteIds',checked?(form.siteIds||[]).filter(function(x){return x!==s.id;}):(form.siteIds||[]).concat([s.id]));}}/>
                  {s.name}
                </label>;
              })}
            </div>
          </div>
          <div style={{display:'flex',gap:8,marginTop:10}}>
            <button className="btn bp" style={{flex:1}} onClick={save}>✓ {editUid?'Save Changes':'Create User'}</button>
            <button className="btn bs" onClick={function(){setShowM(false);setEditUid(null);}}>✕ Cancel</button>
          </div>
        </div>
      </div>}

      <div className="card" style={{padding:0,overflowX:'auto'}}>
        <table><thead><tr><th>User</th><th>Photo</th><th>Email</th>{showCreds&&<th>Password</th>}<th>{L('role')}</th><th>{L('designation')}</th><th>{L('phone')}</th><th>Salary</th><th>{L('site')}</th><th>Actions</th></tr></thead>
          <tbody>{P.users.map(function(u){
            var empSite=u.siteId?gSite(P.sites,u.siteId):null;
            var empSites=u.siteIds?u.siteIds.map(function(id){return gSite(P.sites,id).name;}).join(', '):null;
            return <tr key={u.id}>
              <td><div style={{display:'flex',alignItems:'center',gap:8}}><Avt user={u} size={28}/><span style={{fontWeight:600,fontSize:12}}>{u.name}</span></div></td>
              <td><div style={{display:'flex',gap:4}}>
                <button className="btn bs bxs" onClick={function(){pickPhotoFor(u.id);}}>&#128247;</button>
                {u.photo&&<button className="btn bd bxs" onClick={function(){removePhoto(u.id);}}>&#10005;</button>}
              </div></td>
              <td className="mono tsm tm">{u.email}</td>
              {showCreds&&<td className="mono tsm" style={{color:'var(--am)',fontWeight:600}}>{u.password}</td>}
              <td><span className={RB[u.role]||'bam'} style={{display:'inline-flex',padding:'2px 7px',borderRadius:4,fontSize:10,fontWeight:600}}>{RL[u.role]}</span></td>
              <td className="tm tsm">{u.designation||"—"}</td>
              <td className="tm tsm">{u.phone||"—"}</td>
              <td className="mono tsm">{u.salary?INR(u.salary):"—"}</td>
              <td className="tsm" style={{color:'var(--am)',fontWeight:500}}>{empSite?empSite.name:empSites?empSites:L('allSites')}</td>
              <td><div style={{display:'flex',gap:4}}>
                <button className="btn bs bxs" onClick={function(){openEdit(u);}}>✎</button>
                {u.id!==user.id&&<button className="btn bd bxs" onClick={function(){del(u.id);}}>&#10005;</button>}
              </div></td>
            </tr>;
          })}</tbody>
        </table>
      </div>
    </div>}

    {/* ── EDIT PROFILES TAB ── */}
    {tab==='profiles'&&<div className="g2">
      <div className="card" style={{padding:0,maxHeight:520,overflowY:'auto'}}>
        {P.users.map(function(u){
          return <div key={u.id} style={{display:'flex',alignItems:'center',gap:10,padding:'10px 13px',borderBottom:'1px solid var(--bdr)',cursor:'pointer',background:u.id===selEmp?'var(--sur2)':'transparent',borderLeft:u.id===selEmp?'3px solid var(--am)':'3px solid transparent'}} onClick={function(){loadEmp(u);}}>

            <div>
              <div style={{fontWeight:600,fontSize:13}}>{u.name}</div>
              <div style={{fontSize:11,color:'var(--tx3)'}}>{RL[u.role]}{u.designation?' · '+u.designation:''}</div>

      {previewEmp&&<div className="card">
        <div style={{display:'flex',gap:14,alignItems:'center',marginBottom:16}}>
          <div style={{position:'relative',flexShrink:0}}>
            <Avt user={previewEmp} size={64}/>
            <button onClick={pickEmpPhoto} style={{position:'absolute',bottom:-4,right:-4,width:22,height:22,borderRadius:'50%',background:'var(--am)',border:'2px solid var(--sur)',color:'#0C0E14',fontSize:11,display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',lineHeight:1}}>📷</button>

          <img src={pf.photo} style={{width:48,height:48,borderRadius:8,objectFit:'cover',border:'1px solid var(--bdr)'}} alt="photo"/>
          <button className="btn bd bxs" onClick={function(){setPf(function(p){return Object.assign({},p,{photo:''});});}}>Remove</button>
        </div>}
        <div className="fr"><label>Full Name</label><input value={pf.name} onChange={function(e){var v=e.target.value;setPf(function(p){return Object.assign({},p,{name:v});});}}/></div>
        <div className="fr"><label>{L('phone')}</label><input value={pf.phone} onChange={function(e){var v=e.target.value;setPf(function(p){return Object.assign({},p,{phone:v});});}}/></div>

      </div>
    </div>}
  </div>;
